<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    body {
      width: 100vw;
      height: 100vh;
      position: relative;
      font-family: sans-serif;
      user-select: none;
      touch-action: none;
      background: #222;
    }
    #game {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }
    .popup {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      overflow: auto;
      scrollbar-width: none;           /* Firefox */
      -ms-overflow-style: none;        /* IE and Edge */
    }
    
    .popup::-webkit-scrollbar {
      width: 0 !important;             /* Chrome, Safari */
      display: none;
    }
    .popup-content {
      background: #fff;
      border-radius: 16px;
      padding: 2em;
      min-width: 300px;
      max-width: 95vw;
      max-height: 70vh;
      box-shadow: 0 4px 32px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 1em;
      align-items: center;
      overflow-y: auto;
      scrollbar-width: none;           /* Firefox */
      -ms-overflow-style: none;        /* IE and Edge */
    }
    
    .popup-content::-webkit-scrollbar {
      width: 0 !important;             /* Chrome, Safari */
      display: none;
    }

    #animal-choices, #obstacle-choices, #bg-choices {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 0.5em;
  width: 100%;
}

    .emoji-select {
      font-size: 2em;
      cursor: pointer;
      margin: 0.2em;
      border: 2px solid transparent;
      border-radius: 8px;
      transition: border 0.2s;
      background: none;
    }
    .emoji-select.selected {
      border: 2px solid #0078d4;
      background: #e6f0fa;
    }
    .label {
      font-weight: bold;
      margin-bottom: 0.2em;
    }
    #mobile-controls {
      position: absolute;
      bottom: 2vh;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      z-index: 5;
      pointer-events: none;
    }
    #jump-btn {
      font-size: 2em;
      padding: 0.5em 2em;
      border-radius: 2em;
      border: none;
      background: #0078d4;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      pointer-events: auto;
      cursor: pointer;
      opacity: 0.85;
      transition: background 0.2s;
    }
    #jump-btn:active {
      background: #005fa3;
    }
    #score {
      position: absolute;
      top: 2vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2em;
      color: #fff;
      text-shadow: 0 2px 8px #000;
      z-index: 3;
      font-weight: bold;
    }
    @media (max-width: 600px) {
      .popup-content { min-width: 90vw; }
      #score { font-size: 1.2em; }
    }
    /* Backgrounds */
    .bg {
      background: linear-gradient(to top, #47d469 20%, #33c1ee 20%, #0783d8, #0e4d90);
    }
    
    /* Hide scrollbars */
    ::-webkit-scrollbar { width: 0 !important }
    body { -ms-overflow-style: none; scrollbar-width: none; }
    /* Background emoji always behind */
    .bg-emoji {
      z-index: 0 !important;
      pointer-events: none;
      position: absolute;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="score"></div>
  <div id="mobile-controls" style="display:none;">
    <button id="jump-btn">⬆️ Jump</button>
  </div>
  <div class="popup" id="start-popup">
    <div class="popup-content">
      <div class="label">Choose Animal</div>
      <div id="animal-choices"></div>
      <div class="label">Choose Obstacle</div>
      <div id="obstacle-choices"></div>
      <button id="start-btn" style="margin-top:1em;font-size:1.2em;">Start Game</button>
    </div>
  </div>
  <div class="popup" id="gameover-popup" style="display:none;">
    <div class="popup-content">
      <div id="gameover-msg" style="font-size:2em;">Game Over!</div>
      <div id="final-score" style="font-size:1.2em;"></div>
      <button id="restart-btn" style="margin-top:1em;font-size:1.2em;">Restart</button>
    </div>
  </div>
  <script>
    // Emoji options
    const animals = [
      // Reptiles and Amphibians
      '🐢', '🐍', '🐊',

      // Dinosaurs and extinct reptiles
      '🦖', '🦕',

      // Insects and arthropods
      '🐜', '🐝', '🐛', '🦗', '🦟', '🦂',

      // Birds (ordered by color or similarity)
      '🦆', '🪿', '🐓', '🦃', '🦤', '🦢', '🦩', '🦜', '🦅', '🕊️', '🐦‍⬛', '🦇',

      // Big cats and similar mammals
      '🐅', '🐆', '🦓',

      // Primates
      '🐒', '🦍',

      // Large land mammals
      '🐘', '🦣', '🦛', '🦏',

      // Hoofed animals
      '🐃', '🦬', '🐂', '🐄', '🫏', '🐎', '🐪', '🐫', '🦒', '🦌', '🦙', '🐐', '🐏', '🐑',

      // Domesticated animals
      '🐖', '🐕', '🐩', '🦮', '🐕‍🦺', '🐈', '🐈‍⬛',

      // Small mammals
      '🐇', '🐁', '🐀', '🐿️',

      // Misc mammals
      '🦝', '🦨', '🦡', '🦫', '🦔'
    ];
    // Obstacles: always three sizes for each emoji
    const baseObstacles = [
      // Plants - Trees, Logs, Leaves
      '🌵', '🌳', '🌲', '🌴', '🪵', '🪾',
      '🌱', '🌿', '☘️', '🍀', '🍃', '🍂', '🍁',
      '🪴',

      // Nests and Webs
      '🪺', '🪹', '🕸️',

      // Flowers and Flower-like
      '🌾', '💐', '🌷', '🌹', '🥀', '🪻', '🪷', '🌺', '🌸', '🌼', '🌻',

      // Footprints / Animal traces
      '🐾',

      // Objects & Traps
      '🪨', '🪤', '💣',

      // Food/Nature Items
      '🥜',

      // Special case: Mushroom (includes variant)
      '🍄', '🍄‍🟫',

      // Microscopic/Threat
      '🦠'
    ];
    const sizeTypes = [
      {size: 1, label: 'full'},
      {size: 0.75, label: 'medium'},
      {size: 0.25, label: 'small'}
    ];
    // Build all combinations
    const obstacles = [];
    baseObstacles.forEach(emoji => {
      sizeTypes.forEach(st => {
        obstacles.push({emoji, size: st.size});
      });
    });
    // Shuffle helper
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }
    // For random obstacle order
    let obstacleDeck = [];
    function refillObstacleDeck() {
      // Only use the selected obstacle emoji, but randomize size each time
      obstacleDeck = [];
      for (let i = 0; i < 30; ++i) {
        const st = sizeTypes[Math.floor(Math.random() * sizeTypes.length)];
        obstacleDeck.push({emoji: selectedObstacle.emoji || selectedObstacle, size: st.size});
      }
      shuffleArray(obstacleDeck);
    }

    // Removed backgrounds and background selection code
    // Set your background class here:
    const backgroundClass = "bg"; // <-- Set your background class here

    // DOM
    const game = document.getElementById('game');
    const scoreDiv = document.getElementById('score');
    const startPopup = document.getElementById('start-popup');
    const gameoverPopup = document.getElementById('gameover-popup');
    const animalChoices = document.getElementById('animal-choices');
    const obstacleChoices = document.getElementById('obstacle-choices');
    // Removed bgChoices
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    const mobileControls = document.getElementById('mobile-controls');
    const jumpBtn = document.getElementById('jump-btn');
    const finalScore = document.getElementById('final-score');

    // Game state
    let selectedAnimal = animals[0];
    let selectedObstacle = obstacles[0];
    // Removed selectedBg
    let running = false;
    let score = 0;
    let speed = 0.5; // Normal, fixed speed
    let bgSpeed = 0.7;
    let requestId = null;
    let animal = null;
    let obstacleList = [];
    let bgEmojis = [];
    let jumpVelocity = 0;
    let isJumping = false;
    let groundY = 0;
    let jumpPressed = false;
    let jumpStart = false;
    let jumpPower = 0;
    let jumpMax = 13;
    let jumpMin = 7;
    let gravity = 0;
    let lastObstacleTime = 0;
    let obstacleInterval = 1400;
    let lastFrameTime = 0;
    let bgEmojiCount = 18;
    let isMobile = false;

    // --- Weather/Disaster State ---
    const cloudEmojis = ['☁️'];
    const windEmojis = ['💨'];
    const rainDropEmojis = ['💧','💦','🫧'];
    const quakeEmoji = '🌋';
    let clouds = [];
    let winds = [];
    let rains = [];
    let quake = null;
    let windActive = false;
    let rainActive = false;
    let quakeActive = false;
    let windAffectEnd = 0;
    let rainAffectEnd = 0;
    let quakeAffectEnd = 0;
    let nextWindScore = 1500;
    let nextRainScore = 2000;
    let nextQuakeScore = 3000;

    // --- UI Setup ---
    function createEmojiMenu(arr, container, selected, cb) {
      container.innerHTML = '';
      // Only show each emoji once for obstacle selection
      if (container === obstacleChoices) {
        let used = new Set();
        arr.forEach(e => {
          let emoji = typeof e === 'object' ? e.emoji : e;
          if (used.has(emoji)) return;
          used.add(emoji);
          const btn = document.createElement('button');
          btn.className = 'emoji-select' + (emoji === (typeof selected === 'object' ? selected.emoji : selected) ? ' selected' : '');
          btn.textContent = emoji;
          btn.onclick = () => {
            container.querySelectorAll('.emoji-select').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            cb({emoji});
          };
          container.appendChild(btn);
        });
        return;
      }
      arr.forEach(e => {
        const btn = document.createElement('button');
        btn.className = 'emoji-select' + ((typeof e === 'object' ? e.emoji : e) === (typeof selected === 'object' ? selected.emoji : selected) ? ' selected' : '');
        btn.textContent = typeof e === 'object' ? e.emoji : e;
        btn.onclick = () => {
          container.querySelectorAll('.emoji-select').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          cb(e);
        };
        container.appendChild(btn);
      });
    }
    // Removed createBgMenu and background menu setup
    createEmojiMenu(animals, animalChoices, selectedAnimal, a => selectedAnimal = a);
    createEmojiMenu(obstacles, obstacleChoices, selectedObstacle, o => { selectedObstacle = o; refillObstacleDeck(); });

    // --- Game Entities ---
    function resetGameVars() {
      running = true;
      score = 0;
      speed = 0.5;
      bgSpeed = 0.7;
      animal = null;
      obstacleList = [];
      bgEmojis = [];
      jumpVelocity = 0;
      isJumping = false;
      jumpPressed = false;
      jumpStart = false;
      jumpPower = 0;
      lastObstacleTime = 0;
      obstacleInterval = 1400;
      lastFrameTime = 0;
      game.innerHTML = '';
      scoreDiv.textContent = '';
      // Set background class here
      document.body.className = backgroundClass;
      game.className = backgroundClass;
      refillObstacleDeck();
      // Clouds & weather/disaster
      clouds = [];
      winds = [];
      rains = [];
      quake = null;
      windActive = false;
      rainActive = false;
      quakeActive = false;
      windAffectEnd = 0;
      rainAffectEnd = 0;
      quakeAffectEnd = 0;
      nextWindScore = 1500;
      nextRainScore = 2000;
      nextQuakeScore = 3000;
      createClouds();
    }

    function createAnimal() {
      const el = document.createElement('div');
      el.style.position = 'absolute';
      el.style.left = '80vw';
      el.style.bottom = '20vh';
      el.style.fontSize = '8vh';
      el.style.lineHeight = '1';
      el.style.userSelect = 'none';
      el.textContent = selectedAnimal;
      el.setAttribute('aria-label', 'player');
      game.appendChild(el);
      groundY = 20;
      return {el, x: 80, y: groundY, vy: 0, width: 8, height: 8};
    }

    function createObstacle() {
      if (obstacleDeck.length === 0) refillObstacleDeck();
      let obs = obstacleDeck.shift();
      let fontSize = 8 * obs.size;
      let scale = window.innerWidth < 600 ? 0.3 : 1;
      fontSize = fontSize * scale;
      const el = document.createElement('div');
      el.style.position = 'absolute';
      el.style.left = '-10vw';
      el.style.bottom = '20vh';
      el.style.fontSize = fontSize + 'vh';
      el.style.lineHeight = '1';
      el.style.userSelect = 'none';
      el.textContent = obs.emoji;
      el.setAttribute('aria-label', 'obstacle');
      game.appendChild(el);
      return {
        el,
        x: -10,
        y: groundY,
        width: 8 * obs.size * scale,
        height: 8 * obs.size * scale,
        sizeType: obs.size
      };
    }

    // --- Clouds, Wind, Rain, Quake ---
    function createClouds() {
      clouds.forEach(c => c.el.remove());
      clouds = [];
      let n = Math.floor(window.innerWidth / 120) + 4;
      for (let i = 0; i < n; ++i) {
        let emoji = cloudEmojis[0];
        let el = document.createElement('div');
        el.textContent = emoji;
        el.style.position = 'absolute';
        el.style.top = (2 + Math.random() * 3) + 'vh';
        el.style.left = (Math.random() * 100) + 'vw';
        el.style.fontSize = (5 + Math.random() * 3) + 'vh';
        el.style.opacity = 0.85;
        el.style.pointerEvents = 'none';
        el.style.zIndex = 2;
        el.className = 'bg-emoji';
        game.appendChild(el);
        clouds.push({
          el,
          x: parseFloat(el.style.left),
          y: parseFloat(el.style.top),
          speed: 0.04 + Math.random() * 0.06
        });
      }
    }

    function spawnWind() {
      if (rainActive || quakeActive) return;
      winds.forEach(w => w.el.remove());
      winds = [];
      let n = Math.floor(2 + Math.random() * 2);
      for (let i = 0; i < n; ++i) {
        let emoji = windEmojis[0];
        let el = document.createElement('div');
        el.textContent = emoji;
        el.style.position = 'absolute';
        el.style.top = (8 + Math.random() * 3) + 'vh';
        el.style.left = (Math.random() * 100) + 'vw';
        el.style.fontSize = (4.5 + Math.random() * 2) + 'vh';
        el.style.opacity = 0.85;
        el.style.pointerEvents = 'none';
        el.style.zIndex = 3;
        el.className = 'bg-emoji';
        game.appendChild(el);
        winds.push({
          el,
          x: parseFloat(el.style.left),
          y: parseFloat(el.style.top),
          speed: 0.22 + Math.random() * 0.12,
          width: 7,
          height: 4
        });
      }
      windActive = true;
      windAffectEnd = performance.now() + 1800;
    }

    function spawnRain() {
      if (windActive || quakeActive) return;
      rains.forEach(r => r.el.remove());
      rains = [];
      let dropCount = Math.floor(window.innerWidth / 40);
      for (let i = 0; i < dropCount; ++i) {
        let emoji = rainDropEmojis[Math.floor(Math.random() * rainDropEmojis.length)];
        let el = document.createElement('div');
        el.textContent = emoji;
        el.style.position = 'absolute';
        el.style.left = (Math.random() * 100) + 'vw';
        el.style.top = (-5 + Math.random() * 5) + 'vh';
        el.style.fontSize = (2.5 + Math.random() * 1.5) + 'vh';
        el.style.opacity = 0.7 + Math.random() * 0.3;
        el.style.pointerEvents = 'none';
        el.style.zIndex = 4;
        el.className = 'bg-emoji';
        game.appendChild(el);
        rains.push({
          el,
          x: parseFloat(el.style.left),
          y: parseFloat(el.style.top),
          speed: 0.25 + Math.random() * 0.15
        });
      }
      rainActive = true;
      rainAffectEnd = performance.now() + 2200;
    }

    function spawnQuake() {
      if (windActive || rainActive) return;
      if (quake && quake.el) quake.el.remove();
      quake = null;
      quakeActive = true;
      quakeAffectEnd = performance.now() + 1800;
      let el = document.createElement('div');
      el.textContent = quakeEmoji;
      el.style.position = 'absolute';
      el.style.left = '50vw';
      el.style.bottom = '2vh';
      el.style.transform = 'translateX(-50%)';
      el.style.fontSize = '7vh';
      el.style.opacity = 0.95;
      el.style.pointerEvents = 'none';
      el.style.zIndex = 10;
      el.className = 'bg-emoji';
      game.appendChild(el);
      quake = {el};
    }

    function updateClouds(dt) {
      clouds.forEach(c => {
        c.x += c.speed * dt / 16;
        if (c.x > 110) c.x = -10;
        c.el.style.left = c.x + 'vw';
      });
    }

    function updateWinds(dt) {
      winds.forEach(w => {
        w.x += w.speed * dt / 16;
        if (w.x > 110) w.x = -10;
        w.el.style.left = w.x + 'vw';
      });
    }

    function updateRains(dt) {
      rains.forEach(r => {
        r.y += r.speed * dt / 16;
        if (r.y > 110) r.y = -10;
        r.el.style.top = r.y + 'vh';
      });
    }

    function isAnimalInWind() {
      let ax = animal.x, ay = animal.y, aw = animal.width, ah = animal.height;
      for (let w of winds) {
        let wx = w.x, wy = w.y, ww = w.width, wh = w.height;
        if (
          ax + aw * 0.7 > wx && ax < wx + ww * 0.7 &&
          ay + ah > wy && ay < wy + wh
        ) {
          return true;
        }
      }
      return false;
    }

    // --- Game Loop ---
    function gameLoop(ts) {
      if (!running) return;
      if (!lastFrameTime) lastFrameTime = ts;
      let dt = ts - lastFrameTime;
      lastFrameTime = ts;

      // Clouds always move
      updateClouds(dt);

      // Weather/disaster triggers (never overlap)
      if (!windActive && !rainActive && !quakeActive) {
        if (score >= nextRainScore) {
          spawnRain();
          nextRainScore += 2000 + Math.random() * 1000;
        } else if (score >= nextQuakeScore) {
          spawnQuake();
          nextQuakeScore += 2500 + Math.random() * 1000;
        } else if (score >= nextWindScore) {
          spawnWind();
          nextWindScore += 300 + Math.random() * 200;
        }
      }

      // Wind logic
      if (windActive) {
        updateWinds(dt);
        if (performance.now() > windAffectEnd) {
          winds.forEach(w => w.el.remove());
          winds = [];
          windActive = false;
        }
      }

      // Rain logic
      if (rainActive) {
        updateRains(dt);
        if (performance.now() > rainAffectEnd) {
          rains.forEach(r => r.el.remove());
          rains = [];
          rainActive = false;
        }
      }

      // Quake logic
      if (quakeActive) {
        // Shake effect: apply to game container
        let shake = Math.random() * 8 - 4;
        let shakeY = Math.random() * 4 - 2;
        game.style.transform = `translate(${shake}px,${shakeY}px)`;
        if (performance.now() > quakeAffectEnd) {
          quakeActive = false;
          if (quake && quake.el) quake.el.remove();
          quake = null;
          game.style.transform = '';
        }
      } else {
        game.style.transform = '';
      }

      // Effects: wind, rain, quake
      let windEffect = windActive; // windActive means wind is blowing
      let rainEffect = rainActive;
      let quakeEffect = quakeActive;

      // Only wind speeds things up, but does NOT affect gravity or jump velocity
      let jumpVelocityInit = rainEffect ? 7.5 : 7.5;
      let gravityVal = rainEffect ? 0.8 : 0.5;
      let speedVal = windEffect ? 1.2 : 0.5;

      // Background speed stays fixed
      bgSpeed = speedVal / 2.5;

      if (!animal.isJumping) animal.isJumping = false;
      if (!animal.vy) animal.vy = 0;

      if (jumpPressed && !animal.isJumping) {
        animal.isJumping = true;
        animal.vy = jumpVelocityInit;
      }

      if (animal.isJumping) {
        animal.y += animal.vy;
        animal.vy -= gravityVal;
        if (animal.y <= groundY) {
          animal.y = groundY;
          animal.isJumping = false;
          animal.vy = 0;
        }
      }

      animal.el.style.bottom = animal.y + 'vh';
      animal.el.style.left = animal.x + 'vw';

      // Obstacles
      for (let i = obstacleList.length - 1; i >= 0; --i) {
        let obs = obstacleList[i];
        obs.x += speedVal * dt / 16;
        obs.el.style.left = obs.x + 'vw';
        if (obs.x > 110) {
          obs.el.remove();
          obstacleList.splice(i, 1);
          continue;
        }
        // Collision (unchanged)
        let ax = animal.x, ay = animal.y, aw = animal.width, ah = animal.height;
        let ox = obs.x, oy = obs.y, ow = obs.width, oh = obs.height;
        if (
          ax + aw * 0.7 > ox && ax < ox + ow * 0.7 &&
          ay < oy + oh * 0.7 && ay + ah * 0.7 > oy
        ) {
          if (ay > oy + oh * 0.7) continue;
          running = false;
          setTimeout(showGameOver, 300);
          return;
        }
      }
      // Spawn obstacles
      if (ts - lastObstacleTime > obstacleInterval) {
        obstacleList.push(createObstacle());
        lastObstacleTime = ts;
        obstacleInterval = Math.max(500, 1200 + Math.random() * 700);
      }
      // Score
      score += dt / 16;
      scoreDiv.textContent = Math.floor(score);

      requestId = requestAnimationFrame(gameLoop);
    }

    // --- Controls ---
    function handleKey(e) {
      if (!running) return;
      if (e.code === 'Space') {
        if (!jumpPressed) {
          jumpPressed = true;
        }
        e.preventDefault();
      }
    }
    function handleKeyUp(e) {
      if (!running) return;
      if (e.code === 'Space') {
        jumpPressed = false;
        e.preventDefault();
      }
    }
    function handleTouchStart(e) {
      if (!running) return;
      jumpPressed = true;
      e.preventDefault();
    }
    function handleTouchEnd(e) {
      if (!running) return;
      jumpPressed = false;
      e.preventDefault();
    }

    // --- Game Start/Restart ---
    function startGame() {
      startPopup.style.display = 'none';
      gameoverPopup.style.display = 'none';
      resetGameVars();
      animal = createAnimal();
      mobileControls.style.display = 'none';
      requestId = requestAnimationFrame(gameLoop);
    }
    function showGameOver() {
      running = false;
      cancelAnimationFrame(requestId);
      finalScore.textContent = `Score: ${Math.floor(score)}`;
      gameoverPopup.style.display = '';
      mobileControls.style.display = 'none';
      // Remove clouds and weather/disaster
      clouds.forEach(c => c.el.remove());
      clouds = [];
      winds.forEach(w => w.el.remove());
      winds = [];
      rains.forEach(r => r.el.remove());
      rains = [];
      if (quake && quake.el) quake.el.remove();
      quake = null;
      game.style.transform = '';
    }
    function restartGame() {
      startPopup.style.display = '';
      gameoverPopup.style.display = 'none';
      mobileControls.style.display = 'none';
      createEmojiMenu(animals, animalChoices, selectedAnimal, a => selectedAnimal = a);
      createEmojiMenu(obstacles, obstacleChoices, selectedObstacle, o => { selectedObstacle = o; refillObstacleDeck(); });
      // Removed createBgMenu
    }

    // --- Event Listeners ---
    startBtn.onclick = startGame;
    restartBtn.onclick = restartGame;
    window.addEventListener('keydown', handleKey);
    window.addEventListener('keyup', handleKeyUp);
    game.addEventListener('touchstart', handleTouchStart, {passive:false});
    game.addEventListener('touchend', handleTouchEnd, {passive:false});
    game.addEventListener('mousedown', function(e) {
      if (!running) return;
      jumpPressed = true;
      e.preventDefault();
    });
    game.addEventListener('mouseup', function(e) {
      if (!running) return;
      jumpPressed = false;
      e.preventDefault();
    });
    game.addEventListener('touchmove', e => e.preventDefault(), {passive:false});

    // --- Mobile Controls Show/Hide ---
    mobileControls.style.display = 'none';

    // --- Start at menu ---
    restartGame();
  </script>
</body>
</html>
