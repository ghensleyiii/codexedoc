<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telephone Number Validator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --dark-steel: #295d8a;
        --steel: #4a7fb2;
        --light-steel: #B0C4DE;
        --white: #eeeeee;
        --black: #333333;
      }

      body {
        background-color: var(--dark-steel);
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        color: var(--white);
      }

      main {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        padding: 40px 10px;
      }

      h1 {
        color: var(--white);
        width: 100%;
        max-width: 480px;
        margin: 15px 0;
        text-align: center;
      }

      .phone-container {
        position: relative;
        background-color: var(--light-steel);
        width: 250px;
        height: 460px;
        margin: 30px auto;
        border-radius: 15px;
        border: 15px solid var(--black);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .phone-background {
        background-color: var(--black);
        width: 100%;
        height: 25px;
      }

      .phone-camera {
        background-color: var(--white);
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin: auto;
      }

      label {
        color: var(--black);
        margin: 10px auto 5px;
      }

      #user-input {
        display: block;
        margin: 10px auto;
        padding: 5px;
        border: 1px solid var(--black);
        border-radius: 10px;
        text-align: center;
        width: 90%;
        height: 42px;
        font-size: 16px;
      }

      .phone-footer {
        background-color: var(--black);
        width: 100%;
        height: 40px;
        position: absolute;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .btn-styles {
        cursor: pointer;
        text-decoration: none;
        background-color: var(--steel);
        border: none;
        border-radius: 5px;
        color: var(--white);
        padding: 6px 12px;
        font-weight: bold;
        margin: 10px;
      }

      #results-div {
        overflow-y: auto;
        height: 265px;
        width: 100%;
      }

      .results-text {
        font-size: 1.2rem;
        padding: 5px;
        text-align: center;
        margin: 10px 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Telephone Number Validator</h1>
      <div class="phone-container">
        <div class="phone-background">
          <div class="phone-camera"></div>
        </div>
        <label for="user-input">Enter a Phone Number:</label>
        <input maxlength="20" type="text" id="user-input" value="">
        <div id="results-div"></div>
        <div class="phone-footer">
          <button class="btn-styles" id="check-btn">Check</button>
          <button class="btn-styles" id="clear-btn">Clear</button>
        </div>
      </div>
    </main>

    <script>
      const userInput = document.getElementById('user-input');
      const checkBtn = document.getElementById('check-btn');
      const clearBtn = document.getElementById('clear-btn');
      const resultsDiv = document.getElementById('results-div');

      const checkVldNum = input => {
        if (input === '') {
          alert('Please provide a phone number');
          return;
        }
        const phnRegex = /^(1\s?)?(\([0-9]{3}\)|[0-9]{3})[\s\-]?[0-9]{3}[\s\-]?[0-9]{4}$/;
        
        const parTag = document.createElement('p');
        parTag.className = 'results-text';
        parTag.style.color = phnRegex.test(input) ? '#00cc00' : '#cc0000';
        parTag.appendChild(
          document.createTextNode(
            `${phnRegex.test(input) ? 'Valid' : 'Invalid'} US number: ${input}`
          )
        );
        resultsDiv.appendChild(parTag);
      };

      checkBtn.addEventListener('click', () => {
        checkVldNum(userInput.value);
        userInput.value = '';
      });

      userInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          checkVldNum(userInput.value);
          userInput.value = '';
        }
      });

      clearBtn.addEventListener('click', () => {
        resultsDiv.textContent = '';
      });
    </script>
  </body>
</html>
