<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <title>Codexedoc Laptop Defense</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #eeeeee;
            font-family: Arial, sans-serif;
            overflow: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0 20px 20px 20px; /* No top padding to keep header at top */
        }

        /* Header Styles (Unchanged from Last Fix) */
        header {
            background-color: #eeeeee;
            padding: 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            width: 100%;
            left: 0;
            margin: 0;
        }

        .logo {
            font-size: 3rem;
            font-weight: bold;
            color: #333333;
            display: inline-block;
            font-family: 'Audiowide', cursive, sans-serif;
        }

        header .logo a,
        header .logo a:link,
        header .logo a:visited,
        header .logo a:active {
            color: #333333;
            text-decoration: none;
            transition: color 0.3s;
            font-family: 'Audiowide', cursive, sans-serif;
        }

        header .logo a:hover {
            color: #1e90ff;
        }

        .logo span {
            font-family: 'Audiowide', cursive, sans-serif;
            color: #1e90ff;
            font-size: 4rem;
            vertical-align: baseline;
            position: relative;
            top: 0.30rem;
        }

        /* Footer Styles (Unchanged from Last Fix) */
        footer {
            background-color: #333333;
            color: #1e90ff;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            width: 100%;
        }

        footer a {
            color: #eeeeee;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .footer-logo {
            font-size: 0.9rem;
            color: #eeeeee;
            font-weight: bold;
        }

        .footer-logo span {
            color: #1e90ff;
        }

        /* Game-Specific Styles (Mostly Unchanged) */
        #gameInstructions {
            color: #333333;
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            text-align: center;
            margin-bottom: 15px;
            max-width: 90%;
            opacity: 0.9;
            padding: 50px 20px;
        }

        #gameInstructions h2 {
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        #gameCounter {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 25%;
            margin: 0 auto;
            padding: 8px 15px;
            background: #eee;
            border-radius: 8px;
            border: 1px solid #1e90ff;
            box-shadow: 0 0 10px #1e90ff;
            margin-top: 10px;
            margin-bottom: 40px; /* Added space above footer */
        }

        .counter-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }

        .counter-label {
            color: #1e90ff;
            font-size: clamp(0.8rem, 1.6vw, 1rem);
            font-weight: bold;
            text-transform: uppercase;
        }

        .counter-value {
            color: #00cc00;
            font-size: clamp(1rem, 2vw, 1.3rem);
            font-weight: bold;
            margin: 2px 0;
        }

        .counter-desc {
            color: #333;
            font-size: clamp(0.6rem, 1.4vw, 0.8rem);
            opacity: 0.8;
            text-align:<Transaction center;
        }

        #gameContainer {
            position: relative;
            width: 90%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            margin: 0 auto;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            border: 1px solid #1e90ff;
            display: block;
            position: relative;
            z-index: 1;
        }

        .tower-spot {
            position: absolute;
            width: clamp(15px, 3.5vw, 25px);
            height: clamp(15px, 3.5vw, 25px);
            background-color: #1e90ff;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        .tower-spot:hover {
            background-color: #eee;
        }

        #startButton {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 25px;
            font-size: clamp(0.9rem, 1.8vw, 1.3rem);
            font-weight: bold;
            color: #ffffff;
            background-color: #00cc00;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 10;
            display: block;
        }

        #startButton:hover {
            background-color: #00cc00;
        }

        /* Responsive Header and Footer Styles */
        @media (max-width: 768px) {
            .logo {
                font-size: 2rem;
            }

            .logo span {
                font-size: 3rem;
                vertical-align: baseline;
                position: relative;
                top: 0.30rem;
            }
        }

        /* Game-Specific Responsive Styles */
        @media (max-width: 600px) {
            body {
                padding: 0 10px 10px 10px;
            }

            #gameCounter {
                gap: 8px;
                padding: 5px 10px;
                margin-bottom: 30px; /* Adjusted space for smaller screens */
            }

            .counter-section {
                min-width: 45px;
            }

            .tower-spot {
                width: clamp(12px, 4vw, 18px);
                height: clamp(12px, 4vw, 18px);
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="code.html">CODE</a><a href="index.html"><span>X</span></a><a href="edoc.html">EDOC</a>
        </div>
    </header>
    <div id="gameInstructions">
        <h2>Protect the laptop (💻) from incoming bugs (☣️/☢️).</h2>
        <h2>Use COD points to place DOC (📗) on blue spots.</h2>
    </div>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <button id="startButton">START</button>
    </div>
    <div id="gameCounter">
        <div class="counter-section">
            <span class="counter-label">COD</span>
            <span class="counter-value" id="codValue">4</span>
            <span class="counter-desc">Code Points</span>
        </div>
        <div class="counter-section">
            <span class="counter-label">EXE</span>
            <span class="counter-value" id="exeValue">0</span>
            <span class="counter-desc">Executed Bugs</span>
        </div>
        <div class="counter-section">
            <span class="counter-label">DOC</span>
            <span class="counter-value" id="docValue">2</span>
            <span class="counter-desc">Document Price</span>
        </div>
    </div>
    <footer>
        <p><span class="footer-logo">CODE<span><a class="bible" href="bible.html">X</a></span>EDOC</span></p>
        <p>Copyright © 2025 CODEXEDOC. All Rights Reserved.</p>
        <p><a href="mailto:contact@codexedoc.com">contact@codexedoc.com</a></p>
    </footer>
    <script>
        const container = document.getElementById('gameContainer');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');
        const gameInstructions = document.getElementById('gameInstructions');

        function resizeCanvas() {
            const maxWidth = 800;
            const maxHeight = 600;
            const aspectRatio = maxWidth / maxHeight;
            
            const availableWidth = window.innerWidth * 0.9;
            const availableHeight = window.innerHeight * 0.8;
            
            let width = Math.min(availableWidth, maxWidth);
            let height = width / aspectRatio;
            
            if (height > availableHeight) {
                height = availableHeight;
                width = height * aspectRatio;
            }

            canvas.width = width;
            canvas.height = height;
            container.style.width = `${width}px`;
            container.style.height = `${height}px`;
        }

        let cod = 4;
        let exe = 0;
        let doc = 2;
        let towers = [];
        let enemies = [];
        let towerSpots = [];
        let enemySpawnRate = 1000;
        let lastSpawn = 0;
        let gameOver = false;
        let gameWon = false;
        let towerCount = 0;
        let gameStarted = false;

        function getScaledPath() {
            const scaleX = canvas.width / 800;
            const scaleY = canvas.height / 600;
            return [
                {x: 0, y: 300 * scaleY},
                {x: 200 * scaleX, y: 300 * scaleY},
                {x: 200 * scaleX, y: 100 * scaleY},
                {x: 400 * scaleX, y: 100 * scaleY},
                {x: 400 * scaleX, y: 500 * scaleY},
                {x: 600 * scaleX, y: 500 * scaleY},
                {x: 600 * scaleX, y: 300 * scaleY},
                {x: 800 * scaleX, y: 300 * scaleY}
            ];
        }

        function calculatePathLength(path) {
            let totalLength = 0;
            for (let i = 0; i < path.length - 1; i++) {
                const dx = path[i + 1].x - path[i].x;
                const dy = path[i + 1].y - path[i].y;
                totalLength += Math.sqrt(dx * dx + dy * dy);
            }
            return totalLength;
        }

        function getPositionAtDistance(path, distance) {
            let currentLength = 0;
            for (let i = 0; i < path.length - 1; i++) {
                const dx = path[i + 1].x - path[i].x;
                const dy = path[i + 1].y - path[i].y;
                const segmentLength = Math.sqrt(dx * dx + dy * dy);
                
                if (currentLength + segmentLength >= distance) {
                    const remaining = distance - currentLength;
                    const t = remaining / segmentLength;
                    return {
                        x: path[i].x + t * dx,
                        y: path[i].y + t * dy,
                        segment: i
                    };
                }
                currentLength += segmentLength;
            }
            return { x: path[path.length - 1].x, y: path[path.length - 1].y, segment: path.length - 1 };
        }

        function createTowerSpots() {
            towerSpots.forEach(spot => spot.remove());
            towerSpots = [];
            
            const path = getScaledPath();
            const offset = 40 * (canvas.height / 600);
            const totalLength = calculatePathLength(path);
            const numberOfSpots = 8;
            const stepSize = totalLength / (numberOfSpots - 1);

            for (let i = 0; i < numberOfSpots; i++) {
                const distance = i * stepSize;
                const pos = getPositionAtDistance(path, distance);
                
                let dx = 0, dy = 0;
                if (pos.segment < path.length - 1) {
                    dx = path[pos.segment + 1].x - path[pos.segment].x;
                    dy = path[pos.segment + 1].y - path[pos.segment].y;
                }
                const length = Math.sqrt(dx * dx + dy * dy);
                if (length > 0) {
                    dx /= length;
                    dy /= length;
                }
                
                const perpX = -dy;
                const perpY = dx;

                const spot1 = document.createElement('div');
                spot1.className = 'tower-spot';
                spot1.style.left = `${pos.x + perpX * offset}px`;
                spot1.style.top = `${pos.y + perpY * offset}px`;
                spot1.onclick = () => placeTower(pos.x + perpX * offset, pos.y + perpY * offset, spot1);
                container.appendChild(spot1);
                towerSpots.push(spot1);

                const spot2 = document.createElement('div');
                spot2.className = 'tower-spot';
                spot2.style.left = `${pos.x - perpX * offset}px`;
                spot2.style.top = `${pos.y - perpY * offset}px`;
                spot2.onclick = () => placeTower(pos.x - perpX * offset, pos.y - perpY * offset, spot2);
                container.appendChild(spot2);
                towerSpots.push(spot2);
            }
        }

        class Tower {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.range = 100 * (canvas.width / 800);
                this.cooldown = 0;
            }

            draw() {
                ctx.font = `${30 * (canvas.height / 600)}px Arial`;
                ctx.fillStyle = '#1e90ff';
                ctx.fillText(this.type, this.x - (15 * canvas.width / 800), this.y + (10 * canvas.height / 600));
            }

            shoot() {
                if (this.cooldown <= 0) {
                    for (let enemy of enemies) {
                        const distance = Math.sqrt(
                            Math.pow(enemy.x - this.x, 2) + Math.pow(enemy.y - this.y, 2)
                        );
                        if (distance < this.range) {
                            enemy.health--;
                            this.cooldown = 100;
                            return;
                        }
                    }
                }
                this.cooldown--;
            }
        }

        class Enemy {
            constructor() {
                const path = getScaledPath();
                this.x = path[0].x;
                this.y = path[0].y;
                this.health = 2;
                this.baseSpeed = 1 * (canvas.width / 800);
                this.speedMultiplier = 1;
                this.speed = this.baseSpeed * this.speedMultiplier;
                this.pathIndex = 1;
                this.type = Math.random() < 0.5 ? '☣️' : '☢️';
            }

            updateSpeed(multiplier) {
                this.speedMultiplier = multiplier;
                this.speed = this.baseSpeed * this.speedMultiplier;
            }

            move() {
                const path = getScaledPath();
                const target = path[this.pathIndex];
                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < this.speed) {
                    this.x = target.x;
                    this.y = target.y;
                    this.pathIndex++;
                    if (this.pathIndex >= path.length) {
                        gameOver = true;
                    }
                } else {
                    this.x += (dx / distance) * this.speed;
                    this.y += (dy / distance) * this.speed;
                }
            }

            draw() {
                ctx.font = `${20 * (canvas.height / 600)}px Arial`;
                ctx.fillStyle = '#00cc00';
                ctx.fillText(this.type, this.x - (10 * canvas.width / 800), this.y + (10 * canvas.height / 600));
            }
        }

        function placeTower(x, y, spot) {
            if (cod >= doc && !towers.some(t => t.x === x && t.y === y)) {
                cod -= doc;
                doc = Math.floor(doc * 1.5);
                const type = '📗';
                towers.push(new Tower(x, y, type));
                towerCount++;
                spot.style.display = 'none';
                updateGameCounter();
            }
        }

        function spawnEnemy() {
            enemies.push(new Enemy());
            enemySpawnRate = Math.max(500, enemySpawnRate * 0.98);
        }

        function updateGameCounter() {
            document.getElementById('codValue').textContent = cod;
            document.getElementById('exeValue').textContent = exe;
            document.getElementById('docValue').textContent = doc;
        }

        function gameLoop(timestamp) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!gameStarted) {
                const path = getScaledPath();
                ctx.beginPath();
                ctx.strokeStyle = '#1e90ff';
                ctx.lineWidth = 40 * (canvas.width / 800);
                ctx.moveTo(path[0].x, path[0].y);
                for (let point of path) {
                    ctx.lineTo(point.x, point.y);
                }
                ctx.stroke();

                ctx.font = `${40 * (canvas.height / 600)}px Arial`;
                ctx.fillStyle = '#ffffff';
                ctx.fillText('💻', path[path.length - 1].x - (40 * canvas.width / 800), path[path.length - 1].y + (15 * canvas.height / 600));

                requestAnimationFrame(gameLoop);
                return;
            }

            if (gameOver) {
                ctx.fillStyle = '#00cc00';
                ctx.font = `${40 * (canvas.height / 600)}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
                ctx.textAlign = 'start';
                return;
            }

            if (gameWon) {
                ctx.fillStyle = '#1e90ff';
                ctx.font = `${40 * (canvas.height / 600)}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText('YOU WIN', canvas.width / 2, canvas.height / 2);
                ctx.textAlign = 'start';
                return;
            }

            const path = getScaledPath();
            ctx.beginPath();
            ctx.strokeStyle = '#1e90ff';
            ctx.lineWidth = 40 * (canvas.width / 800);
            ctx.moveTo(path[0].x, path[0].y);
            for (let point of path) {
                ctx.lineTo(point.x, point.y);
            }
            ctx.stroke();

            ctx.font = `${40 * (canvas.height / 600)}px Arial`;
            ctx.fillStyle = '#ffffff';
            ctx.fillText('💻', path[path.length - 1].x - (40 * canvas.width / 800), path[path.length - 1].y + (15 * canvas.height / 600));

            if (timestamp - lastSpawn > enemySpawnRate) {
                spawnEnemy();
                lastSpawn = timestamp;
            }

            towers.forEach(tower => {
                tower.shoot();
                tower.draw();
            });

            const speedMultiplier = 1 + Math.floor(exe / 64) * 0.25;

            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].updateSpeed(speedMultiplier);
                enemies[i].move();
                enemies[i].draw();
                if (enemies[i].health <= 0) {
                    enemies.splice(i, 1);
                    cod += 1;
                    exe += 1;
                    updateGameCounter();
                    if (exe >= 314) {
                        gameWon = true;
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }

        startButton.addEventListener('click', () => {
            gameStarted = true;
            startButton.style.display = 'none';
            gameInstructions.style.display = 'none';
            createTowerSpots();
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            if (gameStarted) {
                createTowerSpots();
            }
        });
        
        resizeCanvas();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
