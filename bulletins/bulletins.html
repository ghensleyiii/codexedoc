<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulletins</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="apple-touch-icon.png">
    <style>
      :root {
    --dark-steel: #295d8a !important;
    --steel: #4a7fb2 !important;
    --light-steel: #B0C4DE !important;
    --white: #eeeeee !important;
    --black: #333333 !important;
}

* {
    box-sizing: border-box !important;
    margin: 0 !important;
    padding: 0 !important;
}

body {
    font-family: Arial, sans-serif !important;
    background-color: var(--white) !important;
    color: var(--black) !important;
    line-height: 1.6 !important;
}

header {
    background: linear-gradient(90deg, var(--dark-steel), var(--steel), var(--dark-steel)) !important;
    padding: 20px !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1) !important;
    position: sticky !important;
    top: 0 !important;
    z-index: 100 !important;
}

.logo h1 {
    font-family: 'Audiowide', sans-serif !important;
    color: var(--white) !important;
    font-size: 45px !important;
    margin: 0 !important;
}

.logo a {
    text-decoration: none !important;
    color: var(--white) !important;
}

main {
    max-width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
}

.categories-container {
    margin: 40px 0 !important;
    padding: 0 20px !important;
}

.categories-container h2 {
    font-family: 'Audiowide', sans-serif !important;
    color: var(--dark-steel) !important;
    text-align: center !important;
    margin-bottom: 20px !important;
}

.categories {
    display: grid !important;
    grid-template-columns: 1fr !important;
    gap: 20px !important;
    max-width: 1400px !important;
    margin: 0 auto !important;
}

@media (min-width: 768px) {
    .categories {
        grid-template-columns: repeat(2, 1fr) !important;
    }
}

@media (min-width: 1024px) {
    .categories {
        grid-template-columns: repeat(4, 1fr) !important;
    }
}

.category {
    padding: 20px !important;
    border-radius: 10px !important;
    text-align: center !important;
    transition: transform 0.3s, box-shadow 0.3s !important;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1) !important;
    min-height: 180px !important;
    display: flex !important;
    flex-direction: column !important;
    justify-content: center !important;
    background: linear-gradient(90deg, var(--dark-steel), var(--steel), var(--dark-steel)) !important;
}

.category:hover {
    transform: translateY(-5px) !important;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2) !important;
}

.category a {
    text-decoration: none !important;
    color: var(--black) !important;
}

.category i {
    font-size: 24px !important;
    color: var(--white) !important;
    margin-bottom: 10px !important;
}

.category h3 {
    font-family: 'Audiowide', sans-serif !important;
    color: var(--white) !important;
    margin-bottom: 10px !important;
}

.category p {
    font-size: 14px !important;
    color: var(--white) !important;
}

.item {
    margin-bottom: 20px !important;
    max-width: 800px !important;
    margin-left: auto !important;
    margin-right: auto !important;
}

.item-button {
    display: block !important;
    width: 100% !important;
    padding: 15px !important;
    font-family: 'Audiowide', sans-serif !important;
    background: linear-gradient(90deg, var(--dark-steel), var(--steel), var(--dark-steel)) !important;
    border: none !important;
    color: var(--white) !important;
    text-align: center !important;
    cursor: pointer !important;
    border-radius: 5px !important;
    transition: background 0.3s !important;
}

.item-button:hover {
    background: linear-gradient(90deg, var(--steel)) !important;
}

.item-content {
    padding: 20px !important;
    background: var(--white) !important;
    border-radius: 0 0 5px 5px !important;
    text-align: center !important;
}

.items-container .item-content h3 {
    margin-top: 40px !important;
    margin-bottom: 25px !important;
    margin-left: 0 !important;
    margin-right: 0 !important;
    font-family: 'Audiowide', sans-serif !important;
    color: var(--dark-steel) !important;
    font-size: 1.5em !important;
    text-transform: uppercase !important;
}

.input-section {
    max-width: 90% !important;
    width: 100% !important;
    margin: 2rem auto !important;
    padding: 0 0.5rem !important;
}

input, textarea {
    width: 100% !important;
    margin: 10px 0 !important;
    padding: 8px !important;
    border: 1px solid var(--black) !important;
    border-radius: 4px !important;
    background-color: var(--white) !important;
    color: var(--black) !important;
}

.search-section {
    max-width: 90% !important;
    width: 100% !important;
    margin: 0 auto !important;
    padding: 0 0.5rem !important;
}

#searchInput {
    width: 100% !important;
}

.highlight {
    background-color: var(--light-steel) !important;
    padding: 2px 4px !important;
    border-radius: 3px !important;
}

.article {
    max-width: 90% !important;
    width: 100% !important;
    margin: 0 auto 2rem auto !important;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1) !important;
    padding: 1rem !important;
    background: var(--white) !important;
}

.article h2 {
    color: var(--dark-steel) !important;
    margin: 0 0 0.5rem 0 !important;
    font-size: 1.5rem !important;
    font-family: 'Audiowide', sans-serif !important;
}

.article .notes-preview {
    color: var(--black) !important;
    margin: 0 0 0.5rem 0 !important;
}

.article-footer {
    display: flex !important;
    justify-content: space-between !important;
    align-items: center !important;
    margin-top: 1rem !important;
    flex-wrap: wrap !important;
    gap: 0.5rem !important;
}

.edit-link, .open-link {
    cursor: pointer !important;
    color: var(--steel) !important;
    text-decoration: underline !important;
}

.edit-link:hover,
.open-link:hover {
    color: var(--dark-steel) !important;
}

.notes-preview {
    overflow: hidden !important;
}

.order-controls {
    display: flex !important;
    align-items: center !important;
    gap: 8px !important;
    flex-wrap: wrap !important;
}

.order-input {
    width: 50px !important;
    padding: 5px !important;
}

.btn-study#saveBtn, .btn-study#backupBtn, .btn-study#restoreBtn {
    background: linear-gradient(90deg, var(--dark-steel), var(--steel)) !important;
    color: var(--white) !important;
    padding: 8px 16px !important;
    border: none !important;
    border-radius: 4px !important;
    cursor: pointer !important;
    width: 100% !important;
    max-width: 200px !important;
    margin: 10px auto !important;
    display: block !important;
    font-family: 'Audiowide', sans-serif !important;
}

.btn-study#saveBtn:hover, .btn-study#backupBtn:hover, .btn-study#restoreBtn:hover {
    background: linear-gradient(90deg, var(--steel)) !important;
}

.btn-study#deleteBtn {
    background: linear-gradient(90deg, #ff4d4d, #cc0000, #ff4d4d) !important;
    color: var(--white) !important;
    padding: 8px 16px !important;
    border: none !important;
    border-radius: 4px !important;
    cursor: pointer !important;
    width: 100% !important;
    max-width: 200px !important;
    margin: 10px auto !important;
    display: none;
    font-family: 'Audiowide', sans-serif !important;
}

.btn-study#deleteBtn:hover {
    background: linear-gradient(90deg, #cc0000) !important;
}

.btn-study#deleteBtn.confirm {
    background: linear-gradient(90deg, #b30000, #990000) !important;
}

.btn-study#deleteBtn.confirm:hover {
    background: linear-gradient(90deg, #990000) !important;
}

.backup-restore-buttons {
    display: flex !important;
    justify-content: center !important;
    gap: 10px !important;
    flex-wrap: wrap !important;
    margin: 1rem auto !important;
    max-width: 90% !important;
    width: 100% !important;
    padding: 0 0.5rem !important;
}

footer {
    background: linear-gradient(90deg, var(--dark-steel), var(--steel), var(--dark-steel)) !important;
    text-align: center !important;
    padding: 20px !important;
    color: var(--white) !important;
    box-shadow: 0 -4px 6px rgba(0, 0, 0, 0.1) !important;
    width: 100% !important;
}

footer p {
    margin: 10px 0 0 !important;
}

footer a {
    color: var(--white) !important;
}

@media (max-width: 600px) {
    .input-section, .search-section, .article, .backup-restore-buttons {
        max-width: 90% !important;
        padding: 0 0.25rem !important;
    }

    .article h2 {
        font-size: 1.25rem !important;
    }

    .order-input {
        width: 40px !important;
    }

    .edit-link, .open-link {
        font-size: 0.9rem !important;
    }

    .btn-study#saveBtn, .btn-study#deleteBtn, .btn-study#backupBtn, .btn-study#restoreBtn {
        padding: 6px 12px !important;
    }
}

/* Added styles for clickable links in notes */
.notes-preview a {
    color: var(--steel) !important;
    text-decoration: underline !important;
    cursor: pointer !important;
}

.notes-preview a:hover {
    color: var(--dark-steel) !important;
    text-decoration: none !important;
}
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1><a href="../index.html">BULLETINS</a></h1>
        </div>
    </header>

    <div class="backup-restore-buttons">
        <button id="backupBtn" class="btn-study">Backup Data</button>
        <button id="restoreBtn" class="btn-study">Restore Data</button>
        <input type="file" id="restoreInput" accept=".codex,.json,.codexexedoc" style="display: none;">
    </div>

    <div class="input-section">
        <input type="text" id="titleInput" placeholder="Enter article title">
        <input type="number" id="orderInput" placeholder="Enter article order" min="0" step="1">
        <textarea id="notesInput" rows="15" placeholder="Enter your notes"></textarea>
        <button id="saveBtn" class="btn-study" onclick="saveOrUpdateArticle()">Save Article</button>
        <button id="deleteBtn" class="btn-study" onclick="deleteArticle()">Delete</button>
    </div>
    
    <div class="search-section">
        <input type="text" id="searchInput" placeholder="Search articles..." onkeyup="searchArticles()">
    </div>
    
    <div id="articlesContainer"></div>

    <footer>
        <p>© 2025 CODEXEDOC. All rights reserved.</p>
    </footer>

    <script>
      
      let articles = JSON.parse(localStorage.getItem('articles')) || [];
      let editingArticleId = null;
      let openArticles = new Set();
      let isDeleteConfirmed = false;
      // Removed direct displayArticles(articles) call to prevent premature execution

      function saveOrUpdateArticle() {
          const title = document.getElementById('titleInput').value;
          const notes = document.getElementById('notesInput').value;
          const order = parseInt(document.getElementById('orderInput').value) || 0;
          const saveBtn = document.getElementById('saveBtn');
          const deleteBtn = document.getElementById('deleteBtn');
          
          if (title && notes) {
              if (editingArticleId) {
                  const articleIndex = articles.findIndex(a => a.id === editingArticleId);
                  articles[articleIndex] = {
                      ...articles[articleIndex],
                      title: title,
                      notes: notes,
                      order: order,
                      date: new Date().toLocaleString()
                  };
                  editingArticleId = null;
                  saveBtn.textContent = 'Save Article';
                  deleteBtn.style.display = 'none';
                  isDeleteConfirmed = false;
                  deleteBtn.textContent = 'Delete';
                  deleteBtn.classList.remove('confirm');
              } else {
                  const article = {
                      id: Date.now(),
                      title: title,
                      notes: notes,
                      order: order,
                      date: new Date().toLocaleString()
                  };
                  articles.push(article);
              }
              
              localStorage.setItem('articles', JSON.stringify(articles));
              document.getElementById('titleInput').value = '';
              document.getElementById('orderInput').value = '';
              document.getElementById('notesInput').value = '';
              displayArticles(articles);
          }
      }

      function editArticle(id) {
          const article = articles.find(a => a.id === id);
          if (article) {
              document.getElementById('titleInput').value = article.title;
              document.getElementById('orderInput').value = article.order;
              document.getElementById('notesInput').value = article.notes;
              editingArticleId = id;
              const saveBtn = document.getElementById('saveBtn');
              const deleteBtn = document.getElementById('deleteBtn');
              saveBtn.textContent = 'Update Article';
              deleteBtn.style.display = 'block';
              isDeleteConfirmed = false;
              deleteBtn.textContent = 'Delete';
              deleteBtn.classList.remove('confirm');
          }
      }

      function deleteArticle() {
          const deleteBtn = document.getElementById('deleteBtn');
          if (!isDeleteConfirmed) {
              isDeleteConfirmed = true;
              deleteBtn.textContent = 'Confirm Delete';
              deleteBtn.classList.add('confirm');
          } else {
              if (editingArticleId) {
                  articles = articles.filter(a => a.id !== editingArticleId);
                  localStorage.setItem('articles', JSON.stringify(articles));
                  editingArticleId = null;
                  isDeleteConfirmed = false;
                  deleteBtn.textContent = 'Delete';
                  deleteBtn.classList.remove('confirm');
                  deleteBtn.style.display = 'none';
                  document.getElementById('titleInput').value = '';
                  document.getElementById('orderInput').value = '';
                  document.getElementById('notesInput').value = '';
                  document.getElementById('saveBtn').textContent = 'Save Article';
                  displayArticles(articles);
              }
          }
      }

      function updateOrder(id, newOrder) {
          const articleIndex = articles.findIndex(a => a.id === id);
          if (articleIndex !== -1) {
              articles[articleIndex].order = parseInt(newOrder) || 0;
              localStorage.setItem('articles', JSON.stringify(articles));
              displayArticles(articles);
          }
      }

      function toggleArticle(id) {
          if (openArticles.has(id)) {
              openArticles.delete(id);
          } else {
              openArticles.add(id);
          }
          displayArticles(articles);
      }

      function highlightText(text, searchTerm) {
          if (!searchTerm) return text;
          const regex = new RegExp(`(${searchTerm})`, 'gi');
          return text.replace(regex, '<span class="highlight">$1</span>');
      }

      function formatNotes(notes) {
          // Convert URLs to clickable links
          const urlRegex = /(https?:\/\/[^\s<>"']+)/g;
          let formatted = notes.replace(urlRegex, function(url) {
              // Ensure URL has protocol, default to https if none
              const safeUrl = url.startsWith('http') ? url : `https://${url}`;
              return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer" style="color: var(--steel); text-decoration: underline;">${url}</a>`;
          });
          // Replace newlines with <br> tags
          formatted = formatted.replace(/\n/g, '<br>');
          return formatted;
      }

      function getPreviewText(notes, searchTerm, isOpen) {
          const maxPreviewLength = 85;
          const contextLength = 30;

          let formattedNotes = formatNotes(notes);

          if (isOpen) {
              return highlightText(formattedNotes, searchTerm);
          }

          if (searchTerm) {
              const lowerNotes = notes.toLowerCase();
              const lowerSearch = searchTerm.toLowerCase();
              const index = lowerNotes.indexOf(lowerSearch);
              if (index !== -1) {
                  const start = Math.max(0, index - contextLength);
                  const end = Math.min(notes.length, index + searchTerm.length + contextLength);
                  let preview = notes.substring(start, end);
                  if (start > 0) preview = '...' + preview;
                  if (end < notes.length) preview += '...';
                  return highlightText(formatNotes(preview), searchTerm);
              }
          }

          return notes.length > maxPreviewLength 
              ? highlightText(formatNotes(notes.substring(0, maxPreviewLength)) + '...', searchTerm) 
              : highlightText(formattedNotes, searchTerm);
      }

      function displayArticles(articlesToShow) {
          const container = document.getElementById('articlesContainer');
          const searchTerm = document.getElementById('searchInput').value.toLowerCase();
          container.innerHTML = '';
          
          const sortedArticles = [...articlesToShow].sort((a, b) => {
              if (a.order === b.order) {
                  return a.title.localeCompare(b.title);
              }
              return a.order - b.order;
          });
          
          sortedArticles.forEach(article => {
              const isOpen = openArticles.has(article.id);
              const articleDiv = document.createElement('div');
              articleDiv.className = 'article';
              const highlightedTitle = highlightText(article.title, searchTerm);
              const previewNotes = getPreviewText(article.notes, searchTerm, isOpen);
              const showOpenLink = article.notes.length > 85 || (searchTerm && !isOpen);

              articleDiv.innerHTML = `
                  <h2>${highlightedTitle}</h2>
                  <p class="notes-preview">${previewNotes}</p>
                  <div class="article-footer">
                      <small>Created: ${article.date}</small>
                      <div class="order-controls">
                          <input type="number" class="order-input" value="${article.order || 0}" 
                              onchange="updateOrder(${article.id}, this.value)">
                          ${showOpenLink ? `<span class="open-link" onclick="toggleArticle(${article.id})">${isOpen ? 'Close' : 'Open'}</span>` : ''}
                          <span class="edit-link" onclick="editArticle(${article.id})">Edit</span>
                      </div>
                  </div>
              `;
              container.appendChild(articleDiv);
          });
      }

      function searchArticles() {
          const searchTerm = document.getElementById('searchInput').value.toLowerCase();
          const filteredArticles = articles.filter(article => 
              article.title.toLowerCase().includes(searchTerm) || 
              article.notes.toLowerCase().includes(searchTerm)
          );
          displayArticles(filteredArticles);
      }

      function backupData() {
          const data = {
              articles: JSON.parse(localStorage.getItem('articles')) || []
          };
          
          const codexContent = `CODEX-EDOC-BACKUP-v1\n${JSON.stringify(data, null, 2)}`;
          const blob = new Blob([codexContent], { type: 'text/plain' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `bulletins_backup_${new Date().toISOString().split('T')[0]}.codexexedoc`;
          a.click();
          URL.revokeObjectURL(url);
      }

      function isPlainObject(obj) {
          return obj !== null && typeof obj === 'object' && Object.getPrototypeOf(obj) === Object.prototype;
      }

      function restoreData(event) {
          const file = event.target.files[0];
          const restoreInput = document.getElementById('restoreInput');
          
          if (!file) {
              alert('Error: No file selected');
              console.error('No file selected');
              restoreInput.value = '';
              return;
          }

          try {
              const validExtensions = ['.codex', '.json', '.codexexedoc'];
              const fileExtension = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
              if (!validExtensions.includes(fileExtension)) {
                  alert('Error: Invalid file type. Please select a .codex, .json, or .codexexedoc file.');
                  console.error('Invalid file extension:', fileExtension);
                  restoreInput.value = '';
                  return;
              }
              if (file.size === 0) {
                  alert('Error: File is empty');
                  console.error('Empty file detected');
                  restoreInput.value = '';
                  return;
              }
              if (file.size > 10 * 1024 * 1024) {
                  alert('Error: File is too large (max 10MB)');
                  console.error('File size too large:', file.size);
                  restoreInput.value = '';
                  return;
              }
          } catch (error) {
              alert('Error: Failed to validate file properties');
              console.error('File validation error:', error.message, error.stack);
              restoreInput.value = '';
              return;
          }

          const reader = new FileReader();
          reader.onload = function(e) {
              try {
                  let content = e.target.result;
                  content = content.replace(/^\uFEFF/, '').trim();
                  if (!content) {
                      alert('Error: File is empty or contains only whitespace');
                      console.error('Empty or whitespace-only content');
                      restoreInput.value = '';
                      return;
                  }

                  let data;
                  const isCodex = content.startsWith('CODEX-EDOC-BACKUP-v1');
                  let jsonContent;

                  if (isCodex) {
                      const lines = content.split('\n');
                      if (lines[0].trim() !== 'CODEX-EDOC-BACKUP-v1') {
                          throw new Error('Invalid .codex file header');
                      }
                      jsonContent = lines.slice(1).join('\n').trim();
                      if (!jsonContent) {
                          throw new Error('No JSON data found after header');
                      }
                  } else {
                      jsonContent = content;
                  }

                  if (!jsonContent.startsWith('{') && !jsonContent.startsWith('[')) {
                      throw new Error('Invalid JSON: Content must start with an object or array');
                  }

                  try {
                      data = JSON.parse(jsonContent);
                  } catch (parseError) {
                      const match = parseError.message.match(/at position (\d+)/);
                      const position = match ? parseInt(match[1]) : -1;
                      let errorContext = '';
                      if (position >= 0) {
                          const start = Math.max(0, position - 20);
                          const end = Math.min(jsonContent.length, position + 20);
                          errorContext = ` near "${jsonContent.slice(start, end)}"`;
                      }
                      throw new Error(`Invalid JSON format: ${parseError.message}${errorContext}`);
                  }

                  if (!isPlainObject(data)) {
                      throw new Error('Invalid data structure: Root must be an object');
                  }

                  const articlesData = Array.isArray(data.articles) ? data.articles : [];
                  const validArticles = articlesData.filter(article => {
                      return isPlainObject(article) &&
                             typeof article.id === 'number' &&
                             typeof article.title === 'string' &&
                             typeof article.notes === 'string' &&
                             typeof article.date === 'string' &&
                             (typeof article.order === 'number' || article.order === undefined);
                  });

                  if (validArticles.length !== articlesData.length) {
                      console.warn('Some articles were invalid and filtered out:', articlesData);
                  }

                  try {
                      localStorage.setItem('articles', JSON.stringify(validArticles));
                      articles.length = 0;
                      articles.push(...validArticles);
                      openArticles.clear();
                      displayArticles(articles);
                  } catch (error) {
                      throw new Error(`Failed to apply articles: ${error.message}`);
                  }

                  if (validArticles.length !== articlesData.length) {
                      alert('Data restored successfully, but some invalid articles were ignored.');
                  } else {
                      alert('Data restored successfully!');
                  }
              } catch (error) {
                  let errorMessage = 'Error restoring data: ';
                  if (error.message.includes('codex file header')) {
                      errorMessage += 'Invalid .codex file header. File must start with "CODEX-EDOC-BACKUP-v1".';
                  } else if (error.message.includes('JSON data found')) {
                      errorMessage += 'No JSON data found in .codex file after header.';
                  } else if (error.message.includes('Invalid JSON')) {
                      errorMessage += `File contains invalid JSON: ${error.message}`;
                  } else if (error.message.includes('data structure')) {
                      errorMessage += 'Invalid data format. Expected an array for articles.';
                  } else if (error.message.includes('apply articles')) {
                      errorMessage += `Failed to update articles: ${error.message}`;
                  } else {
                      errorMessage += `Unexpected error: ${error.message}`;
                  }
                  alert(errorMessage);
                  console.error('Restore error:', error.message, error.stack);
              }
              restoreInput.value = '';
          };
          reader.onerror = function() {
              alert('Error: Failed to read file');
              console.error('FileReader error');
              restoreInput.value = '';
          };
          reader.readAsText(file);
      }

      document.addEventListener('DOMContentLoaded', () => {
          const backupBtn = document.getElementById('backupBtn');
          const restoreBtn = document.getElementById('restoreBtn');
          const restoreInput = document.getElementById('restoreInput');

          backupBtn.addEventListener('click', backupData);
          restoreBtn.addEventListener('click', () => restoreInput.click());
          restoreInput.addEventListener('change', restoreData);

          // Initialize display of articles after DOM is loaded
          // displayArticles(articles); // Commented out to avoid premature call
      });
    
    </script>
