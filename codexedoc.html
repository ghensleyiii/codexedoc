<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codexedoc | Code With Confidence</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans bg-[#0f0f0f] text-white">

  <!-- Minimal Dark Header -->
  <header class="py-6 text-center">
    <h1 class="text-3xl font-bold tracking-wide text-white">CODEXEDOC</h1>
  </header>

  <!-- Main Content -->
  <main class="text-center px-6 py-12 max-w-3xl mx-auto">

    <!-- Tagline -->
    <h2 class="text-2xl sm:text-3xl font-semibold mb-4 text-white">
      Code With Confidence
    </h2>

    <!-- Navigation Links -->
    <nav class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-10 mt-8">
      <a href="#" class="bg-blue-600 text-white py-3 rounded hover:bg-blue-700">Curriculum</a>
      <a href="#" class="bg-gray-800 text-white py-3 rounded hover:bg-gray-700">Resources</a>
      <a href="#" class="bg-gray-800 text-white py-3 rounded hover:bg-gray-700">Articles</a>
      <a href="#" class="bg-gray-800 text-white py-3 rounded hover:bg-gray-700">Contact</a>
    </nav>

    <!-- Search Bar -->
    <div class="mb-12">
      <input 
        type="text" 
        placeholder="Search articles..." 
        class="w-full px-4 py-3 border border-gray-700 bg-[#1a1a1a] text-white rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- Optional Featured Articles -->
    <section class="text-left">
      <h3 class="text-xl font-bold mb-4 text-white">Featured Articles</h3>
      <ul class="space-y-2">
        <li><a href="#" class="text-blue-400 hover:underline">Build a Responsive Navbar with Tailwind</a></li>
        <li><a href="#" class="text-blue-400 hover:underline">Understanding Flexbox in 10 Minutes</a></li>
        <li><a href="#" class="text-blue-400 hover:underline">The Easiest Way to Use Git</a></li>
      </ul>
    </section>

  </main>

  <!-- Footer -->
  <footer class="text-center py-6 text-sm text-gray-500 border-t border-gray-800">
    © 2025 Codexedoc
  </footer>

</body>
</html>
