<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEXEDOC</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="apple-touch-icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #eeeeee;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: #eeeeee;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00cc00;
            display: inline-block;
        }

        .logo a {
            color: #00cc00;
            text-decoration: none;
            transition: color 0.3s;
        }

        .logo a:hover {
            color: #1e90ff;
        }

        .logo span {
            color: #1e90ff;
            font-size: 5rem;
            position: relative;
            top: 8px;
        }

        .tracker-section {
            margin: 20px;
            background-color: #eeeeee;
            border-radius: 5px;
            transition: border 0.3s ease, background-color 0.3s ease;
            border: none;
        }

        .tracker-section.active {
            border: 2px solid #333;
            background-color: #909090;
        }

        .tracker-container {
            padding: 20px;
            text-align: center;
            position: relative;
        }

        #trackerToggle {
            display: inline-block;
            padding: 10px 60px 10px 20px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #00cc00;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            position: relative;
            width: auto;
            min-width: 200px;
            text-align: left;
        }

        #trackerToggle:hover {
            background-color: #1e90ff;
            transform: scale(1.05);
        }

        .progress-circle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
        }

        .progress-circle svg {
            width: 100%;
            height: 100%;
        }

        .progress-circle .circle-bg {
            fill: none;
            stroke DEFAULT_STYLE: #eee;
            stroke-width: 3;
        }

        .progress-circle .circle-fg {
            fill: none;
            stroke: #1e90ff;
            stroke-width: 3;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .progress-circle .percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            font-weight: bold;
            color: white;
        }

        .dropdown-content {
            display: none;
            padding: 20px;
            border-radius: 0 0 5px 5px;
            background-color: #909090;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .book-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }

        .book {
            border: 1px solid #ccc;
            padding: 0;
            border-radius: 5px;
            position: relative;
        }

        .book-title {
            margin: 0;
            padding: 10px 60px 10px 10px;
            cursor: pointer;
            background-color: #909090;
            border-radius: 5px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            text-align: left;
            font-size: 16px;
            font-weight: bold;
            position: relative;
        }

        .book-title:hover {
            background-color: #1e90ff;
            color: white;
            transform: scale(1.02);
        }

        .book-title.completed {
            background-color: #00cc00;
            color: white;
        }

        .book-progress {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
        }

        .book-progress svg {
            width: 100%;
            height: 100%;
        }

        .book-progress .circle-bg {
            fill: none;
            stroke: #eee;
            stroke-width: 2;
        }

        .book-progress .circle-fg {
            fill: none;
            stroke: #1e90ff;
            stroke-width: 2;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .book-progress .percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            font-weight: bold;
        }

        .chapter-list {
            display: none;
            max-height: 150px;
            overflow-y: auto;
            padding: 10px;
            background-color: #909090;
        }

        .chapter {
            display: inline-block;
            margin: 2px;
        }

        .chapter span {
            display: inline-block;
            width: 20px;
            height: 20px;
            line-height: 20px;
            text-align: center;
            border: 1px solid #909090;
            border-radius: 3px;
            background-color: #909090;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }

        .chapter span.completed {
            background-color: #1e90ff;
            color: white;
            border-color: #1e90ff;
        }

        #resetTracker {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #909090;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            width: auto;
            min-width: 200px;
            margin-top: 20px;
            text-align: left;
            position: relative;
        }

        #resetTracker:hover {
            background-color: #1e90ff;
            transform: scale(1.05);
        }

        #resetTracker.active {
            background-color: #00cc00;
        }

        #resetTracker input[type="checkbox"] {
            margin-left: 20px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            position: relative;
            z-index: 1;
        }

        .reset-container {
            text-align: center;
            padding: 10px;
        }

        footer {
            background-color: #333333;
            color: #1e90ff;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
        }

        footer a {
            color: #00cc00;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .footer-logo {
            font-size: 0.9rem;
            color: #00cc00;
            font-weight: bold;
        }

        .footer-logo span {
            color: #1e90ff;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="code.html">CODE</a><a href="index.html"><span>X</span></a><a href="edoc.html">EDOC</a>
        </div>
    </header>

    <div class="tracker-section">
        <div class="tracker-container">
            <button id="trackerToggle">Bible Reading Tracker
                <div class="progress-circle" id="overallProgress">
                    <svg>
                        <circle class="circle-bg" cx="20" cy="20" r="17"></circle>
                        <circle class="circle-fg" cx="20" cy="20" r="17" stroke-dasharray="0 106.81"></circle>
                    </svg>
                    <div class="percentage">0%</div>
                </div>
            </button>
        </div>
        <div id="bookList" class="dropdown-content">
            <!-- Book list will be generated here -->
            <div class="reset-container">
                <button id="resetTracker">Reset Tracker
                    <input type="checkbox" id="resetCheckbox">
                </button>
            </div>
        </div>
    </div>

    <footer>
        <p><span class="footer-logo"><a href="codex.html">CODE<span>X</span>EDOC</span></a></p>
        <p>Copyright © 2025 CODEXEDOC. All Rights Reserved.</p>
        <p><a href="mailto:contact@codexedoc.com">contact@codexedoc.com</a></p>
    </footer>

    <script>
        const bibleBooks = [
            { name: "Genesis", chapters: 50 },
            { name: "Exodus", chapters: 40 },
            { name: "Leviticus", chapters: 27 },
            { name: "Numbers", chapters: 36 },
            { name: "Deuteronomy", chapters: 34 },
            { name: "Joshua", chapters: 24 },
            { name: "Judges", chapters: 21 },
            { name: "Ruth", chapters: 4 },
            { name: "1 Samuel", chapters: 31 },
            { name: "2 Samuel", chapters: 24 },
            { name: "1 Kings", chapters: 22 },
            { name: "2 Kings", chapters: 25 },
            { name: "1 Chronicles", chapters: 29 },
            { name: "2 Chronicles", chapters: 36 },
            { name: "Ezra", chapters: 10 },
            { name: "Nehemiah", chapters: 13 },
            { name: "Esther", chapters: 10 },
            { name: "Job", chapters: 42 },
            { name: "Psalms", chapters: 150 },
            { name: "Proverbs", chapters: 31 },
            { name: "Ecclesiastes", chapters: 12 },
            { name: "Song of Solomon", chapters: 8 },
            { name: "Isaiah", chapters: 66 },
            { name: "Jeremiah", chapters: 52 },
            { name: "Lamentations", chapters: 5 },
            { name: "Ezekiel", chapters: 48 },
            { name: "Daniel", chapters: 12 },
            { name: "Hosea", chapters: 14 },
            { name: "Joel", chapters: 3 },
            { name: "Amos", chapters: 9 },
            { name: "Obadiah", chapters: 1 },
            { name: "Jonah", chapters: 4 },
            { name: "Micah", chapters: 7 },
            { name: "Nahum", chapters: 3 },
            { name: "Habakkuk", chapters: 3 },
            { name: "Zephaniah", chapters: 3 },
            { name: "Haggai", chapters: 2 },
            { name: "Zechariah", chapters: 14 },
            { name: "Malachi", chapters: 4 },
            { name: "Matthew", chapters: 28 },
            { name: "Mark", chapters: 16 },
            { name: "Luke", chapters: 24 },
            { name: "John", chapters: 21 },
            { name: "Acts", chapters: 28 },
            { name: "Romans", chapters: 16 },
            { name: "1 Corinthians", chapters: 16 },
            { name: "2 Corinthians", chapters: 13 },
            { name: "Galatians", chapters: 6 },
            { name: "Ephesians", chapters: 6 },
            { name: "Philippians", chapters: 4 },
            { name: "Colossians", chapters: 4 },
            { name: "1 Thessalonians", chapters: 5 },
            { name: "2 Thessalonians", chapters: 3 },
            { name: "1 Timothy", chapters: 6 },
            { name: "2 Timothy", chapters: 4 },
            { name: "Titus", chapters: 3 },
            { name: "Philemon", chapters: 1 },
            { name: "Hebrews", chapters: 13 },
            { name: "James", chapters: 5 },
            { name: "1 Peter", chapters: 5 },
            { name: "2 Peter", chapters: 3 },
            { name: "1 John", chapters: 5 },
            { name: "2 John", chapters: 1 },
            { name: "3 John", chapters: 1 },
            { name: "Jude", chapters: 1 },
            { name: "Revelation", chapters: 22 }
        ];

        const totalChapters = bibleBooks.reduce((sum, book) => sum + book.chapters, 0);
        let progress = JSON.parse(localStorage.getItem('bibleProgress')) || {};

        function saveProgress() {
            localStorage.setItem('bibleProgress', JSON.stringify(progress));
            updateProgress();
        }

        function updateProgress() {
            let overallCompleted = 0;
            
            document.querySelectorAll('.book').forEach(bookDiv => {
                const bookName = bookDiv.dataset.book;
                const chapters = bookDiv.querySelectorAll('.chapter span');
                const completed = Array.from(chapters).filter(ch => ch.classList.contains('completed')).length;
                const total = chapters.length;
                const bookTitle = bookDiv.querySelector('.book-title');
                const bookCircle = bookDiv.querySelector('.book-progress .circle-fg');
                const bookPercentage = bookDiv.querySelector('.book-progress .percentage');
                
                overallCompleted += completed;
                
                const bookPercent = Math.round((completed / total) * 100);
                const circumference = 2 * Math.PI * 13;
                const bookOffset = circumference * (1 - completed / total);
                
                bookCircle.style.strokeDasharray = `${circumference} ${circumference}`;
                bookCircle.style.strokeDashoffset = bookOffset;
                bookPercentage.textContent = `${bookPercent}%`;
                
                if (completed === total) {
                    bookTitle.classList.add('completed');
                } else {
                    bookTitle.classList.remove('completed');
                }
            });

            const overallPercent = Math.round((overallCompleted / totalChapters) * 100);
            const overallCircle = document.querySelector('#overallProgress .circle-fg');
            const overallPercentage = document.querySelector('#overallProgress .percentage');
            const overallCircumference = 2 * Math.PI * 17;
            const overallOffset = overallCircumference * (1 - overallCompleted / totalChapters);
            
            overallCircle.style.strokeDasharray = `${overallCircumference} ${overallCircumference}`;
            overallCircle.style.strokeDashoffset = overallOffset;
            overallPercentage.textContent = `${overallPercent}%`;
        }

        const bookList = document.getElementById('bookList');
        const resetContainer = bookList.querySelector('.reset-container');
        
        bibleBooks.forEach(book => {
            const bookDiv = document.createElement('div');
            bookDiv.className = 'book';
            bookDiv.dataset.book = book.name;

            const bookTitle = document.createElement('h3');
            bookTitle.className = 'book-title';
            bookTitle.textContent = book.name;
            bookDiv.appendChild(bookTitle);

            const bookProgress = document.createElement('div');
            bookProgress.className = 'book-progress';
            bookProgress.innerHTML = `
                <svg>
                    <circle class="circle-bg" cx="15" cy="15" r="13"></circle>
                    <circle class="circle-fg" cx="15" cy="15" r="13"></circle>
                </svg>
                <div class="percentage">0%</div>
            `;
            bookTitle.appendChild(bookProgress);

            const chapterList = document.createElement('div');
            chapterList.className = 'chapter-list';

            for (let i = 1; i <= book.chapters; i++) {
                const chapterDiv = document.createElement('div');
                chapterDiv.className = 'chapter';

                const chapterSpan = document.createElement('span');
                chapterSpan.textContent = i;
                if (progress[`${book.name}-${i}`]) {
                    chapterSpan.classList.add('completed');
                }

                chapterSpan.addEventListener('click', (e) => {
                    e.stopPropagation();
                    chapterSpan.classList.toggle('completed');
                    progress[`${book.name}-${i}`] = chapterSpan.classList.contains('completed');
                    saveProgress();
                });

                chapterDiv.appendChild(chapterSpan);
                chapterList.appendChild(chapterDiv);
            }

            bookDiv.appendChild(chapterList);
            bookList.insertBefore(bookDiv, resetContainer);

            // Fixed book title click handler
            bookTitle.addEventListener('click', (e) => {
                e.stopPropagation();
                const chapterList = bookDiv.querySelector('.chapter-list');
                chapterList.style.display = chapterList.style.display === 'block' ? 'none' : 'block';
            });
        });

        updateProgress();

        const trackerToggle = document.getElementById('trackerToggle');
        const dropdownContent = document.getElementById('bookList');
        const trackerSection = document.querySelector('.tracker-section');
        const resetTracker = document.getElementById('resetTracker');
        const resetCheckbox = document.getElementById('resetCheckbox');

        trackerToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            if (dropdownContent.style.display === 'block') {
                dropdownContent.style.display = 'none';
                trackerSection.classList.remove('active');
            } else {
                dropdownContent.style.display = 'block';
                trackerSection.classList.add('active');
            }
        });

        document.addEventListener('click', (event) => {
            if (!trackerSection.contains(event.target)) {
                dropdownContent.style.display = 'none';
                trackerSection.classList.remove('active');
            }
        });

        resetCheckbox.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent button click from triggering
            resetTracker.classList.toggle('active');
        });

        resetTracker.addEventListener('click', (e) => {
            e.stopPropagation();
            if (resetCheckbox.checked) {
                progress = {};
                localStorage.setItem('bibleProgress', JSON.stringify(progress));
                document.querySelectorAll('.chapter span').forEach(span => {
                    span.classList.remove('completed');
                });
                updateProgress();
                resetCheckbox.checked = false;
                resetTracker.classList.remove('active');
            }
        });
    </script>
</body>
</html>
