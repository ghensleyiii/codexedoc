<!DOCTYPE html>
<html>
  <head>
    <title>Console</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.0.0/math.min.js"></script>
    <style>
      body {
        font-family: 'Share Tech Mono', monospace;
        background-color: #1b1b32;
        color: #ffffff;
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .console-output {
        flex: 1;
        padding: 10px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: #3c8235 #0a0a23;
      }
      input {
        width: 100%;
        background: none;
        border: none;
        color: #ffffff;
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.9rem;
        padding: 10px;
        outline: none;
        border-top: 1px solid #3c8235;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background-color: #3c8235;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-track {
        background-color: #0a0a23;
      }
    </style>
  </head>
  <body>
    <div class="console-output"></div>
    <input type="text" placeholder="Console...">
    <script>
      const input = document.querySelector('input');
      const context = {};
      const originalConsoleLog = console.log;
      console.log = (...args) => {
        const message = args.map(arg => String(arg)).join(' ');
        const outputDiv = document.createElement('div');
        outputDiv.textContent = message;
        outputDiv.style.color = 'white';
        document.querySelector('.console-output').appendChild(outputDiv);
        document.querySelector('.console-output').scrollTop = document.querySelector('.console-output').scrollHeight;
        originalConsoleLog.apply(console, args);
      };
      function safeEval(code) {
        try {
          const func = new Function('context', 'math', `
            with (context) {
              return (function() { ${code} })();
            }
          `);
          const result = func(context, math);
          return result !== undefined ? String(result) : '';
        } catch (err) {
          return { error: err.message };
        }
      }
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const command = e.target.value.trim();
          if (command) {
            window.opener.runConsoleCommand(command, safeEval);
          }
          e.target.value = '';
        }
      });
      window.addEventListener('unload', () => {
        window.opener.consoleWindow = null;
      });
    </script>
  </body>
</html>
