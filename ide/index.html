<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Code IDE</title>
  <!-- CodeMirror for syntax highlighting -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.9/codemirror.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.9/codemirror.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.9/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.9/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.9/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.9/mode/python/python.min.js"></script>
  <!-- Pyodide for Python execution -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-bar {
      background-color: #252526;
      padding: 10px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      border-bottom: 1px solid #3c3c3c;
    }

    .top-bar .logo {
      font-size: 1.2rem;
      font-weight: bold;
    }

    .main-container {
      display: flex;
      flex: 1;
      height: calc(100vh - 50px);
    }

    .sidebar {
      width: 200px;
      background-color: #2d2d2d;
      border-right: 1px solid #3c3c3c;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .sidebar .file-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 10px;
    }

    .sidebar .file-actions button {
      padding: 8px;
      background-color: #3c3c3c;
      border: none;
      color: #d4d4d4;
      cursor: pointer;
      font-size: 0.9rem;
      text-align: center;
    }

    .sidebar .file-actions button:hover {
      background-color: #569cd6;
    }

    .sidebar .file-tree-container {
      flex: 1;
      overflow-y: auto;
    }

    .sidebar .file-tree {
      list-style: none;
    }

    .sidebar .file-tree li {
      padding: 5px 10px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .sidebar .file-tree li:hover {
      background-color: #3c3c3c;
    }

    .editor-container {
      width: 600px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #3c3c3c;
    }

    .tabs {
      background-color: #252526;
      display: flex;
      border-bottom: 1px solid #3c3c3c;
      overflow-x: auto;
    }

    .tabs .tab {
      padding: 10px 15px;
      cursor: pointer;
      background-color: #2d2d2d;
      border-right: 1px solid #3c3c3c;
      white-space: nowrap;
    }

    .tabs .tab.active {
      background-color: #1e1e1e;
      color: #569cd6;
    }

    .tabs .tab:hover {
      background-color: #3c3c3c;
    }

    .editor {
      flex: 1;
      background-color: #1e1e1e;
      padding: 10px;
      overflow: auto;
    }

    .editor textarea {
      width: 100%;
      height: 100%;
      background: none;
      border: none;
      color: #d4d4d4;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      resize: none;
      outline: none;
    }

    .output-console {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .output {
      flex: 1;
      background-color: #252526;
      padding: 10px;
      overflow-y: auto;
      border-bottom: 1px solid #3c3c3c;
      position: relative;
    }

    .output iframe {
      width: 100%;
      height: calc(100% - 40px);
      border: none;
      background-color: #ffffff;
    }

    .output button {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 8px;
      background-color: #3c3c3c;
      border: none;
      color: #d4d4d4;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .output button:hover {
      background-color: #569cd6;
    }

    .console {
      height: 150px;
      background-color: #252526;
      padding: 10px;
      overflow-y: auto;
      position: relative;
    }

    .console input {
      width: 100%;
      background: none;
      border: none;
      color: #d4d4d4;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      outline: none;
      position: sticky;
      bottom: 0;
    }

    .status-bar {
      background-color: #007acc;
      color: #ffffff;
      padding: 5px 10px;
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
    }

    @media (max-width: 768px) {
      .main-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 150px;
      }

      .editor-container {
        width: 100%;
        height: 50%;
      }

      .output-console {
        height: 50%;
      }

      .output {
        height: 60%;
      }

      .console {
        height: 40%;
      }
    }

    @media (max-width: 480px) {
      .top-bar .logo {
        font-size: 1rem;
      }

      .sidebar .file-actions button {
        font-size: 0.8rem;
        padding: 6px;
      }

      .editor textarea {
        font-size: 0.8rem;
      }

      .console input {
        font-size: 0.8rem;
      }

      .status-bar {
        font-size: 0.7rem;
      }

      .output button {
        font-size: 0.8rem;
        padding: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="logo">Code IDE</div>
  </div>

  <div class="main-container">
    <div class="sidebar">
      <div class="file-actions">
        <button id="create-file">Create File</button>
        <input type="file" id="file-import" accept=".html,.css,.js,.py,.txt" style="display: none;">
        <button onclick="document.getElementById('file-import').click()">Import File</button>
        <button id="save-file">Save File</button>
        <button id="delete-file">Delete File</button>
      </div>
      <div class="file-tree-container">
        <ul class="file-tree">
          <!-- Dynamically populated files will appear here -->
        </ul>
      </div>
    </div>

    <div class="editor-container">
      <div class="tabs">
        <!-- Dynamically populated tabs will appear here -->
      </div>
      <div class="editor">
        <textarea placeholder="Start coding..."></textarea>
      </div>
    </div>

    <div class="output-console">
      <div class="output">
        <button id="open-output"><i class="fa-solid fa-window-restore"></i></button>
        <iframe srcdoc="<h1>Output will appear here</h1>"></iframe>
      </div>
      <div class="console">
        <input type="text" placeholder="Console...">
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span>Ln 1, Col 1</span>
    <span>UTF-8 | None | Spaces: 2</span>
  </div>

  <script src="script.js"></script>
</body>
</html>
