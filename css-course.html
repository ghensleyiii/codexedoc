<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Lessons & Test - CODEXEDOC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            background-color: #1a1a1a;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #00b7eb;
        }

        .logo a {
            color: #00b7eb;
            text-decoration: none;
            transition: color 0.3s;
        }

        .logo a:hover {
            color: #00ff00;
        }

        .logo span {
            color: #00ff00;
            font-size: 3.5rem;
            position: relative;
            top: 5px;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px;
        }

        .action-button {
            background-color: #00ff00;
            color: #1a1a1a;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }

        .action-button:hover {
            background-color: #00b7eb;
            color: #ffffff;
        }

        .content-container {
            max-width: 900px;
            margin: 15px auto;
            padding: 15px;
            background-color: #2a2a2a;
            border: 2px solid #00b7eb;
            border-radius: 5px;
            display: none;
        }

        .content-container.active {
            display: block;
        }

        .lesson-title, .test-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .code-block {
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: auto;
            white-space: pre-wrap;
            border: 1px solid #333;
        }

        .lesson-instructions, .test-instructions {
            margin: 10px 0;
        }

        .lesson-instructions li {
            margin-bottom: 8px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .nav-button {
            background-color: #00b7eb;
            color: #ffffff;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .nav-button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .nav-button:hover:not(:disabled) {
            background-color: #00ff00;
            color: #1a1a1a;
        }

        .toc {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 10px;
            padding: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .toc-item {
            background-color: #00b7eb;
            color: #1a1a1a;
            padding: 1px;
            text-align: center;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .toc-item:hover {
            background-color: #00ff00;
        }

        .test-question {
            margin-bottom: 15px;
        }

        .test-question label {
            display: block;
            margin: 5px 0;
            cursor: pointer;
        }

        .test-question input[type="radio"] {
            margin-right: 8px;
        }

        .submit-button {
            background-color: #00ff00;
            color: #1a1a1a;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
            display: block;
            margin: 15px auto;
        }

        .submit-button:hover {
            background-color: #00b7eb;
            color: #ffffff;
        }

        footer {
            background-color: #1a1a1a;
            color: #00ff00;
            text-align: center;
            padding: 15px;
            font-size: 0.8rem;
        }

        footer a {
            color: #00b7eb;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .footer-logo {
            font-size: 0.8rem;
            color: #00b7eb;
            font-weight: bold;
        }

        .footer-logo span {
            color: #00ff00;
        }

        @media (max-width: 600px) {
            .logo {
                font-size: 1.5rem;
            }

            .logo span {
                font-size: 2.5rem;
                top: 3px;
            }

            .button-container {
                flex-direction: column;
                gap: 10px;
            }

            .action-button {
                width: 100%;
                padding: 10px;
                font-size: 1rem;
            }

            .content-container {
                margin: 10px;
                padding: 10px;
            }

            .lesson-title, .test-title {
                font-size: 1.2rem;
            }

            .toc {
                grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            }

            .toc-item {
                font-size: 0.8rem;
                padding: 8px;
            }

            .nav-buttons {
                flex-direction: column;
                gap: 10px;
            }

            .nav-button {
                width: 100%;
                padding: 10px;
            }
        }

        @media (min-width: 601px) {
            .toc {
                grid-template-columns: repeat(5, 1fr);
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="#">CODE</a><span>X</span><a href="#">EDOC</a>
        </div>
    </header>

    <div class="button-container">
        <button class="action-button" id="openCourseBtn">Open Course</button>
        <button class="action-button" id="launchTestBtn">Launch Test</button>
    </div>

    <!-- Lessons Container -->
    <div id="lessonContainer" class="content-container">
        <div id="lesson1" class="lesson">
            <div class="lesson-title">1. Introduction to CSS</div>
            <div class="code-block"><pre><code>p { color: blue; }</code></pre></div>
            <div class="lesson-instructions">
                <p>CSS (Cascading Style Sheets) styles HTML elements:</p>
                <ul>
                    <li><strong>Selector</strong>: Targets elements (e.g., <code>p</code>).</li>
                    <li><strong>Property</strong>: Defines what to style (e.g., <code>color</code>).</li>
                    <li><strong>Value</strong>: Sets the style (e.g., <code>blue</code>).</li>
                </ul>
                <p><strong>Try it:</strong> Add this to a <code><style></code> tag in an HTML file!</p>
            </div>
        </div>
        <div id="lesson2" class="lesson" style="display: none;">
            <div class="lesson-title">2. Inline CSS</div>
            <div class="code-block"><pre><code><p style="color: red;">Text</p></code></pre></div>
            <div class="lesson-instructions">
                <p>Inline CSS applies styles directly to elements:</p>
                <ul>
                    <li><strong>style</strong>: Attribute for inline styling.</li>
                </ul>
                <p><strong>Try it:</strong> Add this to an HTML element!</p>
            </div>
        </div>
        <div id="lesson3" class="lesson" style="display: none;">
            <div class="lesson-title">3. Internal CSS</div>
            <div class="code-block"><pre><code><style> p { font-size: 16px; } </style></code></pre></div>
            <div class="lesson-instructions">
                <p>Internal CSS uses a <code><style></code> tag in the <code><head></code>:</p>
                <ul>
                    <li>Styles multiple elements at once.</li>
                </ul>
                <p><strong>Try it:</strong> Add this to your HTML <code><head></code>!</p>
            </div>
        </div>
        <div id="lesson4" class="lesson" style="display: none;">
            <div class="lesson-title">4. External CSS</div>
            <div class="code-block"><pre><code><link rel="stylesheet" href="styles.css"></code></pre></div>
            <div class="lesson-instructions">
                <p>External CSS links a separate file:</p>
                <ul>
                    <li><strong>href</strong>: Path to the CSS file.</li>
                </ul>
                <p><strong>Try it:</strong> Create a <code>styles.css</code> file and link it!</p>
            </div>
        </div>
        <div id="lesson5" class="lesson" style="display: none;">
            <div class="lesson-title">5. CSS Selectors</div>
            <div class="code-block"><pre><code>.class { color: green; } #id { font-weight: bold; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Selectors target elements:</p>
                <ul>
                    <li><strong>.class</strong>: Targets classes.</li>
                    <li><strong>#id</strong>: Targets IDs.</li>
                </ul>
                <p><strong>Try it:</strong> Use these with HTML elements!</p>
            </div>
        </div>
        <div id="lesson6" class="lesson" style="display: none;">
            <div class="lesson-title">6. Colors in CSS</div>
            <div class="code-block"><pre><code>p { color: #ff0000; background-color: rgb(0, 255, 0); }</code></pre></div>
            <div class="lesson-instructions">
                <p>Colors can be set using names, hex, or RGB:</p>
                <ul>
                    <li><strong>#ff0000</strong>: Hex for red.</li>
                    <li><strong>rgb(0, 255, 0)</strong>: Green in RGB.</li>
                </ul>
                <p><strong>Try it:</strong> Change some colors!</p>
            </div>
        </div>
        <div id="lesson7" class="lesson" style="display: none;">
            <div class="lesson-title">7. Fonts</div>
            <div class="code-block"><pre><code>p { font-family: Arial; font-size: 20px; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Style text with fonts:</p>
                <ul>
                    <li><strong>font-family</strong>: Sets the font.</li>
                    <li><strong>font-size</strong>: Sets the size.</li>
                </ul>
                <p><strong>Try it:</strong> Customize text!</p>
            </div>
        </div>
        <div id="lesson8" class="lesson" style="display: none;">
            <div class="lesson-title">8. Text Alignment</div>
            <div class="code-block"><pre><code>p { text-align: center; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Align text:</p>
                <ul>
                    <li><strong>text-align</strong>: Left, right, center, or justify.</li>
                </ul>
                <p><strong>Try it:</strong> Align some text!</p>
            </div>
        </div>
        <div id="lesson9" class="lesson" style="display: none;">
            <div class="lesson-title">9. Margins</div>
            <div class="code-block"><pre><code>div { margin: 10px; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Margins create space outside elements:</p>
                <ul>
                    <li><strong>margin</strong>: Sets all sides.</li>
                </ul>
                <p><strong>Try it:</strong> Add margins to a div!</p>
            </div>
        </div>
        <div id="lesson10" class="lesson" style="display: none;">
            <div class="lesson-title">10. Padding</div>
            <div class="code-block"><pre><code>div { padding: 15px; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Padding creates space inside elements:</p>
                <ul>
                    <li><strong>padding</strong>: Sets all sides.</li>
                </ul>
                <p><strong>Try it:</strong> Add padding to a div!</p>
            </div>
        </div>
        <div id="lesson11" class="lesson" style="display: none;">
            <div class="lesson-title">11. Borders</div>
            <div class="code-block"><pre><code>div { border: 2px solid black; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Borders outline elements:</p>
                <ul>
                    <li><strong>border</strong>: Width, style, color.</li>
                </ul>
                <p><strong>Try it:</strong> Add a border to a div!</p>
            </div>
        </div>
        <div id="lesson12" class="lesson" style="display: none;">
            <div class="lesson-title">12. Backgrounds</div>
            <div class="code-block"><pre><code>div { background-color: yellow; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Backgrounds style element backs:</p>
                <ul>
                    <li><strong>background-color</strong>: Sets a solid color.</li>
                </ul>
                <p><strong>Try it:</strong> Change a background!</p>
            </div>
        </div>
        <div id="lesson13" class="lesson" style="display: none;">
            <div class="lesson-title">13. Background Images</div>
            <div class="code-block"><pre><code>div { background-image: url('img.jpg'); }</code></pre></div>
            <div class="lesson-instructions">
                <p>Use images as backgrounds:</p>
                <ul>
                    <li><strong>background-image</strong>: Sets an image.</li>
                </ul>
                <p><strong>Try it:</strong> Add an image background!</p>
            </div>
        </div>
        <div id="lesson14" class="lesson" style="display: none;">
            <div class="lesson-title">14. Box Model</div>
            <div class="code-block"><pre><code>div { width: 100px; height: 100px; margin: 10px; padding: 10px; border: 1px solid; }</code></pre></div>
            <div class="lesson-instructions">
                <p>The box model defines element sizing:</p>
                <ul>
                    <li>Includes content, padding, border, margin.</li>
                </ul>
                <p><strong>Try it:</strong> Create a box!</p>
            </div>
        </div>
        <div id="lesson15" class="lesson" style="display: none;">
            <div class="lesson-title">15. Display Property</div>
            <div class="code-block"><pre><code>span { display: block; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Display controls layout:</p>
                <ul>
                    <li><strong>block</strong>: Full width.</li>
                    <li><strong>inline</strong>: Same line.</li>
                </ul>
                <p><strong>Try it:</strong> Change a span’s display!</p>
            </div>
        </div>
        <div id="lesson16" class="lesson" style="display: none;">
            <div class="lesson-title">16. Visibility</div>
            <div class="code-block"><pre><code>p { visibility: hidden; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Visibility hides elements:</p>
                <ul>
                    <li><strong>hidden</strong>: Invisible but takes space.</li>
                </ul>
                <p><strong>Try it:</strong> Hide an element!</p>
            </div>
        </div>
        <div id="lesson17" class="lesson" style="display: none;">
            <div class="lesson-title">17. Position: Static</div>
            <div class="code-block"><pre><code>div { position: static; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Static is the default position:</p>
                <ul>
                    <li>Follows normal flow.</li>
                </ul>
                <p><strong>Try it:</strong> Test static positioning!</p>
            </div>
        </div>
        <div id="lesson18" class="lesson" style="display: none;">
            <div class="lesson-title">18. Position: Relative</div>
            <div class="code-block"><pre><code>div { position: relative; top: 10px; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Relative positions from its normal spot:</p>
                <ul>
                    <li><strong>top</strong>: Moves down.</li>
                </ul>
                <p><strong>Try it:</strong> Shift an element!</p>
            </div>
        </div>
        <div id="lesson19" class="lesson" style="display: none;">
            <div class="lesson-title">19. Position: Absolute</div>
            <div class="code-block"><pre><code>div { position: absolute; top: 0; left: 0; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Absolute positions relative to parent:</p>
                <ul>
                    <li>Removes from flow.</li>
                </ul>
                <p><strong>Try it:</strong> Place an element!</p>
            </div>
        </div>
        <div id="lesson20" class="lesson" style="display: none;">
            <div class="lesson-title">20. Position: Fixed</div>
            <div class="code-block"><pre><code>header { position: fixed; top: 0; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Fixed stays on screen:</p>
                <ul>
                    <li>Stays during scroll.</li>
                </ul>
                <p><strong>Try it:</strong> Fix a header!</p>
            </div>
        </div>
        <div id="lesson21" class="lesson" style="display: none;">
            <div class="lesson-title">21. Float</div>
            <div class="code-block"><pre><code>img { float: left; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Float moves elements aside:</p>
                <ul>
                    <li><strong>left</strong>: To the left.</li>
                </ul>
                <p><strong>Try it:</strong> Float an image!</p>
            </div>
        </div>
        <div id="lesson22" class="lesson" style="display: none;">
            <div class="lesson-title">22. Clear</div>
            <div class="code-block"><pre><code>p { clear: both; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Clear stops float effects:</p>
                <ul>
                    <li><strong>both</strong>: Clears all floats.</li>
                </ul>
                <p><strong>Try it:</strong> Clear a float!</p>
            </div>
        </div>
        <div id="lesson23" class="lesson" style="display: none;">
            <div class="lesson-title">23. Flexbox Basics</div>
            <div class="code-block"><pre><code>.container { display: flex; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Flexbox aligns items:</p>
                <ul>
                    <li><strong>display: flex</strong>: Enables flex.</li>
                </ul>
                <p><strong>Try it:</strong> Create a flex container!</p>
            </div>
        </div>
        <div id="lesson24" class="lesson" style="display: none;">
            <div class="lesson-title">24. Flex Direction</div>
            <div class="code-block"><pre><code>.container { display: flex; flex-direction: column; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Flex direction sets item flow:</p>
                <ul>
                    <li><strong>column</strong>: Vertical stack.</li>
                </ul>
                <p><strong>Try it:</strong> Change flex direction!</p>
            </div>
        </div>
        <div id="lesson25" class="lesson" style="display: none;">
            <div class="lesson-title">25. Grid Basics</div>
            <div class="code-block"><pre><code>.grid { display: grid; grid-template-columns: 1fr 1fr; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Grid creates 2D layouts:</p>
                <ul>
                    <li><strong>grid-template-columns</strong>: Defines columns.</li>
                </ul>
                <p><strong>Try it:</strong> Make a grid!</p>
            </div>
        </div>
        <div id="lesson26" class="lesson" style="display: none;">
            <div class="lesson-title">26. Media Queries</div>
            <div class="code-block"><pre><code>@media (max-width: 600px) { p { font-size: 14px; } }</code></pre></div>
            <div class="lesson-instructions">
                <p>Media queries adapt styles:</p>
                <ul>
                    <li><strong>max-width</strong>: Applies below size.</li>
                </ul>
                <p><strong>Try it:</strong> Add a media query!</p>
            </div>
        </div>
        <div id="lesson27" class="lesson" style="display: none;">
            <div class="lesson-title">27. Pseudo-classes</div>
            <div class="code-block"><pre><code>a:hover { color: red; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Pseudo-classes style states:</p>
                <ul>
                    <li><strong>:hover</strong>: On mouse over.</li>
                </ul>
                <p><strong>Try it:</strong> Hover an element!</p>
            </div>
        </div>
        <div id="lesson28" class="lesson" style="display: none;">
            <div class="lesson-title">28. Pseudo-elements</div>
            <div class="code-block"><pre><code>p::first-line { font-weight: bold; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Pseudo-elements style parts:</p>
                <ul>
                    <li><strong>::first-line</strong>: Targets first line.</li>
                </ul>
                <p><strong>Try it:</strong> Style a part!</p>
            </div>
        </div>
        <div id="lesson29" class="lesson" style="display: none;">
            <div class="lesson-title">29. CSS Animations</div>
            <div class="code-block"><pre><code>@keyframes move { from { left: 0; } to { left: 100px; } } div { animation: move 2s; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Animations create motion:</p>
                <ul>
                    <li><strong>@keyframes</strong>: Defines steps.</li>
                </ul>
                <p><strong>Try it:</strong> Animate an element!</p>
            </div>
        </div>
        <div id="lesson30" class="lesson" style="display: none;">
            <div class="lesson-title">30. CSS Transitions</div>
            <div class="code-block"><pre><code>button { transition: background-color 0.3s; } button:hover { background-color: blue; }</code></pre></div>
            <div class="lesson-instructions">
                <p>Transitions animate property changes:</p>
                <ul>
                    <li><strong>transition</strong>: Property and duration.</li>
                </ul>
                <p><strong>Try it:</strong> Add a hover transition!</p>
            </div>
        </div>
        <div class="nav-buttons">
            <button class="nav-button" id="prevLessonBtn" disabled>Previous</button>
            <button class="nav-button" id="nextLessonBtn">Next</button>
        </div>
    </div>

    <!-- Test Container -->
    <div id="testContainer" class="content-container">
        <div id="question1" class="test-question">
            <div class="test-title">Question 1</div>
            <div class="test-instructions">
                <p>What does CSS stand for?</p>
                <label><input type="radio" name="q1" value="a"> a) Creative Style Sheets</label>
                <label><input type="radio" name="q1" value="b"> b) Cascading Style Sheets</label>
                <label><input type="radio" name="q1" value="c"> c) Computer Style Sheets</label>
            </div>
        </div>
        <div id="question2" class="test-question" style="display: none;">
            <div class="test-title">Question 2</div>
            <div class="test-instructions">
                <p>Where is inline CSS applied?</p>
                <label><input type="radio" name="q2" value="a"> a) In a separate file</label>
                <label><input type="radio" name="q2" value="b"> b) In the HTML element</label>
                <label><input type="radio" name="q2" value="c"> c) In the <code><head></code></label>
            </div>
        </div>
        <div id="question3" class="test-question" style="display: none;">
            <div class="test-title">Question 3</div>
            <div class="test-instructions">
                <p>How is internal CSS added?</p>
                <label><input type="radio" name="q3" value="a"> a) Via <code><link></code></label>
                <label><input type="radio" name="q3" value="b"> b) Via <code>style</code> attribute</label>
                <label><input type="radio" name="q3" value="c"> c) Via <code><style></code> tag</label>
            </div>
        </div>
        <div id="question4" class="test-question" style="display: none;">
            <div class="test-title">Question 4</div>
            <div class="test-instructions">

    <script>
        const lessonContainer = document.getElementById('lessonContainer');
        const testContainer = document.getElementById('testContainer');
        const openCourseBtn = document.getElementById('openCourseBtn');
        const launchTestBtn = document.getElementById('launchTestBtn');
        const prevLessonBtn = document.getElementById('prevLessonBtn');
        const nextLessonBtn = document.getElementById('nextLessonBtn');
        const prevQuestionBtn = document.getElementById('prevQuestionBtn');
        const nextQuestionBtn = document.getElementById('nextQuestionBtn');
        const submitTestBtn = document.getElementById('submitTestBtn');
        const tocItems = document.querySelectorAll('.toc-item');

        let currentLesson = 1;
        let currentQuestion = 1;
        const totalLessons = 30;
        const totalQuestions = 30;
        let isTestMode = false;

        openCourseBtn.addEventListener('click', () => {
            isTestMode = false;
            lessonContainer.classList.add('active');
            testContainer.classList.remove('active');
            showLesson(1);
        });

        launchTestBtn.addEventListener('click', () => {
            isTestMode = true;
            testContainer.classList.add('active');
            lessonContainer.classList.remove('active');
            showQuestion(1);
        });

        prevLessonBtn.addEventListener('click', () => currentLesson > 1 && showLesson(currentLesson - 1));
        nextLessonBtn.addEventListener('click', () => currentLesson < totalLessons && showLesson(currentLesson + 1));
        prevQuestionBtn.addEventListener('click', () => currentQuestion > 1 && showQuestion(currentQuestion - 1));
        nextQuestionBtn.addEventListener('click', () => currentQuestion < totalQuestions && showQuestion(currentQuestion + 1));

        submitTestBtn.addEventListener('click', submitTest);

        tocItems.forEach(item => {
            item.addEventListener('click', () => {
                const lessonNum = parseInt(item.dataset.lesson);
                isTestMode = false;
                lessonContainer.classList.add('active');
                testContainer.classList.remove('active');
                showLesson(lessonNum);
            });
        });

        function showLesson(lessonNum) {
            currentLesson = lessonNum;
            document.querySelectorAll('.lesson').forEach(lesson => {
                lesson.style.display = lesson.id === `lesson${lessonNum}` ? 'block' : 'none';
            });
            prevLessonBtn.disabled = currentLesson === 1;
            nextLessonBtn.disabled = currentLesson === totalLessons;
        }

        function showQuestion(questionNum) {
            currentQuestion = questionNum;
            document.querySelectorAll('.test-question').forEach(question => {
                question.style.display = question.id === `question${questionNum}` ? 'block' : 'none';
            });
            prevQuestionBtn.disabled = currentQuestion === 1;
            nextQuestionBtn.disabled = currentQuestion === totalQuestions;
        }

        function submitTest() {
            const answers = {
                q1: 'b', q2: 'b', q3: 'c', q4: 'b', q5: 'a', q6: 'b', q7: 'c', q8: 'b', q9: 'b', q10: 'a',
                q11: 'b', q12: 'c', q13: 'b', q14: 'b', q15: 'a', q16: 'c', q17: 'b', q18: 'a', q19: 'b', q20: 'c',
                q21: 'a', q22: 'b', q23: 'c', q24: 'b', q25: 'a', q26: 'c', q27: 'b', q28: 'a', q29: 'c', q30: 'b'
            };
            let score = 0;
            for (let i = 1; i <= totalQuestions; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (selected && selected.value === answers[`q${i}`]) score++;
            }
            alert(`Score: ${score}/${totalQuestions}. ${score >= 24 ? 'Passed! Great job!' : 'Review the lessons and retry.'}`);
        }
    </script>
