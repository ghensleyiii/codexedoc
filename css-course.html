<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Course & Test - Codexedoc</title>
    <style>
        /* General Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #1a1a1a;
            color: #333;
            line-height: 1.6;
        }
        header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00b7eb;
            display: inline-block;
        }
        .logo a {
            color: #00b7eb;
            text-decoration: none;
            transition: color 0.3s;
        }
        .logo a:hover {
            color: #00ff00;
        }
        .logo span {
            color: #00ff00;
            font-size: 5rem;
            position: relative;
            top: 8px;
        }
        .main-section {
            margin: auto;
            padding: 20px;
            background-color: #000000;
            border-radius: 5px;
        }
        .buttons {
            text-align: center;
            margin: 20px 0;
        }
        .btn-lesson {
            padding: 15px 30px;
            margin: 10px;
            background-color: #00b7eb;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .btn-test {
            padding: 15px 30px;
            margin: 10px;
            background-color: #00ff00;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .lesson-box {
            display: none;
            background-color: #00b7eb;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            color: #1a1a1a;
        }
        .test-box {
            display: none;
            background-color: #00ff00;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            color: #1a1a1a;
        }
        .lesson-box.active, .test-box.active {
            display: block;
        }
        .lesson-content {
            background-color: #000000;
            color: #ffffff;
            padding: 20px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .lesson-content h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #ffffff;
        }
        .lesson-content .instruction, 
        .lesson-content .description, 
        .lesson-content .example {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 5px;
        }
        .lesson-content .instruction {
            background-color: #1a1a1a;
            font-size: 1.1rem;
            line-height: 1.8;
        }
        .lesson-content .description {
            background-color: #1a1a1a;
            font-size: 1rem;
            color: #ccc;
            font-weight: bold;
        }
        .lesson-content .example {
            background-color: #333;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            border-left: 4px solid #00ff00;
            white-space: pre-wrap;
        }
        .test-question {
            background-color: #000000;
            color: #ffffff;
            padding: 20px;
            border-radius: 5px;
            margin: 10px 0;
            position: relative;
        }
        .submit-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            padding: 10px 20px;
            background-color: #00b7eb;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            display: none;
        }
        .submit-btn:hover {
            background-color: #00a3d3;
        }
        pre {
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            white-space: pre-wrap;
            border: 1px solid #333;
        }
        .nav-buttons {
            margin: 20px 0;
            text-align: center;
        }
        .nav-btn-lesson {
            padding: 10px 20px;
            background-color: #000000;
            color: #00b7eb;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
        }
        .nav-btn-test {
            padding: 10px 20px;
            background-color: #000000;
            color: #00ff00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
        }
        .nav-btn-lesson:disabled, .nav-btn-test:disabled {
            background-color: #666;
            color: #999;
            cursor: not-allowed;
        }
        .progress-squares {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 20px 0;
            justify-content: center;
        }
        .lesson-square {
            width: 25px;
            height: 25px;
            background-color: #00b7eb;
            border-radius: 3px;
            text-align: center;
            color: #000000;
            font-size: 0.9rem;
            line-height: 25px;
            cursor: pointer;
        }
        .lesson-square.completed {
            background-color: #00ff00;
        }
        .test-square {
            width: 25px;
            height: 25px;
            background-color: #00ff00;
            border-radius: 3px;
            text-align: center;
            color: #000000;
            font-size: 0.9rem;
            line-height: 25px;
            cursor: pointer;
        }
        .test-square.completed {
            background-color: #00b7eb;
        }
        .certificate-form, .retry-message {
            display: none;
            text-align: center;
            padding: 20px;
            background-color: #000000;
            color: #ffffff;
            border-radius: 5px;
        }
        .certificate-form.active, .retry-message.active {
            display: block;
        }
        input[type="text"] {
            padding: 10px;
            margin: 10px 0;
            width: 200px;
        }
        footer {
            background-color: #1a1a1a;
            color: #00ff00;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
        }
        footer a {
            color: #00b7eb;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
        .footer-logo {
            font-size: 0.9rem;
            color: #00b7eb;
            font-weight: bold;
        }
        .footer-logo span {
            color: #00ff00;
        }
        @media (max-width: 768px) {
            .logo { font-size: 2rem; }
            .logo span { font-size: 4rem; top: 6px; }
            .main-section { padding: 15px; }
            .btn-lesson, .btn-test { font-size: 1rem; padding: 10px 20px; }
            .lesson-square, .test-square { width: 20px; height: 20px; font-size: 0.8rem; line-height: 20px; }
            .lesson-content h2 { font-size: 1.5rem; }
            .lesson-content .instruction { font-size: 1rem; }
            .lesson-content .description { font-size: 0.9rem; }
            .lesson-content .example { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="code.html">CODE</a><a href="index.html"><span>X</span></a><a href="edoc.html">EDOC</a>
        </div>
    </header>

    <section class="main-section">
        <div class="buttons">
            <button class="btn-lesson" onclick="toggleLessonBox()">Open Lesson</button>
            <button class="btn-test" onclick="toggleTestBox()">Launch Test</button>
        </div>

        <div class="lesson-box" id="lessonBox">
            <div class="lesson-content" id="lessonContent"></div>
            <div class="nav-buttons">
                <button class="nav-btn-lesson" onclick="prevLesson()" id="prevLessonBtn">Last</button>
                <button class="nav-btn-lesson" onclick="nextLesson()" id="nextLessonBtn">Next</button>
            </div>
            <div class="progress-squares" id="lessonSquares"></div>
        </div>

        <div class="test-box" id="testBox">
            <div class="test-question" id="testQuestion"></div>
            <div class="nav-buttons">
                <button class="nav-btn-test" onclick="prevQuestion()" id="prevQuestionBtn">Last</button>
                <button class="nav-btn-test" onclick="nextQuestion()" id="nextQuestionBtn">Next</button>
            </div>
            <div class="progress-squares" id="testSquares"></div>
            <div class="certificate-form" id="certificateForm">
                <h2>Congratulations!</h2>
                <p>Enter your name for your certificate (80%+ score):</p>
                <input type="text" id="nameInput" placeholder="Your Name" required>
                <button class="nav-btn-test" onclick="generateCertificate()">Generate Certificate</button>
            </div>
            <div class="retry-message" id="retryMessage">
                <h2>Try Again</h2>
                <p>Your score was below 80%. Please review the lessons and try again.</p>
            </div>
        </div>
    </section>

    <footer>
        <p><span class="footer-logo">CODE<span>X</span>EDOC</span></p>
        <p>Copyright © 2025 CODEXEDOC. All Rights Reserved.</p>
        <p><a href="mailto:contact@codexedoc.com">contact@codexedoc.com</a></p>
    </footer>

    <script>
        // Lesson Data
        const lessons = [
            { 
                title: "1. What is CSS?", 
                instruction: "CSS stands for Cascading Style Sheets. It’s used to style and layout HTML elements on web pages.", 
                description: "<b>p { color: blue; }</b>", 
                example: "<p style='color: blue;'>Hello</p>" 
            },
            { 
                title: "2. CSS Syntax", 
                instruction: "CSS rules consist of a selector and a declaration block with properties and values.", 
                description: "<b>h1 { font-size: 24px; }</b>", 
                example: "h1 { font-size: 24px; }" 
            },
            { 
                title: "3. Inline CSS", 
                instruction: "Inline CSS applies styles directly to an HTML element using the 'style' attribute.", 
                description: "<b>&lt;p style='color: red;'&gt;Text&lt;/p&gt;</b>", 
                example: "<p style='color: red;'>Text</p>" 
            },
            { 
                title: "4. Internal CSS", 
                instruction: "Internal CSS is defined within a &lt;style&gt; tag in the &lt;head&gt; section of an HTML file.", 
                description: "<b>&lt;style&gt; body { background: #fff; } &lt;/style&gt;</b>", 
                example: "<style> body { background: #fff; } </style>" 
            },
            { 
                title: "5. External CSS", 
                instruction: "External CSS uses a separate .css file linked with the &lt;link&gt; tag.", 
                description: "<b>&lt;link rel='stylesheet' href='styles.css'&gt;</b>", 
                example: "<link rel='stylesheet' href='styles.css'>" 
            },
            { 
                title: "6. Selectors", 
                instruction: "Selectors target HTML elements. The element selector targets tags like 'p' or 'h1'.", 
                description: "<b>p { color: green; }</b>", 
                example: "p { color: green; }" 
            },
            { 
                title: "7. Class Selectors", 
                instruction: "Class selectors use a dot (.) to target elements with a specific class.", 
                description: "<b>.highlight { background: yellow; }</b>", 
                example: ".highlight { background: yellow; }" 
            },
            { 
                title: "8. ID Selectors", 
                instruction: "ID selectors use a hash (#) to target a unique element by its ID.", 
                description: "<b>#header { font-size: 20px; }</b>", 
                example: "#header { font-size: 20px; }" 
            },
            { 
                title: "9. Universal Selector", 
                instruction: "The universal selector (*) applies styles to all elements on the page.", 
                description: "<b>* { margin: 0; }</b>", 
                example: "* { margin: 0; }" 
            },
            { 
                title: "10. Grouping Selectors", 
                instruction: "Group selectors with a comma to apply the same styles to multiple elements.", 
                description: "<b>h1, h2 { color: blue; }</b>", 
                example: "h1, h2 { color: blue; }" 
            },
            { 
                title: "11. Colors", 
                instruction: "CSS colors can be set using names, hex codes, or RGB values.", 
                description: "<b>p { color: #ff0000; }</b>", 
                example: "p { color: #ff0000; }" 
            },
            { 
                title: "12. Backgrounds", 
                instruction: "The background property styles an element’s background color or image.", 
                description: "<b>body { background: lightblue; }</b>", 
                example: "body { background: lightblue; }" 
            },
            { 
                title: "13. Fonts", 
                instruction: "The font-family property sets the typeface for text.", 
                description: "<b>p { font-family: Arial; }</b>", 
                example: "p { font-family: Arial; }" 
            },
            { 
                title: "14. Font Size", 
                instruction: "The font-size property adjusts text size using pixels, em, or rem.", 
                description: "<b>h1 { font-size: 32px; }</b>", 
                example: "h1 { font-size: 32px; }" 
            },
            { 
                title: "15. Text Alignment", 
                instruction: "The text-align property aligns text: left, right, center, or justify.", 
                description: "<b>p { text-align: center; }</b>", 
                example: "p { text-align: center; }" 
            },
            { 
                title: "16. Margins", 
                instruction: "The margin property sets the space outside an element.", 
                description: "<b>div { margin: 20px; }</b>", 
                example: "div { margin: 20px; }" 
            },
            { 
                title: "17. Padding", 
                instruction: "The padding property sets the space inside an element’s border.", 
                description: "<b>div { padding: 10px; }</b>", 
                example: "div { padding: 10px; }" 
            },
            { 
                title: "18. Borders", 
                instruction: "The border property defines an element’s border with style, width, and color.", 
                description: "<b>div { border: 1px solid black; }</b>", 
                example: "div { border: 1px solid black; }" 
            },
            { 
                title: "19. Width and Height", 
                instruction: "The width and height properties set an element’s dimensions.", 
                description: "<b>img { width: 100px; height: 100px; }</b>", 
                example: "img { width: 100px; height: 100px; }" 
            },
            { 
                title: "20. Display Property", 
                instruction: "The display property controls element layout: block, inline, or none.", 
                description: "<b>span { display: block; }</b>", 
                example: "span { display: block; }" 
            },
            { 
                title: "21. Position Property", 
                instruction: "The position property (static, relative, absolute, fixed) controls element placement.", 
                description: "<b>div { position: absolute; }</b>", 
                example: "div { position: absolute; }" 
            },
            { 
                title: "22. Top, Right, Bottom, Left", 
                instruction: "These properties adjust positioning for non-static elements.", 
                description: "<b>div { position: absolute; top: 10px; }</b>", 
                example: "div { position: absolute; top: 10px; }" 
            },
            { 
                title: "23. Float", 
                instruction: "The float property moves an element left or right, with text wrapping around.", 
                description: "<b>img { float: left; }</b>", 
                example: "img { float: left; }" 
            },
            { 
                title: "24. Clear", 
                instruction: "The clear property prevents elements from wrapping around floated items.", 
                description: "<b>p { clear: both; }</b>", 
                example: "p { clear: both; }" 
            },
            { 
                title: "25. Overflow", 
                instruction: "The overflow property manages content that exceeds an element’s size.", 
                description: "<b>div { overflow: scroll; }</b>", 
                example: "div { overflow: scroll; }" 
            },
            { 
                title: "26. Opacity", 
                instruction: "The opacity property sets transparency from 0 (invisible) to 1 (opaque).", 
                description: "<b>img { opacity: 0.5; }</b>", 
                example: "img { opacity: 0.5; }" 
            },
            { 
                title: "27. Box Shadow", 
                instruction: "The box-shadow property adds a shadow effect to elements.", 
                description: "<b>div { box-shadow: 2px 2px 5px gray; }</b>", 
                example: "div { box-shadow: 2px 2px 5px gray; }" 
            },
            { 
                title: "28. Text Shadow", 
                instruction: "The text-shadow property adds a shadow to text.", 
                description: "<b>h1 { text-shadow: 1px 1px 2px black; }</b>", 
                example: "h1 { text-shadow: 1px 1px 2px black; }" 
            },
            { 
                title: "29. Flexbox", 
                instruction: "Flexbox (display: flex) creates flexible layouts for arranging items.", 
                description: "<b>.container { display: flex; }</b>", 
                example: ".container { display: flex; }" 
            },
            { 
                title: "30. Flex Direction", 
                instruction: "The flex-direction property sets the axis of flex items: row or column.", 
                description: "<b>.container { display: flex; flex-direction: column; }</b>", 
                example: ".container { display: flex; flex-direction: column; }" 
            },
            { 
                title: "31. Justify Content", 
                instruction: "The justify-content property aligns flex items along the main axis.", 
                description: "<b>.container { display: flex; justify-content: space-between; }</b>", 
                example: ".container { display: flex; justify-content: space-between; }" 
            },
            { 
                title: "32. Align Items", 
                instruction: "The align-items property aligns flex items along the cross axis.", 
                description: "<b>.container { display: flex; align-items: center; }</b>", 
                example: ".container { display: flex; align-items: center; }" 
            },
            { 
                title: "33. CSS Grid", 
                instruction: "CSS Grid (display: grid) creates a two-dimensional layout system.", 
                description: "<b>.grid { display: grid; }</b>", 
                example: ".grid { display: grid; }" 
            },
            { 
                title: "34. Grid Template Columns", 
                instruction: "The grid-template-columns property defines column sizes in a grid.", 
                description: "<b>.grid { display: grid; grid-template-columns: 1fr 1fr; }</b>", 
                example: ".grid { display: grid; grid-template-columns: 1fr 1fr; }" 
            },
            { 
                title: "35. Grid Gap", 
                instruction: "The gap property sets spacing between grid rows and columns.", 
                description: "<b>.grid { display: grid; gap: 10px; }</b>", 
                example: ".grid { display: grid; gap: 10px; }" 
            },
            { 
                title: "36. Pseudo-Classes", 
                instruction: "Pseudo-classes like :hover style elements based on user interaction.", 
                description: "<b>a:hover { color: red; }</b>", 
                example: "a:hover { color: red; }" 
            },
            { 
                title: "37. Pseudo-Elements", 
                instruction: "Pseudo-elements like ::before add content before an element.", 
                description: "<b>p::before { content: '★'; }</b>", 
                example: "p::before { content: '★'; }" 
            },
            { 
                title: "38. Transitions", 
                instruction: "The transition property animates property changes over time.", 
                description: "<b>button { transition: background 0.3s; }</b>", 
                example: "button { transition: background 0.3s; }" 
            },
            { 
                title: "39. Transformations", 
                instruction: "The transform property rotates, scales, or moves elements.", 
                description: "<b>img { transform: rotate(45deg); }</b>", 
                example: "img { transform: rotate(45deg); }" 
            },
            { 
                title: "40. Animations", 
                instruction: "The @keyframes rule defines custom animations.", 
                description: "<b>@keyframes fade { from { opacity: 0; } to { opacity: 1; } }</b>", 
                example: "@keyframes fade { from { opacity: 0; } to { opacity: 1; } }" 
            },
            { 
                title: "41. Animation Property", 
                instruction: "The animation property applies keyframes with timing and repetition.", 
                description: "<b>div { animation: fade 2s infinite; }</b>", 
                example: "div { animation: fade 2s infinite; }" 
            },
            { 
                title: "42. Media Queries", 
                instruction: "Media queries apply styles based on screen size or device.", 
                description: "<b>@media (max-width: 600px) { body { font-size: 14px; } }</b>", 
                example: "@media (max-width: 600px) { body { font-size: 14px; } }" 
            },
            { 
                title: "43. Variables", 
                instruction: "CSS custom properties (variables) store reusable values.", 
                description: "<b>:root { --main-color: blue; } p { color: var(--main-color); }</b>", 
                example: ":root { --main-color: blue; } p { color: var(--main-color); }" 
            },
            { 
                title: "44. Box Sizing", 
                instruction: "The box-sizing property changes how the box model calculates size.", 
                description: "<b>* { box-sizing: border-box; }</b>", 
                example: "* { box-sizing: border-box; }" 
            },
            { 
                title: "45. Z-Index", 
                instruction: "The z-index property controls stacking order of positioned elements.", 
                description: "<b>div { position: absolute; z-index: 10; }</b>", 
                example: "div { position: absolute; z-index: 10; }" 
            },
            { 
                title: "46. Cursor", 
                instruction: "The cursor property changes the mouse pointer style.", 
                description: "<b>button { cursor: pointer; }</b>", 
                example: "button { cursor: pointer; }" 
            },
            { 
                title: "47. Text Decoration", 
                instruction: "The text-decoration property adds underlines, overlines, or line-through.", 
                description: "<b>a { text-decoration: none; }</b>", 
                example: "a { text-decoration: none; }" 
            },
            { 
                title: "48. Line Height", 
                instruction: "The line-height property sets the space between text lines.", 
                description: "<b>p { line-height: 1.5; }</b>", 
                example: "p { line-height: 1.5; }" 
            },
            { 
                title: "49. Letter Spacing", 
                instruction: "The letter-spacing property adjusts space between characters.", 
                description: "<b>h1 { letter-spacing: 2px; }</b>", 
                example: "h1 { letter-spacing: 2px; }" 
            },
            { 
                title: "50. Word Spacing", 
                instruction: "The word-spacing property adjusts space between words.", 
                description: "<b>p { word-spacing: 5px; }</b>", 
                example: "p { word-spacing: 5px; }" 
            }
        ];

        // Test Questions (each with exactly 3 answers)
        const questions = [
            { q: "What does CSS stand for?", a: ["Cascading Style Sheets", "Creative Style System", "Colorful Style Sheets"], correct: 0 },
            { q: "What is the correct CSS syntax?", a: ["selector { property: value; }", "selector (property = value)", "property: selector { value; }"], correct: 0 },
            { q: "How do you apply inline CSS?", a: ["style attribute", "&lt;style&gt; tag", "&lt;link&gt; tag"], correct: 0 },
            { q: "Where is internal CSS placed?", a: ["&lt;style&gt; in &lt;head&gt;", "&lt;style&gt; in &lt;body&gt;", "External file"], correct: 0 },
            { q: "How do you link external CSS?", a: ["&lt;link rel='stylesheet'&gt;", "&lt;style src='file'&gt;", "&lt;css href='file'&gt;'"], correct: 0 },
            { q: "What targets an HTML element in CSS?", a: ["Element selector", "Class selector", "ID selector"], correct: 0 },
            { q: "How do you select a class?", a: [".class", "#class", "class"], correct: 0 },
            { q: "How do you select an ID?", a: ["#id", ".id", "id"], correct: 0 },
            { q: "What selector targets all elements?", a: ["*", ".", "#"], correct: 0 },
            { q: "How do you group selectors?", a: ["h1, h2", "h1 + h2", "h1 > h2"], correct: 0 },
            { q: "How can you set a color in CSS?", a: ["#ff0000", "blink", "shade"], correct: 0 },
            { q: "What property sets the background?", a: ["background", "color", "border"], correct: 0 },
            { q: "What property changes the font?", a: ["font-family", "font-size", "text-align"], correct: 0 },
            { q: "How do you set text size?", a: ["font-size", "text-size", "size"], correct: 0 },
            { q: "What aligns text?", a: ["text-align", "align", "position"], correct: 0 },
            { q: "What property adds outer space?", a: ["margin", "padding", "border"], correct: 0 },
            { q: "What property adds inner space?", a: ["padding", "margin", "spacing"], correct: 0 },
            { q: "What property creates a border?", a: ["border", "outline", "edge"], correct: 0 },
            { q: "What sets an element’s size?", a: ["width", "size", "dimension"], correct: 0 },
            { q: "What makes an element block-level?", a: ["display: block", "display: inline", "display: none"], correct: 0 },
            { q: "What property positions elements?", a: ["position", "float", "display"], correct: 0 },
            { q: "What moves a positioned element?", a: ["top", "float", "margin"], correct: 0 },
            { q: "What moves an element left or right?", a: ["float", "position", "align"], correct: 0 },
            { q: "What stops wrapping around floats?", a: ["clear", "overflow", "display"], correct: 0 },
            { q: "What handles excess content?", a: ["overflow", "clip", "hide"], correct: 0 },

            { q: "What adjusts character spacing?", a: ["letter-spacing", "line-height", "word-spacing"], correct: 0 },
            { q: "What adjusts word spacing?", a: ["word-spacing", "letter-spacing", "line-height"], correct: 0 }
        ];

        // State Variables
        let currentLesson = 0;
        let currentQuestion = 0;
        let answers = new Array(50).fill(null);
        let lessonProgress = new Array(50).fill(false);
        let testProgress = new Array(50).fill(false);

        // Shuffle Function for Questions
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const shuffledQuestions = shuffle([...questions]);

        // Toggle Lesson and Test Boxes
        function toggleLessonBox() {
            const lessonBox = document.getElementById('lessonBox');
            const testBox = document.getElementById('testBox');
            if (testBox.classList.contains('active')) {
                testBox.classList.remove('active');
            }
            lessonBox.classList.toggle('active');
            if (lessonBox.classList.contains('active')) {
                updateLesson();
                updateLessonSquares();
            }
        }

        function toggleTestBox() {
            const lessonBox = document.getElementById('lessonBox');
            const testBox = document.getElementById('testBox');
            if (lessonBox.classList.contains('active')) {
                lessonBox.classList.remove('active');
            }
            testBox.classList.toggle('active');
            if (testBox.classList.contains('active')) {
                updateQuestion();
                updateTestSquares();
            }
        }

        // Update Lesson Display
        function updateLesson() {
            const lesson = lessons[currentLesson];
            document.getElementById('lessonContent').innerHTML = `
                <h2>${lesson.title}</h2>
                <div class="instruction">${lesson.instruction}</div>
                <div class="description">${lesson.description}</div>
                <div class="example">${lesson.example}</div>
            `;
            document.getElementById('prevLessonBtn').disabled = currentLesson === 0;
            document.getElementById('nextLessonBtn').disabled = currentLesson === lessons.length - 1;
            lessonProgress[currentLesson] = true;
            updateLessonSquares();
        }

        // Update Test Question Display
        function updateQuestion() {
            const q = shuffledQuestions[currentQuestion];
            document.getElementById('testQuestion').innerHTML = `
                <h2>Question ${currentQuestion + 1}</h2>
                <p>${q.q}</p>
                ${q.a.map((opt, i) => `<label><input type="radio" name="q${currentQuestion}" value="${i}" ${answers[currentQuestion] === i ? 'checked' : ''}> ${opt}</label><br>`).join('')}
                <button class="submit-btn" id="submitBtn" onclick="submitTest()">Submit</button>
            `;
            document.getElementById('prevQuestionBtn').disabled = currentQuestion === 0;
            document.getElementById('nextQuestionBtn').disabled = currentQuestion === shuffledQuestions.length - 1;

            const submitBtn = document.getElementById('submitBtn');
            const allAnswered = answers.every(answer => answer !== null);
            if (currentQuestion === shuffledQuestions.length - 1 && allAnswered) {
                submitBtn.style.display = 'block';
            } else {
                submitBtn.style.display = 'none';
            }

            // Handle Radio Button Selection (No Visual Highlighting)
            document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(radio => {
                radio.addEventListener('change', (e) => {
                    answers[currentQuestion] = parseInt(e.target.value);
                    testProgress[currentQuestion] = true;
                    updateTestSquares();
                    const allAnswered = answers.every(answer => answer !== null);
                    if (currentQuestion === shuffledQuestions.length - 1 && allAnswered) {
                        document.getElementById('submitBtn').style.display = 'block';
                    }
                });
            });
        }

        // Update Progress Squares
        function updateLessonSquares() {
            const squares = document.getElementById('lessonSquares');
            squares.innerHTML = '';
            lessonProgress.forEach((completed, i) => {
                const square = document.createElement('div');
                square.className = `lesson-square ${completed ? 'completed' : ''}`;
                square.textContent = i + 1;
                square.onclick = () => {
                    currentLesson = i;
                    updateLesson();
                };
                squares.appendChild(square);
            });
        }

        function updateTestSquares() {
            const squares = document.getElementById('testSquares');
            squares.innerHTML = '';
            testProgress.forEach((completed, i) => {
                const square = document.createElement('div');
                square.className = `test-square ${completed ? 'completed' : ''}`;
                square.textContent = i + 1;
                square.onclick = () => {
                    currentQuestion = i;
                    updateQuestion();
                };
                squares.appendChild(square);
            });
        }

        // Navigation Functions
        function prevLesson() {
            if (currentLesson > 0) currentLesson--;
            updateLesson();
        }

        function nextLesson() {
            if (currentLesson < lessons.length - 1) currentLesson++;
            updateLesson();
        }

        function prevQuestion() {
            if (currentQuestion > 0) currentQuestion--;
            updateQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < shuffledQuestions.length - 1) {
                currentQuestion++;
                updateQuestion();
            } else {
                gradeTest();
            }
        }

        // Test Grading and Submission
        function gradeTest() {
            let correct = 0;
            answers.forEach((ans, i) => {
                if (ans === shuffledQuestions[i].correct) correct++;
            });
            const score = (correct / 50) * 100;
            document.getElementById('testQuestion').style.display = 'none';
            document.getElementById('prevQuestionBtn').style.display = 'none';
            document.getElementById('nextQuestionBtn').style.display = 'none';
            if (score >= 80) {
                document.getElementById('certificateForm').classList.add('active');
            } else {
                document.getElementById('retryMessage').classList.add('active');
            }
        }

        function submitTest() {
            if (!answers.every(answer => answer !== null)) {
                alert('Please answer all questions before submitting.');
                return;
            }

            let correct = 0;
            answers.forEach((ans, i) => {
                if (ans === shuffledQuestions[i].correct) correct++;
            });
            
            if (correct >= 40) {
                window.location.href = 'correct-css.html'; // Update this to your desired redirect
            } else {
                gradeTest();
            }
        }

        // Certificate Generation
        function generateCertificate() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) {
                alert('Please enter your name.');
                return;
            }
            const certWindow = window.open('', '_blank');
            certWindow.document.write(`
                <html>
                <body style="text-align: center; font-family: Arial; background: #1a1a1a; color: #00ff00;">
                    <h1 style="color: #00b7eb;">CODEXEDOC Certificate</h1>
                    <p style="font-size: 1.5rem; margin: 20px;">Awarded to: ${name}</p>
                    <p>For successfully completing the CODEXEDOC CSS Course with a score of 80% or higher.</p>
                    <p>Date: March 29, 2025</p>
                </body>
                </html>
            `);
            certWindow.document.close();
        }
    </script>
