<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codexedoc - Code Validator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #eee;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: #eee;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ff00;
            display: inline-block;
        }

        .logo a {
            color: #00ff00;
            text-decoration: none;
            transition: color 0.3s;
        }

        .logo a:hover {
            color: #1e90ff;
        }

        .logo span {
            color: #1e90ff;
            font-size: 5rem;
            position: relative;
            top: 8px;
        }

        .main-section {
            background-color: #eee;
            padding: 50px 20px;
            text-align: center;
            color: #333;
        }

        .code-editor {
            width: 100%;
            margin: 0 auto 20px auto;
            background-color: #eee;
            padding: 5px;
            border-radius: 5px;
        }

        .code-editor textarea {
            width: 100%;
            height: 600px;
            background-color: #eee;
            color: #333;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            padding: 15px;
            border: 2px solid #1e90ff;
            border-radius: 5px;
            resize: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            line-height: 1.2;
        }

        .code-editor textarea::placeholder {
            color: #1e90ff;
        }

        .highlight-error {
            text-decoration: underline;
            text-decoration-color: #909090;
            text-decoration-thickness: 2px;
        }

        .buttons {
            margin: 20px auto;
            display: flex;
            justify-content: center;
            gap: 15px;
            max-width: 600px;
        }

        .validate-btn {
            background-color: #1e90ff;
            color: #eee;
			border: 2px solid #1e90ff;
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
		
		.test-btn {
            background-color: #00ff00;
            color: #eee;
			border: 2px solid #00ff00;
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
		
		.document-btn {
            background-color: #1e90ff;
            color: #eee;
			border: 2px solid #1e90ff;
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .validate-btn:hover, .test-btn:hover, .document-btn:hover {
            background-color: #333;
        }

        .error-messages {
            color: #909090;
            margin-top: 10px;
            text-align: center;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .output-section {
            background-color: #eee;
            padding: 5px;
            margin-top: 20px;
        }

        .output-container {
            width: 100%;
            margin: 0 auto;
            background-color: #eee;
            border-radius: 0px;
            overflow: hidden;
			border: 2px solid #00ff00;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .output-header {
            color: #00ff00;
            padding: 10px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #eee;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
		
		hr {
			border: 1px solid #00ff00;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
		}

        #outputFrame {
            width: 100%;
            height: 600px;
            border: none;
            background-color: #eee;
        }

        footer {
            background-color: #333;
            color: #1e90ff;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
        }

        footer a {
            color: #00ff00;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .footer-logo {
            font-size: 0.9rem;
            color: #00ff00;
            font-weight: bold;
        }

        .footer-logo span {
            color: #1e90ff;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2rem;
            }

            .logo span {
                font-size: 4rem;
                top: 6px;
            }

            .code-editor textarea {
                height: 400px;
            }

            .buttons {
                flex-direction: row;
                gap: 10px;
                max-width: 400px;
            }

            .validate-btn, .test-btn, .document-btn {
                padding: 8px 15px;
                font-size: 0.9rem;
            }

            #outputFrame {
                height: 400px;
            }

            .output-section {
                padding: 5px;
            }
        }

        @media (max-width: 480px) {
            .code-editor textarea {
                height: 300px;
                font-size: 0.8rem;
            }

            .buttons {
                max-width: 300px;
            }

            #outputFrame {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="code.html">CODE</a><a href="index.html"><span>X</span></a><a href="edoc.html">EDOC</a>
        </div>
    </header>

    <section class="main-section">
        <div class="code-editor">
            <textarea id="codeInput" placeholder="Enter your code here..."></textarea>
        </div>
        <div class="buttons">
            <button class="validate-btn" onclick="validateCode()">Test Code</button>
            <button class="test-btn" onclick="executeCode()">Run Execute</button>
            <button class="document-btn" onclick="saveCode()">Save Document</button>
        </div>
        <div id="errorMessages" class="error-messages"></div>
        <div class="output-section">
            <div class="output-container">
                <div class="output-header">Output</div>
				<hr>
                <iframe id="outputFrame"></iframe>
            </div>
        </div>
    </section>

    <footer>
        <p><span class="footer-logo">CODE<span>X</span>EDOC</span></p>
        <p>Copyright © 2025 CODEXEDOC. All Rights Reserved.</p>
        <p><a href="mailto:contact@codexedoc.com">contact@codexedoc.com</a></p>
    </footer>

    <script>
        const textarea = document.getElementById('codeInput');
        const errorDiv = document.getElementById('errorMessages');
        const outputFrame = document.getElementById('outputFrame');

        function highlightError(start, end) {
            textarea.focus();
            textarea.setSelectionRange(start, end);
            textarea.classList.add('highlight-error');
        }

        function clearHighlights() {
            textarea.classList.remove('highlight-error');
    	    textarea.setSelectionRange(0, 0); // Reset selection
            textarea.blur(); // Temporarily remove focus
            setTimeout(() => textarea.focus(), 0); // Restore focus to allow normal clicking
        }

        textarea.addEventListener('input', clearHighlights);

        // Comment removal function
        function removeComments(code, language) {
            if (language === 'html') {
                return code.replace(/<!--[\s\S]*?-->/g, '');
            } else if (language === 'javascript' || language === 'java' || language === 'cpp') {
                return code.replace(/\/\/.*$/gm, '').replace(/\/\*[\s\S]*?\*\//g, '');
            } else if (language === 'python') {
                return code.replace(/#.*$/gm, '');
            } else if (language === 'css') {
                return code.replace(/\/\*[\s\S]*?\*\//g, '');
            }
            return code;
        }

        // Language detection and validation
        const languageValidators = {
            javascript: (code) => {
                const errors = [];
                const cleanCode = removeComments(code, 'javascript');
                try {
                    new Function(cleanCode);
                } catch (e) {
                    const match = e.message.match(/line (\d+)/);
                    const lineNum = match ? parseInt(match[1]) - 1 : 0;
                    const lines = code.split('\n');
                    const line = lines[lineNum];
                    const errorMatch = e.message.match(/'([^']+)'/);
                    const errorToken = errorMatch ? errorMatch[1] : '';
                    const start = lines.slice(0, lineNum).join('\n').length + line.indexOf(errorToken) + 1;
                    const end = start + (errorToken.length || 1);
                    errors.push({ message: e.message, start, end });
                }
                return errors; // Removed semicolon check to avoid false positives
            },
            python: (code) => {
                const errors = [];
                const cleanCode = removeComments(code, 'python');
                const lines = cleanCode.split('\n');
                lines.forEach((line, i) => {
                    if (!line.trim()) return;
                    const leadingSpaces = line.match(/^\s*/)[0].length;
                    if (leadingSpaces % 4 !== 0 && line.trim().startsWith(' ')) {
                        const start = code.split('\n').slice(0, i).join('\n').length + 1;
                        errors.push({ message: `Invalid indentation at line ${i + 1} (must be multiples of 4 spaces)`, start, end: start + leadingSpaces });
                    }
                    if (line.trim().match(/^(if|for|while|def|class)/) && !line.endsWith(':')) {
                        const start = code.split('\n').slice(0, i).join('\n').length + line.lastIndexOf(line.trim()) + 1;
                        errors.push({ message: `Missing colon at line ${i + 1}`, start, end: start + line.trim().length });
                    }
                });
                return errors;
            },
            html: (code) => {
                const errors = [];
                const cleanCode = removeComments(code, 'html');
                const lines = cleanCode.split('\n');
                
                if (!cleanCode.match(/^<!DOCTYPE\s+html>/i)) {
                    const start = 0;
                    errors.push({ 
                        message: "Missing or invalid DOCTYPE declaration (should be <!DOCTYPE html>)", 
                        start, 
                        end: lines[0].indexOf('<') !== -1 ? lines[0].indexOf('<') : lines[0].length 
                    });
                }

                const tagRegex = /<[^>]+/g;
                let match;
                const stack = [];

                while ((match = tagRegex.exec(cleanCode)) !== null) {
                    const tag = match[0];
                    const start = match.index;
                    
                    if (!tag.endsWith('>')) {
                        errors.push({
                            message: `Incomplete tag: ${tag} missing closing '>'`,
                            start,
                            end: start + tag.length
                        });
                        continue;
                    }

                    const isClosing = tag.startsWith('</');
                    const tagNameMatch = tag.match(/[a-z][a-z0-9]*/i);
                    if (!tagNameMatch) {
                        errors.push({
                            message: `Invalid tag syntax: ${tag}`,
                            start,
                            end: start + tag.length
                        });
                        continue;
                    }
                    const tagName = tagNameMatch[0];

                    if (!isClosing) {
                        if (!['br', 'img', 'hr', 'input'].includes(tagName.toLowerCase())) {
                            stack.push({ name: tagName, start });
                        }
                    } else if (stack.length) {
                        const lastTag = stack.pop();
                        if (lastTag.name.toLowerCase() !== tagName.toLowerCase()) {
                            errors.push({
                                message: `Mismatched closing tag: expected </${lastTag.name}> but found </${tagName}>`,
                                start,
                                end: start + tagName.length + 2
                            });
                            stack.push(lastTag);
                        }
                    }
                }

                stack.forEach(tag => {
                    errors.push({
                        message: `Unclosed tag: <${tag.name}>`,
                        start: tag.start,
                        end: tag.start + tag.name.length + 1
                    });
                });

                return errors;
            },
            css: (code) => {
                const errors = [];
                const cleanCode = removeComments(code, 'css');
                const lines = cleanCode.split('\n');
                let inBlock = false;
                lines.forEach((line, i) => {
                    if (!line.trim()) return;
                    if (line.match(/^[.#]?[a-zA-Z][\w-]*\s*{/)) {
                        inBlock = true;
                    } else if (line.match(/^\s*}/)) {
                        inBlock = false;
                    } else if (inBlock && !line.match(/^\s*[a-z-]+:\s*.+;/)) {
                        const start = code.split('\n').slice(0, i).join('\n').length + line.indexOf(line.trim()) + 1;
                        errors.push({ message: `Invalid CSS property at line ${i + 1}`, start, end: start + line.trim().length });
                    } else if (!inBlock && !line.match(/^[.#]?[a-zA-Z][\w-]*\s*{/)) {
                        const start = code.split('\n').slice(0, i).join('\n').length + line.indexOf(line.trim()) + 1;
                        errors.push({ message: `Invalid CSS selector at line ${i + 1}`, start, end: start + line.trim().length });
                    }
                });
                if (inBlock) {
                    errors.push({ message: "Missing closing brace", start: cleanCode.lastIndexOf('{'), end: cleanCode.lastIndexOf('{') + 1 });
                }
                return errors;
            },
            java: (code) => {
                const errors = [];
                const cleanCode = removeComments(code, 'java');
                if (!cleanCode.match(/public\s+class\s+\w+/)) {
                    errors.push({ message: 'Missing public class declaration', start: 0, end: code.indexOf(' ') !== -1 ? code.indexOf(' ') : code.length });
                }
                return errors;
            },
            cpp: (code) => {
                const errors = [];
                const cleanCode = removeComments(code, 'cpp');
                if (!cleanCode.includes('int main')) {
                    errors.push({ message: 'Missing main function', start: 0, end: code.indexOf(' ') !== -1 ? code.indexOf(' ') : code.length });
                }
                return errors;
            }
        };

        function detectLanguage(code) {
            if (code.includes('function') || code.includes('let') || code.includes('const')) return 'javascript';
            if (code.includes('def ') || code.includes('print(')) return 'python';
            if (code.includes('<html') || code.includes('<div')) return 'html';
            if (code.includes('{') && code.includes('}') && code.includes(':')) return 'css';
            if (code.includes('public class') || code.includes('System.out')) return 'java';
            if (code.includes('#include') || code.includes('int main')) return 'cpp';
            return 'html'; // default to original behavior
        }

        function validateCode() {
            // Complete reset
            clearHighlights();
            errorDiv.innerHTML = '';
            errorDiv.style.color = "#909090";
            const code = textarea.value.trim();

            if (!code) {
                highlightError(0, 1);
                errorDiv.innerHTML = "Errors Detected: No code entered";
                return;
            }

            const language = detectLanguage(code);
            const errors = languageValidators[language](code);

            if (errors.length > 0) {
                errors.forEach((error, index) => {
                    highlightError(error.start, error.end);
                    errorDiv.innerHTML += `${error.message}${index < errors.length - 1 ? '<br>' : ''}`;
                });
                errorDiv.style.color = "#909090";
            } else {
                errorDiv.innerHTML = "No Errors Detected";
                errorDiv.style.color = "#00ff00";
                setTimeout(() => {
                    clearHighlights();
                    errorDiv.innerHTML = "";
                    errorDiv.style.color = "#909090";
                }, 2000);
            }
        }

        function executeCode() {
            const code = textarea.value.trim();

            try {
                if (!code) {
                    errorDiv.innerHTML = "Errors Detected";
                    highlightError(0, 1);
                    outputFrame.srcdoc = '';
                    return;
                }

                outputFrame.srcdoc = '';
                
                if (code.includes('<html') && code.includes('</html>')) {
                    outputFrame.srcdoc = code;
                } else {
                    outputFrame.srcdoc = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Output</title></head><body>${code}</body></html>`;
                }

                errorDiv.innerHTML = "No Errors Detected";
                errorDiv.style.color = "#00ff00";

                setTimeout(() => {
                    errorDiv.innerHTML = "";
                    errorDiv.style.color = "#909090";
                    clearHighlights();
                }, 3000);

            } catch (e) {
                errorDiv.innerHTML = "Errors Detected";
                highlightError(0, code.length);
                outputFrame.srcdoc = '';
            }
        }

        function saveCode() {
            const code = textarea.value.trim();
            
            try {
                if (!code) {
                    errorDiv.innerHTML = "Errors Detected";
                    highlightError(0, 1);
                    return;
                }

                const fullDocument = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Code - CODEXEDOC</title>
</head>
<body>
${code}
</body>
</html>`;

                const blob = new Blob([fullDocument], { type: "text/html;charset=utf-8" });
                const link = document.createElement("a");
                
                if ('download' in link) {
                    link.href = URL.createObjectURL(blob);
                    link.download = "codexedoc_output.html";
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } else {
                    const url = URL.createObjectURL(blob);
                    window.location.href = url;
                    setTimeout(() => URL.revokeObjectURL(url), 1000);
                }
                
                errorDiv.innerHTML = "No Errors Detected";
                errorDiv.style.color = "#00ff00";
                
                setTimeout(() => {
                    errorDiv.innerHTML = "";
                    errorDiv.style.color = "#909090";
                    clearHighlights();
                }, 3000);

            } catch (e) {
                errorDiv.innerHTML = "Errors Detected";
                highlightError(0, code.length);
            }
        }
    </script>
</body>
</html>
