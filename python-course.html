<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Course & Test - Codexedoc</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #eee;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: #eee;
            padding: 20px;
            text-align: center;
			position: sticky;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ff00;
            display: inline-block;
        }

        .logo a {
            color: #00ff00;
            text-decoration: none;
            transition: color 0.3s;
        }

        .logo a:hover {
            color: #1e90ff;
        }

        .logo span {
            color: #1e90ff;
            font-size: 5rem;
            position: relative;
            top: 8px;
        }

        .main-section {
            margin: auto;
            padding: 20px;
            background-color: #eee;
            border-radius: 5px;
        }

        .buttons {
            text-align: center;
            margin: 20px 0;
        }

        .btn-lesson {
            padding: 15px 30px;
            margin: 10px;
            background-color: #1e90ff;
            color: #eee;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .btn-test {
            padding: 15px 30px;
            margin: 10px;
            background-color: #00ff00;
            color: #eee;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .lesson-box {
            display: none;
            background-color: #1e90ff;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            color: #333;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .test-box {
            display: none;
            background-color: #00ff00;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            color: #1a1a1a;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .lesson-box.active, .test-box.active {
            display: block;
        }

        .lesson-content {
            background-color: #333;
            color: #eee;
            padding: 20px;
            border-radius: 5px;
            margin: 10px 0;
        }

        .lesson-content h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #eee; /* White titles */
        }

        .lesson-content .instruction, 
        .lesson-content .description, 
        .lesson-content .example {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 5px;
        }

        .lesson-content .instruction {
            background-color: #333;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .lesson-content .description {
            background-color: #333;
            font-size: 1rem;
            color: #eee;
			border-left: 4px solid #00ff00;
            font-weight: bold; /* Bold description */
        }

        .lesson-content .example {
		    color: #eee;
            background-color: #333;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
			border: 1px solid #00ff00;
			white-space: pre-wrap;
        }

        .test-question {
            background-color: #333;
            color: #eee;
            padding: 20px;
            border-radius: 5px;
            margin: 10px 0;
            position: relative; /* Added for submit button positioning */
        }

        .submit-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            padding: 10px 20px;
            background-color: #1e90ff;
            color: #333;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            display: none;
        }

        .submit-btn:hover {
            background-color: #00ff00;
        }

        pre {
            background-color: #333;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            white-space: pre-wrap;
            border: 1px solid #333;
        }

        .nav-buttons {
            margin: 20px 0;
            text-align: center;
        }

        .nav-btn-lesson {
            padding: 10px 20px;
            background-color: #333;
            color: #1e90ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .nav-btn-test {
            padding: 10px 20px;
            background-color: #333;
            color: #00ff00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
        }
        .nav-btn-lesson:disabled, .nav-btn-test:disabled {
            background-color: #333;
            color: #eee;
            cursor: not-allowed;
        }

        .progress-squares {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 20px 0;
            justify-content: center;
        }

        .lesson-square {
            width: 25px;
            height: 25px;
            background-color: #1e90ff;
            border-radius: 3px;
            text-align: center;
            color: #333;
            font-size: 0.9rem;
            line-height: 25px;
            cursor: pointer;
        }

        .lesson-square.completed {
            background-color: #00ff00;
        }

        .test-square {
            width: 25px;
            height: 25px;
            background-color: #00ff00;
            border-radius: 3px;
            text-align: center;
            color: #333;
            font-size: 0.9rem;
            line-height: 25px;
            cursor: pointer;
        }

        .test-square.completed {
            background-color: #1e90ff;
        }

        .certificate-form, .retry-message {
            display: none;
            text-align: center;
            padding: 20px;
            background-color: #eee;
            color: #333;
            border-radius: 5px;
        }

        .certificate-form.active, .retry-message.active {
            display: block;
        }

        input[type="text"] {
            padding: 10px;
            margin: 10px 0;
            width: 200px;
        }

        footer {
            background-color: #333;
            color: #1e90ff;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
        }

        footer a {
            color: #00ff00;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .footer-logo {
            font-size: 0.9rem;
            color: #00ff00;
            font-weight: bold;
        }

        .footer-logo span {
            color: #1e90ff;
        }


        @media (max-width: 768px) {
            .logo { font-size: 2rem; }
            .logo span { font-size: 4rem; top: 6px; }
            .main-section { padding: 15px; }
            .btn-lesson, .btn-test { font-size: 1rem; padding: 10px 20px; }
            .lesson-square, .test-square { width: 20px; height: 20px; font-size: 0.8rem; line-height: 20px; }
            .lesson-content h2 { font-size: 1.5rem; }
            .lesson-content .instruction { font-size: 1rem; }
            .lesson-content .description { font-size: 0.9rem; }
            .lesson-content .example { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="code.html">CODE</a><a href="index.html"><span>X</span></a><a href="edoc.html">EDOC</a>
        </div>
    </header>

    <section class="main-section">
        <div class="buttons">
            <button class="btn-lesson" onclick="toggleLessonBox()">Open Lesson</button>
            <button class="btn-test" onclick="toggleTestBox()">Launch Test</button>
        </div>

        <div class="lesson-box" id="lessonBox">
            <div class="lesson-content" id="lessonContent"></div>
            <div class="nav-buttons">
                <button class="nav-btn-lesson" onclick="prevLesson()" id="prevLessonBtn">Last</button>
                <button class="nav-btn-lesson" onclick="nextLesson()" id="nextLessonBtn">Next</button>
            </div>
            <div class="progress-squares" id="lessonSquares"></div>
        </div>

        <div class="test-box" id="testBox">
            <div class="test-question" id="testQuestion">
                <button class="submit-btn" id="submitBtn" onclick="submitTest()">Submit</button>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn-test" onclick="prevQuestion()" id="prevQuestionBtn">Last</button>
                <button class="nav-btn-test" onclick="nextQuestion()" id="nextQuestionBtn">Next</button>
            </div>
            <div class="progress-squares" id="testSquares"></div>
            <div class="certificate-form" id="certificateForm">
                <h2>Congratulations!</h2>
                <p>Enter your name for your certificate (80%+ score):</p>
                <input type="text" id="nameInput" placeholder="Your Name" required>
                <button class="nav-btn-test" onclick="generateCertificate()">Generate Certificate</button>
            </div>
            <div class="retry-message" id="retryMessage">
                <h2>Try Again</h2>
                <p>Your score was below 80%. Please review the lessons and try again.</p>
            </div>
        </div>
    </section>

    <footer>
        <p><span class="footer-logo">CODE<span>X</span>EDOC</span></p>
        <p>Copyright © 2025 CODEXEDOC. All Rights Reserved.</p>
        <p><a href="mailto:contact@codexedoc.com">contact@codexedoc.com</a></p>
    </footer>

            { title: "4. Data Types", instruction: "Common types include int, float, str, bool.", description: "<b>y = 3.14</b>", example: "y = 3.14\nprint(type(y))" },
            { title: "5. Strings", instruction: "Strings are sequences of characters.", description: "<b>s = 'Python'</b>", example: "s = 'Python'\nprint(s)" },

            { title: "7. Comparison Operators", instruction: "Use ==, !=, >, <, >=, <= for comparisons.", description: "<b>5 > 3</b>", example: "print(5 > 3)" },
            { title: "8. Logical Operators", instruction: "Use and, or, not for logical operations.", description: "<b>True and False</b>", example: "print(True and False)" },
            { title: "9. If Statements", instruction: "If statements control flow based on conditions.", description: "<b>if x > 0:</b>", example: "x = 5\nif x > 0:\n    print('Positive')" },
            { title: "10. Else Statements", instruction: "Else handles the false case of an if.", description: "<b>else:</b>", example: "x = -1\nif x > 0:\n    print('Positive')\nelse:\n    print('Negative')" },

            { title: "16. Lists", instruction: "Lists are mutable, ordered sequences.", description: "<b>my_list = [1, 2, 3]</b>", example: "my_list = [1, 2, 3]\nprint(my_list)" },
            { title: "17. List Indexing", instruction: "Access list elements using indices.", description: "<b>my_list[0]</b>", example: "my_list = [1, 2, 3]\nprint(my_list[0])" },
            { title: "18. List Slicing", instruction: "Slice lists to get sublists.", description: "<b>my_list[1:3]</b>", example: "my_list = [1, 2, 3, 4]\nprint(my_list[1:3])" },
            { title: "19. List Methods", instruction: "Lists have methods like append(), remove().", description: "<b>my_list.append(4)</b>", example: "my_list = [1, 2, 3]\nmy_list.append(4)\nprint(my_list)" },
            { title: "20. Tuples", instruction: "Tuples are immutable sequences.", description: "<b>my_tuple = (1, 2, 3)</b>", example: "my_tuple = (1, 2, 3)\nprint(my_tuple)" },
            { title: "21. Dictionaries", instruction: "Dictionaries store key-value pairs.", description: "<b>my_dict = {'a': 1}</b>", example: "my_dict = {'a': 1}\nprint(my_dict['a'])" },
            { title: "22. Sets", instruction: "Sets store unique, unordered elements.", description: "<b>my_set = {1, 2, 3}</b>", example: "my_set = {1, 2, 3}\nprint(my_set)" },
            { title: "23. Functions", instruction: "Functions are reusable code blocks.", description: "<b>def my_func():</b>", example: "def my_func():\n    print('Hello')\nmy_func()" },
            { title: "24. Function Arguments", instruction: "Pass data to functions via arguments.", description: "<b>def my_func(x):</b>", example: "def my_func(x):\n    print(x)\nmy_func(5)" },
            { title: "25. Return Statements", instruction: "Functions can return values.", description: "<b>return x</b>", example: "def add(a, b):\n    return a + b\nprint(add(2, 3))" },

            { title: "28. String Methods", instruction: "Strings have methods like upper(), split().", description: "<b>'hello'.upper()</b>", example: "s = 'hello'\nprint(s.upper())" },

            { title: "30. List Comprehension", instruction: "Create lists concisely.", description: "<b>[x*2 for x in range(5)]</b>", example: "squares = [x*2 for x in range(5)]\nprint(squares)" },

            { title: "33. File Writing", instruction: "Write to files using open().", description: "<b>with open('file.txt', 'w'):</b>", example: "with open('file.txt', 'w') as f:\n    f.write('Hello')" },
            { title: "34. Exceptions", instruction: "Handle errors with try/except.", description: "<b>try: ... except:</b>", example: "try:\n    x = 1/0\nexcept ZeroDivisionError:\n    print('Error')" },

            { title: "36. Constructors", instruction: "Initialize objects with __init__.", description: "<b>def __init__(self):</b>", example: "class MyClass:\n    def __init__(self):\n        self.x = 5" },
            { title: "37. Methods", instruction: "Classes can have methods.", description: "<b>def my_method(self):</b>", example: "class MyClass:\n    def my_method(self):\n        print('Hello')" },

        let testProgress = new Array(50).fill(false);

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const shuffledQuestions = shuffle([...questions]);

        function toggleLessonBox() {
            const lessonBox = document.getElementById('lessonBox');
            const testBox = document.getElementById('testBox');
            if (testBox.classList.contains('active')) {
                testBox.classList.remove('active');
            }
            lessonBox.classList.toggle('active');
            if (lessonBox.classList.contains('active')) {
                updateLesson();
                updateLessonSquares();
            }
        }

        function toggleTestBox() {
            const lessonBox = document.getElementById('lessonBox');
            const testBox = document.getElementById('testBox');
            if (lessonBox.classList.contains('active')) {
                lessonBox.classList.remove('active');
            }
            testBox.classList.toggle('active');
            if (testBox.classList.contains('active')) {
                updateQuestion();
                updateTestSquares();
            }
        }

        function updateLesson() {
            const lesson = lessons[currentLesson];
            document.getElementById('lessonContent').innerHTML = `
                <h2>${lesson.title}</h2>
                <div class="instruction">${lesson.instruction}</div>
                <div class="description">${lesson.description}</div>
                <div class="example">${lesson.example}</div>
            `;
            document.getElementById('prevLessonBtn').disabled = currentLesson === 0;
            document.getElementById('nextLessonBtn').disabled = currentLesson === lessons.length - 1;
            lessonProgress[currentLesson] = true;
            updateLessonSquares();
        }

        function updateQuestion() {
            const q = shuffledQuestions[currentQuestion];
            document.getElementById('testQuestion').innerHTML = `
                <h2>Question ${currentQuestion + 1}</h2>
                <p>${q.q}</p>
                ${q.a.map((opt, i) => `<label><input type="radio" name="q${currentQuestion}" value="${i}" ${answers[currentQuestion] === i ? 'checked' : ''}> ${opt}</label><br>`).join('')}
                <button class="submit-btn" id="submitBtn" onclick="submitTest()">Submit</button>
            `;
            document.getElementById('prevQuestionBtn').disabled = currentQuestion === 0;
            document.getElementById('nextQuestionBtn').disabled = currentQuestion === shuffledQuestions.length - 1;

            const submitBtn = document.getElementById('submitBtn');
            const allAnswered = answers.every(answer => answer !== null);
            if (currentQuestion === shuffledQuestions.length - 1 && allAnswered) {
                submitBtn.style.display = 'block';
            } else {
                submitBtn.style.display = 'none';
            }

            document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(radio => {
                radio.addEventListener('change', (e) => {
                    answers[currentQuestion] = parseInt(e.target.value);
                    testProgress[currentQuestion] = true;
                    updateTestSquares();
                    const allAnswered = answers.every(answer => answer !== null);
                    if (currentQuestion === shuffledQuestions.length - 1 && allAnswered) {
                        document.getElementById('submitBtn').style.display = 'block';
                    }
                });
            });
        }

        function updateLessonSquares() {
            const squares = document.getElementById('lessonSquares');
            squares.innerHTML = '';
            lessonProgress.forEach((completed, i) => {
                const square = document.createElement('div');
                square.className = `lesson-square ${completed ? 'completed' : ''}`;
                square.textContent = i + 1;
                square.onclick = () => {
                    currentLesson = i;
                    updateLesson();
                };
                squares.appendChild(square);
            });
        }

        function updateTestSquares() {
            const squares = document.getElementById('testSquares');
            squares.innerHTML = '';
            testProgress.forEach((completed, i) => {
                const square = document.createElement('div');
                square.className = `test-square ${completed ? 'completed' : ''}`;
                square.textContent = i + 1;
                square.onclick = () => {
                    currentQuestion = i;
                    updateQuestion();
                };
                squares.appendChild(square);
            });
        }

        function prevLesson() {
            if (currentLesson > 0) currentLesson--;
            updateLesson();
        }

        function nextLesson() {
            if (currentLesson < lessons.length - 1) currentLesson++;
            updateLesson();
        }

        function prevQuestion() {
            if (currentQuestion > 0) currentQuestion--;
            updateQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < shuffledQuestions.length - 1) {
                currentQuestion++;
                updateQuestion();
            } else {
                gradeTest();
            }
        }

        function gradeTest() {
            let correct = 0;
            answers.forEach((ans, i) => {
                if (ans === shuffledQuestions[i].correct) correct++;
            });
            const score = (correct / 50) * 100;
            document.getElementById('testQuestion').style.display = 'none';
            document.getElementById('prevQuestionBtn').style.display = 'none';
            document.getElementById('nextQuestionBtn').style.display = 'none';
            if (score >= 80) {
                document.getElementById('certificateForm').classList.add('active');
            } else {
                document.getElementById('retryMessage').classList.add('active');
            }
        }

        function submitTest() {
            if (!answers.every(answer => answer !== null)) {
                alert('Please answer all questions before submitting.');
                return;
            }
            gradeTest();
        }

        function generateCertificate() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) {
                alert('Please enter your name.');
                return;
            }
            const certWindow = window.open('', '_blank');
            certWindow.document.write(`
                <html>
                <body style="text-align: center; font-family: Arial; background: #1a1a1a; color: #00ff00;">
                    <h1 style="color: #00b7eb;">CODEXEDOC Certificate</h1>
                    <p style="font-size: 1.5rem; margin: 20px;">Awarded to: ${name}</p>
                    <p>For successfully completing the CODEXEDOC Python Course with a score of 80% or higher.</p>
                    <p>Date: March 31, 2025</p>
                </body>
                </html>
            `);
            certWindow.document.close();
        }
    </script>
</body>
</html>
