<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codexedoc - Python Course</title>
    <style>
        /* Full CSS from the original file */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00b7eb;
            display: inline-block;
        }

        .logo a {
            color: #00b7eb;
            text-decoration: none;
            transition: color 0.3s;
        }

        .logo a:hover {
            color: #00ff00;
        }

        .logo span {
            color: #00ff00;
            font-size: 5rem;
            position: relative;
            top: 8px;
        }

        .main-section {
            background-color: #1a1a1a;
            padding: 50px 20px;
            text-align: center;
            color: #d4d4d4;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .start-btn, .test-btn {
            background-color: #00ff00;
            color: #1a1a1a;
            padding: 15px 30px;
            border: 2px solid #000000;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .start-btn:hover, .test-btn:hover {
            background-color: #00cc00;
        }

        .lessons-grid, .test-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
            margin-top: 30px;
        }

        .lesson-box, .test-box {
            background-color: #2a2a2a;
            color: #d4d4d4;
            padding: 20px;
            border: 2px solid #00b7eb;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.3s;
        }

        .lesson-box.completed, .test-box.completed {
            background-color: #00b7eb;
            color: #1a1a1a;
        }

        .lesson-box:hover, .test-box:hover {
            transform: scale(1.1);
        }

        .lesson-content, .test-content {
            display: none;
            background-color: #2a2a2a;
            padding: 20px;
            margin: 0 auto 20px auto;
            max-width: 800px;
            border-radius: 5px;
            border: 1px solid #00b7eb;
        }

        .lesson-content.active, .test-content.active {
            display: block;
        }

        .lesson-description, .test-description {
            color: #00ff00;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .code-breakdown {
            background-color: #000000;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
            text-align: left;
            margin-bottom: 15px;
        }

        .code-explanation {
            color: #d4d4d4;
            text-align: left;
            margin-bottom: 15px;
        }

        .code-explanation h4 {
            color: #00b7eb;
            margin-bottom: 10px;
        }

        .code-explanation ul {
            list-style-type: disc;
            padding-left: 20px;
        }

        .code-explanation li {
            margin-bottom: 5px;
        }

        .test-question {
            color: #d4d4d4;
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-align: left;
        }

        .test-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .test-option {
            background-color: #3a3a3a;
            color: #d4d4d4;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-align: left;
        }

        .test-option:hover {
            background-color: #4a4a4a;
        }

        .test-option.selected {
            background-color: #00b7eb;
            color: #1a1a1a;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .nav-btn, .submit-btn {
            background-color: #00b7eb;
            color: #1a1a1a;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .nav-btn:disabled, .submit-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .nav-btn:hover:not(:disabled), .submit-btn:hover:not(:disabled) {
            background-color: #00a3d3;
        }

        .test-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 200;
            overflow-y: auto;
        }

        .test-modal.active {
            display: block;
        }

        .test-modal-content {
            background-color: #1a1a1a;
            margin: 5% auto;
            padding: 20px;
            max-width: 900px;
            border-radius: 5px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            color: #00ff00;
            font-size: 2rem;
            cursor: pointer;
        }

        footer {
            background-color: #1a1a1a;
            color: #00ff00;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
        }

        footer a {
            color: #00b7eb;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .footer-logo {
            font-size: 0.9rem;
            color: #00b7eb;
            font-weight: bold;
        }

        .footer-logo span {
            color: #00ff00;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2rem;
            }

            .logo span {
                font-size: 4rem;
                top: 6px;
            }

            .lessons-grid, .test-grid {
                grid-template-columns: repeat(5, 1fr);
            }

            .start-btn, .test-btn {
                padding: 10px 20px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .lessons-grid, .test-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .nav-btn, .submit-btn {
                padding: 8px 15px;
                font-size: 0.9rem;
            }

            .button-container {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="edoc.html">CODE</a><a href="edoc.html"><span>X</span></a><a href="edoc.html">EDOC</a>
        </div>
    </header>

    <section class="main-section">
        <div id="python" class="tab-content active">
            <div class="button-container">
                <button class="start-btn" onclick="startCourse('python')">Open Course</button>
                <button class="test-btn" onclick="startTest('python')">Launch Test</button>
            </div>
            <div id="python-lesson-contents"></div>
            <div class="lessons-grid" id="python-lessons"></div>
        </div>

        <div id="testModal" class="test-modal">
            <div class="test-modal-content">
                <span class="close-btn" onclick="closetest()">×</span>
                <div id="testContents"></div>
                <div id="testGrid" class="test-grid"></div>
            </div>
        </div>
    </section>

    <footer>
        <p><span class="footer-logo">CODE<span>X</span>EDOC</span></p>
        <p>Copyright © 2025 CODEXEDOC. All Rights Reserved.</p>
        <p><a href="mailto:contact@codexedoc.com">contact@codexedoc.com</a></p>
    </footer>

    <script>
        // Python-specific lesson and test data
        const lessonsData = {
            python: [
                {
                    description: "Basic Python print statement.",
                    code: `print("Hello, World!")`,
                    breakdown: [
                        "print(): A built-in Python function to output text to the console.",
                        "\"Hello, World!\": The string argument passed to print()."
                    ]
                },
                {
                    description: "Python variables and basic operations.",
                    code: `x = 5
y = 10
sum = x + y
print("Sum:", sum)`,
                    breakdown: [
                        "x = 5: Assigns the value 5 to the variable x.",
                        "y = 10: Assigns the value 10 to the variable y.",
                        "sum = x + y: Adds x and y, storing the result in the variable sum.",
                        "print(): Outputs text to the console.",
                        "\"Sum:\", sum: The arguments to print(), displaying the label \"Sum:\" followed by the value of sum."
                    ]
                }
            ]
        };

        const testData = {
            python: Array.from({ length: 30 }, (_, i) => {
                if (i === 0) {
                    return {
                        description: "Python Basics test",
                        question: "What does the print() function do in Python?",
                        options: [
                            "Reads input from the user.",
                            "Outputs text to the console.",
                            "Defines a new function."
                        ],
                        correct: 1
                    };
                } else if (i === 1) {
                    return {
                        description: "Python Variables test",
                        question: "How do you assign the value 10 to a variable x in Python?",
                        options: [
                            "x = 10",
                            "let x = 10",
                            "x := 10"
                        ],
                        correct: 0
                    };
                } else {
                    return {
                        description: `Python Question ${i + 1}`,
                        question: `What is the purpose of Python question ${i + 1}?`,
                        options: [
                            "Option A",
                            "Option B",
                            "Option C"
                        ],
                        correct: 0
                    };
                }
            })
        };

        // State management
        const currentLessons = { python: 0 };
        const currenttestQuestions = { python: 0 };
        const completedLessons = { python: new Set() };
        const completedtestQuestions = { python: new Set() };
        const userAnswers = { python: Array(30).fill(null) };

        // Lesson Functions
        function startLearning(language) {
            const lessonsGrid = document.getElementById(`${language}-lessons`);
            const lessonContents = document.getElementById(`${language}-lesson-contents`);

            lessonsGrid.innerHTML = '';
            lessonContents.innerHTML = '';
            lessonsGrid.style.display = 'grid';

            for (let i = 1; i <= 30; i++) {
                const lessonBox = document.createElement('div');
                lessonBox.classList.add('lesson-box');
                lessonBox.textContent = i;
                lessonBox.onclick = () => {
                    currentLessons[language] = i;
                    completedLessons[language].add(i);
                    toggleLesson(language, i);
                };
                if (completedLessons[language].has(i)) {
                    lessonBox.classList.add('completed');
                }
                lessonsGrid.appendChild(lessonBox);

                const lessonContent = document.createElement('div');
                lessonContent.classList.add('lesson-content');
                lessonContent.id = `${language}-lesson-${i}`;
                
                const description = document.createElement('div');
                description.classList.add('lesson-description');
                description.textContent = lessonsData[language][i-1]?.description || `Lesson ${i}: Coming Soon`;
                
                const codeBreakdown = document.createElement('pre');
                codeBreakdown.classList.add('code-breakdown');
                codeBreakdown.textContent = lessonsData[language][i-1]?.code || '// Code example coming soon';
                
                const explanation = document.createElement('div');
                explanation.classList.add('code-explanation');
                const explanationTitle = document.createElement('h4');
                explanationTitle.textContent = 'Code Breakdown';
                explanation.appendChild(explanationTitle);
                
                const explanationList = document.createElement('ul');
                const breakdownItems = lessonsData[language][i-1]?.breakdown || ['No breakdown available yet.'];
                breakdownItems.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    explanationList.appendChild(li);
                });
                explanation.appendChild(explanationList);
                
                const navigation = document.createElement('div');
                navigation.classList.add('navigation');
                
                const prevBtn = document.createElement('button');
                prevBtn.classList.add('nav-btn');
                prevBtn.textContent = 'Previous';
                prevBtn.onclick = () => navigateLesson(language, i - 1);
                
                const nextBtn = document.createElement('button');
                nextBtn.classList.add('nav-btn');
                nextBtn.textContent = 'Next';
                nextBtn.onclick = () => navigateLesson(language, i + 1);
                
                navigation.appendChild(prevBtn);
                navigation.appendChild(nextBtn);
                
                lessonContent.appendChild(description);
                lessonContent.appendChild(codeBreakdown);
                lessonContent.appendChild(explanation);
                lessonContent.appendChild(navigation);
                lessonContents.appendChild(lessonContent);
            }

            currentLessons[language] = 1;
            completedLessons[language].add(1);
            toggleLesson(language, 1);
        }

        function toggleLesson(language, lessonNumber) {
            document.querySelectorAll(`#${language}-lesson-contents .lesson-content`).forEach(content => {
                content.classList.remove('active');
            });

            const selectedLesson = document.getElementById(`${language}-lesson-${lessonNumber}`);
            if (selectedLesson) {
                selectedLesson.classList.add('active');
                const prevBtn = selectedLesson.querySelector('.nav-btn:first-child');
                const nextBtn = selectedLesson.querySelector('.nav-btn:last-child');
                prevBtn.disabled = lessonNumber === 1;
                nextBtn.disabled = lessonNumber === 30;
            }

            const lessonBox = document.querySelector(`#${language}-lessons .lesson-box:nth-child(${lessonNumber})`);
            if (lessonBox) {
                lessonBox.classList.add('completed');
            }
        }

        function navigateLesson(language, lessonNumber) {
            if (lessonNumber < 1 || lessonNumber > 30) return;
            currentLessons[language] = lessonNumber;
            completedLessons[language].add(lessonNumber);
            toggleLesson(language, lessonNumber);
        }

        // test Functions
        function starttest(language) {
            const testModal = document.getElementById('testModal');
            const testContents = document.getElementById('testContents');
            const testGrid = document.getElementById('testGrid');

            testContents.innerHTML = '';
            testGrid.innerHTML = '';
            userAnswers[language] = Array(30).fill(null);
            completedtestQuestions[language].clear();

            testModal.classList.add('active');

            for (let i = 1; i <= 30; i++) {
                const testBox = document.createElement('div');
                testBox.classList.add('test-box');
                testBox.textContent = i;
                testBox.onclick = () => {
                    currenttestQuestions[language] = i;
                    completedtestQuestions[language].add(i);
                    toggletestQuestion(language, i);
                };
                if (completedtestQuestions[language].has(i)) {
                    testBox.classList.add('completed');
                }
                testGrid.appendChild(testBox);

                const testContent = document.createElement('div');
                testContent.classList.add('test-content');
                testContent.id = `${language}-test-${i}`;
                
                const description = document.createElement('div');
                description.classList.add('test-description');
                description.textContent = testData[language][i-1]?.description || `Question ${i}: Coming Soon`;
                
                const question = document.createElement('div');
                question.classList.add('test-question');
                question.textContent = testData[language][i-1]?.question || 'Question coming soon.';
                
                const optionsContainer = document.createElement('div');
                optionsContainer.classList.add('test-options');
                const options = testData[language][i-1]?.options || ['Option 1', 'Option 2', 'Option 3'];
                options.forEach((option, index) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.classList.add('test-option');
                    optionDiv.textContent = option;
                    optionDiv.onclick = () => selectOption(language, i, index);
                    optionsContainer.appendChild(optionDiv);
                });
                
                const navigation = document.createElement('div');
                navigation.classList.add('navigation');
                
                const prevBtn = document.createElement('button');
                prevBtn.classList.add('nav-btn');
                prevBtn.textContent = 'Previous';
                prevBtn.onclick = () => navigatetestQuestion(language, i - 1);
                
                const nextBtn = document.createElement('button');
                if (i === 30) {
                    nextBtn.classList.add('submit-btn');
                    nextBtn.textContent = 'Submit';
                    nextBtn.onclick = () => submittest(language);
                    nextBtn.style.display = 'none';
                    nextBtn.id = `${language}-submit-btn`;
                } else {
                    nextBtn.classList.add('nav-btn');
                    nextBtn.textContent = 'Next';
                    nextBtn.onclick = () => navigatetestQuestion(language, i + 1);
                }
                
                navigation.appendChild(prevBtn);
                navigation.appendChild(nextBtn);
                
                testContent.appendChild(description);
                testContent.appendChild(question);
                testContent.appendChild(optionsContainer);
                testContent.appendChild(navigation);
                testContents.appendChild(testContent);
            }

            currenttestQuestions[language] = 1;
            completedtestQuestions[language].add(1);
            toggletestQuestion(language, 1);
        }

        function toggletestQuestion(language, questionNumber) {
            document.querySelectorAll(`#testContents .test-content`).forEach(content => {
                content.classList.remove('active');
            });

            const selectedQuestion = document.getElementById(`${language}-test-${questionNumber}`);
            if (selectedQuestion) {
                selectedQuestion.classList.add('active');
                const prevBtn = selectedQuestion.querySelector('.nav-btn:first-child');
                const nextBtn = selectedQuestion.querySelector('.nav-btn:last-child') || selectedQuestion.querySelector('.submit-btn');
                prevBtn.disabled = questionNumber === 1;
                if (nextBtn.classList.contains('nav-btn')) {
                    nextBtn.disabled = questionNumber === 30;
                }

                if (questionNumber === 30 && nextBtn.classList.contains('submit-btn')) {
                    const allAnswered = userAnswers[language].every(answer => answer !== null);
                    nextBtn.style.display = allAnswered ? 'block' : 'none';
                }

                const selectedOptionIndex = userAnswers[language][questionNumber - 1];
                if (selectedOptionIndex !== null) {
                    const options = selectedQuestion.querySelectorAll('.test-option');
                    options[selectedOptionIndex].classList.add('selected');
                }
            }

            const testBox = document.querySelector(`#testGrid .test-box:nth-child(${questionNumber})`);
            if (testBox) {
                testBox.classList.add('completed');
            }
        }

        function navigatetestQuestion(language, questionNumber) {
            if (questionNumber < 1 || questionNumber > 30) return;
            currenttestQuestions[language] = questionNumber;
            completedtestQuestions[language].add(questionNumber);
            toggletestQuestion(language, questionNumber);
        }

        function selectOption(language, questionNumber, optionIndex) {
            const options = document.querySelectorAll(`#${language}-test-${questionNumber} .test-option`);
            options.forEach(option => option.classList.remove('selected'));
            options[optionIndex].classList.add('selected');

            userAnswers[language][questionNumber - 1] = optionIndex;

            if (questionNumber === 30) {
                const allAnswered = userAnswers[language].every(answer => answer !== null);
                const submitBtn = document.getElementById(`${language}-submit-btn`);
                if (submitBtn) {
                    submitBtn.style.display = allAnswered ? 'block' : 'none';
                }
            }
        }

        function submittest(language) {
            let score = 0;
            userAnswers[language].forEach((answer, index) => {
                if (answer === testData[language][index].correct) {
                    score++;
                }
            });

            alert(`You scored ${score} out of 30!`);
            if (score >= 25) {
                window.location.href = 'correct.html';
            } else {
                closetest();
            }
        }

        function closetest() {
            const testModal = document.getElementById('testModal');
            testModal.classList.remove('active');
        }

        // Initialization
        document.querySelectorAll('.lessons-grid').forEach(grid => {
            grid.style.display = 'none';
        });
    </script>
</body>
</html>
