<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEXEDOC</title>
    <link rel="stylesheet" href="codexedoc.css">
    <style>
        /* Center the game container on the screen */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            overflow: hidden; /* Prevent scrolling */
        }

        /* Style the game container - removed semi-transparent background */
        #gameContainer {
            width: 800px;
            height: 600px;
            position: relative;
            overflow: hidden;
            /* Removed: background: rgba(50, 50, 50, 0.5); */
        }

        /* Style the matrix background */
        #matrixBg {
            position: absolute;
            width: 100%;
            height: 100%;
            color: #0f0;
            font-family: monospace;
            font-size: 20px;
            overflow: hidden;
        }

        /* Style the start screen */
        #startScreen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            z-index: 10;
        }

        /* Style the game over screen */
        #gameOverScreen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            z-index: 10;
        }

        /* Style buttons */
        button {
            padding: 10px 20px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
        }

        /* Style mobile controls */
        #mobileControls {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* Style score display */
        #score {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 20px;
        }

        /* Style all game objects */
        .gameObject {
            position: absolute;
            font-size: 30px;
        }

        /* Style code symbols specifically with bold */
        .code {
            color: white;
            font-weight: bold; /* Make code symbols bold */
        }

        /* Media query for mobile devices */
        @media (max-width: 800px) {
            #mobileControls {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- Matrix background container -->
        <div id="matrixBg"></div>
        
        <!-- Start screen with instructions -->
        <div id="startScreen">
            <button id="startButton">START CODING</button>
            <div style="max-width: 600px; text-align: center; padding: 20px;">
                INSTRUCTIONS: Use arrow keys (⬆️⬇️⬅️➡️) or mobile controls to move the laptop (💻). 
                Collect documents (📄 = 2 points), execute (⚙️ = 1 point), and code (</> = 1 point) 
                while avoiding broken (⚠️). Speed increases every 15 seconds!
            </div>
        </div>

        <!-- Game over screen with leaderboard -->
        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <button id="restartButton">START CODING</button>
            <div id="leaderboard"></div>
            <div id="highScoreInput" style="display: none; margin-top: 20px;">
                <div>INPUT ALIAS:</div>
                <input type="text" id="aliasInput" maxlength="10" style="margin: 10px;">
                <button id="submitScore">ENTER</button>
            </div>
        </div>

        <!-- Mobile control buttons -->
        <div id="mobileControls">
            <button id="leftButton">⬅️</button>
            <button id="rightButton">➡️</button>
        </div>

        <!-- Score display -->
        <div id="score">SCORE: 0</div>
    </div>

    <script>
        // Core game elements
        const container = document.getElementById('gameContainer');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        const scoreDisplay = document.getElementById('score');
        const leftButton = document.getElementById('leftButton');
        const rightButton = document.getElementById('rightButton');
        const matrixBg = document.getElementById('matrixBg');
        
        // Game state variables
        let laptop; // Player object
        let gameObjects = []; // Array of falling objects
        let score = 0; // Player's current score
        let gameActive = false; // Game running state
        let speed = 1; // Starting speed (slower initial value)
        let leaderboard = JSON.parse(localStorage.getItem('leaderboard')) || []; // Persistent leaderboard

        // Create Matrix-style background animation with dynamic colors
        function createMatrix() {
            matrixBg.innerHTML = ''; // Clear existing matrix
            updateBackgroundColors(); // Set initial colors
            for (let i = 0; i < 50; i++) {
                const span = document.createElement('span');
                span.textContent = Math.random() > 0.5 ? '1' : '0'; // Random 1 or 0
                span.style.position = 'absolute';
                span.style.left = Math.random() * 800 + 'px'; // Random x position
                span.style.top = Math.random() * 600 + 'px'; // Random starting y position
                span.style.animation = `fall ${Math.random() * 5 + 5}s linear infinite`; // Random fall speed
                matrixBg.appendChild(span);
            }
        }

        // Update background and matrix colors based on score
        function updateBackgroundColors() {
            if (score <= 50) {
                document.body.style.background = '#0f1e27'; // Dark blue-gray for 0-50
                matrixBg.style.color = '#00b3ff'; // Light blue for 1s and 0s
            } else if (score <= 125) { // Changed from 150 to 125
                document.body.style.background = '#00b3ff'; // Light blue for 50-125
                matrixBg.style.color = '#96f755'; // Lime green for 1s and 0s
            } else {
                document.body.style.background = '#96f755'; // Lime green for 125+
                matrixBg.style.color = '#0f1e27'; // Dark blue-gray for 1s and 0s
            }
            // Ensure container size remains fixed
            container.style.width = '800px';
            container.style.height = '600px';
        }

        // Define falling animation keyframes
        const styleSheet = document.createElement('style');
        styleSheet.textContent = '@keyframes fall { 0% { transform: translateY(-600px); } 100% { transform: translateY(600px); } }';
        document.head.appendChild(styleSheet);

        // Create the player (laptop) object
        function createLaptop() {
            laptop = document.createElement('div');
            laptop.className = 'gameObject';
            laptop.textContent = '💻';
            laptop.style.left = '380px'; // Center horizontally
            laptop.style.bottom = '50px'; // Near bottom of screen
            container.appendChild(laptop);
        }

        // Spawn new falling objects
        function spawnObject() {
            if (!gameActive) return; // Don't spawn if game isn't active
            const rand = Math.random();
            let emoji, type, points;
            
            // Determine object type based on random probability
            if (rand < 0.5) { // 50% chance for broken
                emoji = '⚠️';
                type = 'broken';
                points = 0;
            } else if (rand < 0.6) { // 10% chance for document
                emoji = '📄';
                type = 'document';
                points = 2;
            } else if (rand < 0.8) { // 20% chance for execute
                emoji = '⚙️';
                type = 'execute';
                points = 1;
            } else { // 20% chance for code
                emoji = '</>';
                type = 'code';
                points = 1;
            }

            // Create and position new object
            const obj = document.createElement('div');
            obj.className = `gameObject ${type}`;
            obj.textContent = emoji;
            obj.style.left = Math.random() * 760 + 'px'; // Random x position
            obj.style.top = '-30px'; // Start above screen
            obj.points = points; // Store points value
            container.appendChild(obj);
            gameObjects.push(obj);
        }

        // Main game loop handling object movement and collisions
        function gameLoop() {
            if (!gameActive) return;

            gameObjects.forEach((obj, index) => {
                let top = parseFloat(obj.style.top) || 0;
                top += speed; // Move object down based on current speed
                obj.style.top = top + 'px';

                // Check if object is off screen
                if (top > 600) {
                    container.removeChild(obj);
                    gameObjects.splice(index, 1);
                } 
                // Check for collision with laptop
                else {
                    const laptopRect = laptop.getBoundingClientRect();
                    const objRect = obj.getBoundingClientRect();
                    if (
                        laptopRect.left < objRect.right &&
                        laptopRect.right > objRect.left &&
                        laptopRect.top < objRect.bottom &&
                        laptopRect.bottom > objRect.top
                    ) {
                        if (obj.className.includes('broken')) {
                            endGame(); // Hit broken object - game over
                        } else {
                            score += obj.points; // Add points for good objects
                            scoreDisplay.textContent = `SCORE: ${score}`;
                            updateBackgroundColors(); // Update colors when score changes
                            container.removeChild(obj);
                            gameObjects.splice(index, 1);
                        }
                    }
                }
            });

            requestAnimationFrame(gameLoop); // Continue game loop
        }

        // Handle laptop movement
        let moveLeft = false;
        let moveRight = false;
        function moveLaptop() {
            if (!gameActive) return;
            let left = parseFloat(laptop.style.left);
            if (moveLeft && left > 0) left -= 5; // Move left if within bounds
            if (moveRight && left < 760) left += 5; // Move right if within bounds
            laptop.style.left = left + 'px';
            requestAnimationFrame(moveLaptop); // Smooth movement
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowLeft': moveLeft = true; break;
                case 'ArrowRight': moveRight = true; break;
                case 'ArrowUp': 
                    if (parseFloat(laptop.style.bottom) < 550) 
                        laptop.style.bottom = (parseFloat(laptop.style.bottom) + 5) + 'px'; 
                    break;
                case 'ArrowDown': 
                    if (parseFloat(laptop.style.bottom) > 50) 
                        laptop.style.bottom = (parseFloat(laptop.style.bottom) - 5) + 'px'; 
                    break;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') moveLeft = false;
            if (e.key === 'ArrowRight') moveRight = false;
        });

        // Mobile touch controls
        leftButton.addEventListener('touchstart', () => moveLeft = true);
        leftButton.addEventListener('touchend', () => moveLeft = false);
        rightButton.addEventListener('touchstart', () => moveRight = true);
        rightButton.addEventListener('touchend', () => moveRight = false);

        // Start a new game
        function startGame() {
            gameActive = true;
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            score = 0; // Reset score
            scoreDisplay.textContent = `SCORE: ${score}`;
            speed = 1; // Reset to slow initial speed
            gameObjects.forEach(obj => container.removeChild(obj)); // Clear existing objects
            gameObjects = [];
            createLaptop(); // Create new player
            createMatrix(); // Reset background with initial colors
            // Clear any existing intervals and start new ones
            clearInterval(window.spawnInterval);
            clearInterval(window.speedInterval);
            window.spawnInterval = setInterval(spawnObject, 1000); // Spawn objects every second
            window.speedInterval = setInterval(() => speed += 0.5, 15000); // Increase speed every 15s
            gameLoop(); // Start main loop
            moveLaptop(); // Start movement
        }

        // End the current game
        function endGame() {
            gameActive = false;
            container.removeChild(laptop); // Remove player
            gameOverScreen.style.display = 'flex'; // Show game over screen
            // Clean up intervals
            clearInterval(window.spawnInterval);
            clearInterval(window.speedInterval);
            updateLeaderboard(); // Update scores
        }

        // Update and manage leaderboard
        function updateLeaderboard() {
            const leaderboardDiv = document.getElementById('leaderboard');
            leaderboard.push({ score: score, alias: '' }); // Add new score
            leaderboard.sort((a, b) => b.score - a.score); // Sort descending
            leaderboard = leaderboard.slice(0, 6); // Keep top 6

            // Check if score qualifies for leaderboard
            if (score >= (leaderboard[leaderboard.length-1]?.score || 0)) {
                document.getElementById('highScoreInput').style.display = 'block';
                document.getElementById('submitScore').onclick = () => {
                    const alias = document.getElementById('aliasInput').value;
                    leaderboard[leaderboard.findIndex(x => x.score === score)].alias = alias;
                    localStorage.setItem('leaderboard', JSON.stringify(leaderboard)); // Save to storage
                    displayLeaderboard();
                    document.getElementById('highScoreInput').style.display = 'none';
                };
            } else {
                displayLeaderboard();
            }
        }

        // Display leaderboard content
        function displayLeaderboard() {
            const leaderboardDiv = document.getElementById('leaderboard');
            leaderboardDiv.innerHTML = '<h2>Leaderboard</h2>' + 
                leaderboard.map((entry, i) => 
                    `<div>${i + 1}. ${entry.alias || 'Anonymous'}: ${entry.score}</div>`
                ).join('');
        }

        // Set up event listeners for game controls
        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', startGame);
    </script>
</body>
</html>
