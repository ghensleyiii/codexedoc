<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEXEDOC</title>
    <link rel="stylesheet" href="codexedoc.css">
    <style>
    /* Basic body styling */
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: 'Tahoma', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    
    /* Make game container responsive */
    #gameContainer {
        position: relative;
        width: 80vw; /* 80% of viewport width */
        height: 60vh; /* 60% of viewport height */
        max-width: 800px; /* Maximum size */
        max-height: 600px; /* Maximum size */
        overflow: hidden;
        margin: auto;
    }

    /* Adjust matrix background to container size */
    #matrix-bg {
        position: absolute;
        width: 100%;
        height: 100%;
        color: gray;
        font-size: clamp(12px, 2.5vw, 20px); /* Responsive font size */
        font-family: 'Tahoma', sans-serif;
        pointer-events: none;
        opacity: 0.5;
        z-index: 1;
    }

    /* Position and style the score display */
    #score {
        position: absolute;
        bottom: 2vh; /* Relative to viewport height */
        left: 50%;
        transform: translateX(-50%);
        color: white;
        font-size: clamp(16px, 3vw, 24px); /* Responsive font size */
        font-family: 'Tahoma', sans-serif;
        z-index: 3;
        display: block; /* Ensure visibility */
    }

    /* Responsive start button */
    #startButton {
        position: absolute;
        top: 2vh;
        left: 50%;
        transform: translateX(-50%);
        padding: clamp(5px, 1.5vw, 10px) clamp(10px, 2vw, 15px);
        font-size: clamp(12px, 2vw, 18px);
        font-family: 'Tahoma', sans-serif;
        cursor: pointer;
        z-index: 3;
    }

    /* Responsive leaderboard */
    #leaderboard {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: clamp(12px, 2.5vw, 20px);
        font-family: 'Tahoma', sans-serif;
        text-align: center;
        display: none;
        z-index: 3;
    }

    #nameInput {
        margin-top: 1vh;
        padding: 0.5vh;
        font-size: clamp(10px, 2vw, 16px);
        font-family: 'Tahoma', sans-serif;
        display: block;
        margin-left: auto;
        margin-right: auto;
        width: clamp(100px, 20vw, 150px);
        text-align: center;
    }

    #submitName {
        margin-top: 1vh;
        padding: clamp(3px, 0.8vw, 5px) clamp(10px, 1.5vw, 15px);
        font-size: clamp(10px, 2vw, 16px);
        font-family: 'Tahoma', sans-serif;
        cursor: pointer;
    }

    /* Responsive instructions */
    #instructions {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: clamp(12px, 2.5vw, 20px);
        font-family: 'Tahoma', sans-serif;
        text-align: center;
        z-index: 3;
    }

    /* Responsive emoji sizing */
    .emoji {
        position: absolute;
        font-size: clamp(20px, 4vw, 32px);
        transition: all 0.1s linear;
        width: clamp(20px, 4vw, 32px);
        height: clamp(20px, 4vw, 32px);
        line-height: clamp(20px, 4vw, 32px);
        text-align: center;
        z-index: 2;
    }

    /* Color classes remain unchanged */
    .blue-gear { color: blue; }
    .green-gear { color: green; }
    .paper { color: white; }
    .warning { color: red; }
    .player { color: white; }
    .instructions-blue-gear { color: blue; }
    .instructions-green-gear { color: green; }
    .instructions-paper { color: white; }
    .instructions-warning { color: red; }
    </style>
  </head>
  <body>
    <header>
      <img class="logoimg" src="https://ghensleyiii.github.io/codexedoc/logo.png" alt="codexedoc code laptop logo">
      <a href="index.html" class="logo-link"><div class="logo">CODEXEDOC</div></a>
      <nav class="main-nav">
        <a href="validator.html">VALIDATOR</a>
        <a href="guides.html">GUIDES</a>
        <a href="academy.html">ACADEMY</a>
      </nav>
      <div class="game-button">
          <a href="game.html">PLAY CODEXEDOC GAME</a>
      </div>
    </header>

    <div id="gameContainer">
        <div id="matrix-bg"></div>
        <div id="score">SCORE: 0</div>
        <button id="startButton">START CODING</button>
        <div id="leaderboard"></div>
        <div id="instructions">
            INSTRUCTIONS<br>
            Use Arrow Keys to Move 💻<br>
            Collect <span class="instructions-blue-gear">⚙</span> (1pt), 
            <span class="instructions-green-gear">⚙</span> (1pt) and 
            <span class="instructions-paper">📄</span> (2pts)<br>
            Avoid <span class="instructions-warning">⚠</span> or Game Over
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('gameContainer');
        const matrixBg = document.getElementById('matrix-bg');
        const scoreDisplay = document.getElementById('score');
        const startButton = document.getElementById('startButton');
        const leaderboardDisplay = document.getElementById('leaderboard');
        const instructions = document.getElementById('instructions');

        let player, score, gameSpeed, gameActive, fallingEmojis, highScores;
        
        function initGame() {
            // Get current container dimensions
            const containerWidth = gameContainer.offsetWidth;
            const containerHeight = gameContainer.offsetHeight;

            player = {
                x: containerWidth / 2,
                y: containerHeight - 60,
                speed: containerWidth / 26, // Relative to container size
                element: document.createElement('div')
            };
            player.element.className = 'emoji player';
            player.element.textContent = '💻';
            gameContainer.appendChild(player.element);
            player.element.style.left = player.x + 'px';
            player.element.style.top = player.y + 'px';

            score = 0;
            gameSpeed = 1;
            gameActive = true;
            fallingEmojis = [];
            highScores = JSON.parse(localStorage.getItem('highScores')) || [];
            
            scoreDisplay.style.display = 'block'; // Ensure score is visible
            scoreDisplay.textContent = 'SCORE: 0';
            leaderboardDisplay.style.display = 'none';
            startButton.style.display = 'none';
            instructions.style.display = 'none';
            
            spawnEmoji();
            gameLoop();
            matrixRain();
        }

        function matrixRain() {
            const containerWidth = gameContainer.offsetWidth;
            let drops = [];
            for(let i = 0; i < Math.floor(containerWidth / 16); i++) {
                drops[i] = Math.random() * gameContainer.offsetHeight;
            }
            
            setInterval(() => {
                matrixBg.innerHTML = '';
                for(let i = 0; i < drops.length; i++) {
                    let text = '';
                    for(let j = 0; j < 20; j++) {
                        text += Math.round(Math.random());
                    }
                    let span = document.createElement('span');
                    span.textContent = text;
                    span.style.position = 'absolute';
                    span.style.left = i * 16 + 'px';
                    span.style.top = drops[i] + 'px';
                    matrixBg.appendChild(span);
                    drops[i] += 20;
                    if(drops[i] > gameContainer.offsetHeight) drops[i] = -400;
                }
            }, 100);
        }

        document.addEventListener('keydown', (e) => {
            if(!gameActive) return;
            const containerWidth = gameContainer.offsetWidth;
            const containerHeight = gameContainer.offsetHeight;
            switch(e.key) {
                case 'ArrowLeft': 
                    player.x = Math.max(0, player.x - player.speed);
                    break;
                case 'ArrowRight': 
                    player.x = Math.min(containerWidth - 32, player.x + player.speed);
                    break;
                case 'ArrowUp': 
                    player.y = Math.max(0, player.y - player.speed);
                    break;
                case 'ArrowDown': 
                    player.y = Math.min(containerHeight - 32, player.y + player.speed);
                    break;
            }
            player.element.style.left = player.x + 'px';
            player.element.style.top = player.y + 'px';
        });

        function spawnEmoji() {
            if(!gameActive) return;
            const containerWidth = gameContainer.offsetWidth;
            const emoji = {
                x: Math.random() * (containerWidth - 40),
                y: -40,
                type: null,
                className: null,
                element: document.createElement('div')
            };

            const rand = Math.random();
            if (rand < 0.15) {
                emoji.type = '⚙';
                emoji.className = 'blue-gear';
            } else if (rand < 0.3) {
                emoji.type = '⚙';
                emoji.className = 'green-gear';
            } else if (rand < 0.9) {
                emoji.type = '⚠';
                emoji.className = 'warning';
            } else {
                emoji.type = '📄';
                emoji.className = 'paper';
            }

            emoji.element.className = 'emoji ' + emoji.className;
            emoji.element.textContent = emoji.type;
            gameContainer.appendChild(emoji.element);
            fallingEmojis.push(emoji);
            
            setTimeout(spawnEmoji, 1000 / gameSpeed);
        }

        function updateGame() {
            const containerHeight = gameContainer.offsetHeight;
            gameSpeed = 1 + score/20;
            
            fallingEmojis.forEach((emoji, index) => {
                emoji.y += gameSpeed;
                emoji.element.style.left = emoji.x + 'px';
                emoji.element.style.top = emoji.y + 'px';

                if(Math.abs(emoji.x - player.x) < 30 && Math.abs(emoji.y - player.y) < 30) {
                    if(emoji.type === '⚠') {
                        endGame();
                    } else {
                        score += emoji.type === '📄' ? 2 : 1;
                        scoreDisplay.textContent = 'SCORE: ' + score;
                        gameContainer.removeChild(emoji.element);
                        fallingEmojis.splice(index, 1);
                    }
                }

                if(emoji.y > containerHeight) {
                    gameContainer.removeChild(emoji.element);
                    fallingEmojis.splice(index, 1);
                }
            });
        }

        function showLeaderboard() {
            let leaderboardHTML = 'Leaderboard:<br>';
            if (highScores.length === 0) {
                leaderboardHTML += 'No scores yet!<br>';
            } else {
                highScores.slice(0, 10).forEach((entry, i) => {
                    leaderboardHTML += `${i + 1}. ${entry.name} - ${entry.score}<br>`;
                });
            }
            leaderboardHTML += '<br>YOUR SCORE: ' + score + '<br>ENTER ALIAS:';
            leaderboardDisplay.innerHTML = leaderboardHTML;

            const nameInput = document.createElement('input');
            nameInput.id = 'nameInput';
            nameInput.placeholder = 'Type Your Name';
            nameInput.maxLength = 10;
            leaderboardDisplay.appendChild(nameInput);

            const submitButton = document.createElement('button');
            submitButton.id = 'submitName';
            submitButton.textContent = 'ENTER';
            leaderboardDisplay.appendChild(submitButton);

            nameInput.focus();

            submitButton.addEventListener('click', () => {
                const name = nameInput.value.trim();
                if (name) {
                    highScores.push({ score: score, name: name });
                    highScores.sort((a, b) => b.score - a.score);
                    localStorage.setItem('highScores', JSON.stringify(highScores));
                    showLeaderboard();
                }
            });
        }

        function endGame() {
            gameActive = false;
            showLeaderboard();
            leaderboardDisplay.style.display = 'block';
            startButton.style.display = 'block';
            fallingEmojis.forEach(emoji => gameContainer.removeChild(emoji.element));
            fallingEmojis = [];
            gameContainer.removeChild(player.element);
        }

        function gameLoop() {
            if(gameActive) {
                updateGame();
                requestAnimationFrame(gameLoop);
            }
        }

        startButton.addEventListener('click', initGame);

        // Update layout on window resize
        window.addEventListener('resize', () => {
            if (gameActive) {
                const containerWidth = gameContainer.offsetWidth;
                const containerHeight = gameContainer.offsetHeight;
                player.x = Math.min(player.x, containerWidth - 32);
                player.y = Math.min(player.y, containerHeight - 32);
                player.element.style.left = player.x + 'px';
                player.element.style.top = player.y + 'px';
            }
        });
    </script>

    <footer>
      <div class="footer-content">
        <div class="footer-name">CODEXEDOC</div>
        <div class="footer-copyright">Copyright © 2025 CODEXEDOC. All Rights Reserved.</div>
        <div class="footer-contact">
          <a href="mailto:contact@codexedoc.com">contact@codexedoc.com</a>
        </div>
      </div>
    </footer>
  </body>
</html>
