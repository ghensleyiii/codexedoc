<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codexedoc - Lessons & Quiz</title>
    <style>
        /* Same CSS as before, unchanged */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00b7eb;
            display: inline-block;
        }

        .logo a {
            color: #00b7eb;
            text-decoration: none;
            transition: color 0.3s;
        }

        .logo a:hover {
            color: #00ff00;
        }

        .logo span {
            color: #00ff00;
            font-size: 5rem;
            position: relative;
            top: 8px;
        }

        .main-section {
            background-color: #1a1a1a;
            padding: 50px 20px;
            text-align: center;
            color: #d4d4d4;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background-color: #2a2a2a;
            color: #00b7eb;
            padding: 10px 20px;
            border: 2px solid #00b7eb;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }

        .tab-btn:hover {
            background-color: #00b7eb;
            color: #1a1a1a;
        }

        footer {
            background-color: #1a1a1a;
            color: #00ff00;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
        }

        footer a {
            color: #00b7eb;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .footer-logo {
            font-size: 0.9rem;
            color: #00b7eb;
            font-weight: bold;
        }

        .footer-logo span {
            color: #00ff00;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2rem;
            }

            .logo span {
                font-size: 4rem;
                top: 6px;
            }

            .tabs {
                flex-wrap: wrap;
                gap: 5px;
                text-decoration: none;
            }

            .tab-btn {
                padding: 8px 15px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .tab-btn {
                padding: 6px 10px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="code.html">CODE</a><a href="index.html"><span>X</span></a><a href="edoc.html">EDOC</a>
        </div>
    </header>

    <section class="main-section">
        <div class="tabs">
            <a href="html-course.html" class="tab-btn">HTML</a>
            <a href="css-course.html" class="tab-btn">CSS</a>
            <a href="javascript-course.html" class="tab-btn">JavaScript</a>
            <a href="python-course.html" class="tab-btn">Python</a>
        </div>
    </section>

    <footer>
        <p><span class="footer-logo">CODE<span>X</span>EDOC</span></p>
        <p>Copyright © 2025 CODEXEDOC. All Rights Reserved.</p>
        <p><a href="mailto:contact@codexedoc.com">contact@codexedoc.com</a></p>
    </footer>
</body>
</html>
