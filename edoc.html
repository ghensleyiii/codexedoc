<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta and Title Section -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codexedoc - Lessons & Quiz</title>

    <!-- CSS Styles Section -->
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #333;
            line-height: 1.6;
        }

        /* Header Styles */
        header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00b7eb;
            display: inline-block;
        }

        .logo a {
            color: #00b7eb;
            text-decoration: none;
            transition: color 0.3s;
        }

        .logo a:hover {
            color: #00ff00;
        }

        .logo span {
            color: #00ff00;
            font-size: 5rem;
            position: relative;
            top: 8px;
        }

        /* Main Section Styles */
        .main-section {
            background-color: #1a1a1a;
            padding: 50px 20px;
            text-align: center;
            color: #d4d4d4;
        }

        /* Tab Navigation Styles */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background-color: #2a2a2a;
            color: #00b7eb;
            padding: 10px 20px;
            border: 2px solid #00b7eb;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }

        .tab-btn.active {
            background-color: #00b7eb;
            color: #1a1a1a;
        }

        .tab-btn:hover {
            background-color: #00b7eb;
            color: #1a1a1a;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Button Container for Start Learning and Take Quiz */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .start-btn, .quiz-btn {
            background-color: #00ff00;
            color: #1a1a1a;
            padding: 15px 30px;
            border: 2px solid #000000;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .start-btn:hover, .quiz-btn:hover {
            background-color: #00cc00;
        }

        /* Lesson and Quiz Grid Styles */
        .lessons-grid, .quiz-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
            margin-top: 30px;
        }

        .lesson-box, .quiz-box {
            background-color: #2a2a2a;
            color: #d4d4d4;
            padding: 20px;
            border: 2px solid #00b7eb;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.3s;
        }

        .lesson-box.completed, .quiz-box.completed {
            background-color: #00b7eb;
            color: #1a1a1a;
        }

        .lesson-box:hover, .quiz-box:hover {
            transform: scale(1.1);
        }

        /* Lesson and Quiz Content Styles */
        .lesson-content, .quiz-content {
            display: none;
            background-color: #2a2a2a;
            padding: 20px;
            margin: 0 auto 20px auto;
            max-width: 800px;
            border-radius: 5px;
            border: 1px solid #00b7eb;
        }

        .lesson-content.active, .quiz-content.active {
            display: block;
        }

        .lesson-description, .quiz-description {
            color: #00ff00;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        /* Code Display Styles */
        .code-breakdown {
            background-color: #000000;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
            text-align: left;
            margin-bottom: 15px;
        }

        .code-explanation {
            color: #d4d4d4;
            text-align: left;
            margin-bottom: 15px;
        }

        .code-explanation h4 {
            color: #00b7eb;
            margin-bottom: 10px;
        }

        .code-explanation ul {
            list-style-type: disc;
            padding-left: 20px;
        }

        .code-explanation li {
            margin-bottom: 5px;
        }

        /* Quiz Question and Options Styles */
        .quiz-question {
            color: #d4d4d4;
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-align: left;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .quiz-option {
            background-color: #3a3a3a;
            color: #d4d4d4;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-align: left;
        }

        .quiz-option:hover {
            background-color: #4a4a4a;
        }

        .quiz-option.selected {
            background-color: #00b7eb;
            color: #1a1a1a;
        }

        /* Navigation and Submit Button Styles */
        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .nav-btn, .submit-btn {
            background-color: #00b7eb;
            color: #1a1a1a;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .nav-btn:disabled, .submit-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .nav-btn:hover:not(:disabled), .submit-btn:hover:not(:disabled) {
            background-color: #00a3d3;
        }

        /* Quiz Modal Styles */
        .quiz-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 200;
            overflow-y: auto;
        }

        .quiz-modal.active {
            display: block;
        }

        .quiz-modal-content {
            background-color: #1a1a1a;
            margin: 5% auto;
            padding: 20px;
            max-width: 900px;
            border-radius: 5px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            color: #00ff00;
            font-size: 2rem;
            cursor: pointer;
        }

        /* Footer Styles */
        footer {
            background-color: #1a1a1a;
            color: #00ff00;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
        }

        footer a {
            color: #00b7eb;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .footer-logo {
            font-size: 0.9rem;
            color: #00b7eb;
            font-weight: bold;
        }

        .footer-logo span {
            color: #00ff00;
        }

        /* Responsive Design Styles */
        @media (max-width: 768px) {
            .logo {
                font-size: 2rem;
            }

            .logo span {
                font-size: 4rem;
                top: 6px;
            }

            .lessons-grid, .quiz-grid {
                grid-template-columns: repeat(5, 1fr);
            }

            .start-btn, .quiz-btn {
                padding: 10px 20px;
                font-size: 1rem;
            }

            .tabs {
                flex-wrap: wrap;
                gap: 5px;
            }

            .tab-btn {
                padding: 8px 15px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .lessons-grid, .quiz-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .tab-btn {
                padding: 6px 10px;
                font-size: 0.8rem;
            }

            .nav-btn, .submit-btn {
                padding: 8px 15px;
                font-size: 0.9rem;
            }

            .button-container {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
