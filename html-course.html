<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Course & Test - Codexedoc</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00b7eb;
            display: inline-block;
        }

        .logo a {
            color: #00b7eb;
            text-decoration: none;
            transition: color 0.3s;
        }

        .logo a:hover {
            color: #00ff00;
        }

        .logo span {
            color: #00ff00;
            font-size: 5rem;
            position: relative;
            top: 8px;
        }

        .main-section {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            background-color: #000000;
            border-radius: 5px;
        }

        .buttons {
            text-align: center;
            margin: 20px 0;
        }

        .btn-lesson {
            padding: 15px 30px;
            margin: 10px;
            background-color: #00b7eb;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .btn-test {
            padding: 15px 30px;
            margin: 10px;
            background-color: #00ff00;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .lesson-box {
            display: none;
            background-color: #00b7eb;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            color: #1a1a1a;
        }

        .test-box {
            display: none;
            background-color: #00ff00;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            color: #1a1a1a;
        }

        .lesson-box.active, .test-box.active {
            display: block;
        }

        .lesson-content {
            background-color: #000000;
            color: #ffffff;
            padding: 20px;
            border-radius: 5px;
            margin: 10px 0;
        }

        .lesson-content h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #ffffff; /* White titles */
        }

        .lesson-content .instruction, 
        .lesson-content .description, 
        .lesson-content .example {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 5px;
        }

        .lesson-content .instruction {
            background-color: #1a1a1a;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .lesson-content .description {
            background-color: #1a1a1a;
            font-size: 1rem;
            color: #ccc;
            font-weight: bold; /* Bold description */
        }

        .lesson-content .example {
            background-color: #333;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            border-left: 4px solid #00ff00;
            white-space: pre-wrap;
        }

        .test-question {
            background-color: #000000;
            color: #ffffff;
            padding: 20px;
            border-radius: 5px;
            margin: 10px 0;
        }

        pre {
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            white-space: pre-wrap;
            border: 1px solid #333;
        }

        .nav-buttons {
            margin: 20px 0;
            text-align: center;
        }

        .nav-btn-lesson {
            padding: 10px 20px;
            background-color: #000000;
            color: #00b7eb;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
        }

        .nav-btn-test {
            padding: 10px 20px;
            background-color: #000000;
            color: #00ff00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
        }

        .nav-btn-lesson:disabled, .nav-btn-test:disabled {
            background-color: #666;
            color: #999;
            cursor: not-allowed;
        }

        .progress-squares {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 20px 0;
            justify-content: center;
        }

        .lesson-square {
            width: 25px;
            height: 25px;
            background-color: #00b7eb;
            border-radius: 3px;
            text-align: center;
            color: #000000;
            font-size: 0.9rem;
            line-height: 25px;
            cursor: pointer;
        }

        .lesson-square.completed {
            background-color: #00ff00;
        }

        .test-square {
            width: 25px;
            height: 25px;
            background-color: #00ff00;
            border-radius: 3px;
            text-align: center;
            color: #000000;
            font-size: 0.9rem;
            line-height: 25px;
            cursor: pointer;
        }

        .test-square.completed {
            background-color: #00b7eb;
        }

        .certificate-form, .retry-message {
            display: none;
            text-align: center;
            padding: 20px;
            background-color: #000000;
            color: #ffffff;
            border-radius: 5px;
        }

        .certificate-form.active, .retry-message.active {
            display: block;
        }

        input[type="text"] {
            padding: 10px;
            margin: 10px 0;
            width: 200px;
        }

        footer {
            background-color: #1a1a1a;
            color: #00ff00;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .logo { font-size: 2rem; }
            .logo span { font-size: 4rem; top: 6px; }
            .main-section { padding: 15px; }
            .btn-lesson, .btn-test { font-size: 1rem; padding: 10px 20px; }
            .lesson-square, .test-square { width: 20px; height: 20px; font-size: 0.8rem; line-height: 20px; }
            .lesson-content h2 { font-size: 1.5rem; }
            .lesson-content .instruction { font-size: 1rem; }
            .lesson-content .description { font-size: 0.9rem; }
            .lesson-content .example { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="code.html">CODE</a><a href="index.html"><span>X</span></a><a href="edoc.html">EDOC</a>
        </div>
    </header>

    <section class="main-section">
        <div class="buttons">
            <button class="btn-lesson" onclick="toggleLessonBox()">Open Lesson</button>
            <button class="btn-test" onclick="toggleTestBox()">Launch Test</button>
        </div>

        <div class="lesson-box" id="lessonBox">
            <div class="lesson-content" id="lessonContent"></div>
            <div class="nav-buttons">
                <button class="nav-btn-lesson" onclick="prevLesson()" id="prevLessonBtn">Last</button>
                <button class="nav-btn-lesson" onclick="nextLesson()" id="nextLessonBtn">Next</button>
            </div>
            <div class="progress-squares" id="lessonSquares"></div>
        </div>

        <div class="test-box" id="testBox">
            <div class="test-question" id="testQuestion"></div>
            <div class="nav-buttons">
                <button class="nav-btn-test" onclick="prevQuestion()" id="prevQuestionBtn">Last</button>
                <button class="nav-btn-test" onclick="nextQuestion()" id="nextQuestionBtn">Next</button>
            </div>
            <div class="progress-squares" id="testSquares"></div>
            <div class="certificate-form" id="certificateForm">
                <h2>Congratulations!</h2>
                <p>Enter your name for your certificate (80%+ score):</p>
                <input type="text" id="nameInput" placeholder="Your Name" required>
                <button class="nav-btn-test" onclick="generateCertificate()">Generate Certificate</button>
            </div>
            <div class="retry-message" id="retryMessage">
                <h2>Try Again</h2>
                <p>Your score was below 80%. Please review the lessons and try again.</p>
            </div>
        </div>
    </section>

    <footer>
        <p><span class="footer-logo">CODE<span>X</span>EDOC</span></p>
        <p>Copyright © 2025 CODEXEDOC. All Rights Reserved.</p>
        <p><a href="mailto:contact@codexedoc.com">contact@codexedoc.com</a></p>
    </footer>

<script>
        const lessons = [
            { 
                title: "1. What is HTML?", 
                instruction: "HTML, which stands for HyperText Markup Language, is the foundational language used to create and structure content on the web. It’s what tells a web browser how to display text, images, and other elements on a webpage. Every HTML document begins with the "<html>" tag, which acts like a container for everything else on the page. This tag signals to the browser that what follows is HTML code, and it’s always paired with a closing "</html>" tag at the end of the document to complete the structure.\"", 
                description: "<html>Hello World</html>", 
                example: "<html>Hello World</html>",
            },
            { 
                title: "2. Adding a Document Type", 
                instruction: "\"To ensure your webpage works correctly in modern browsers, you need to declare it as an HTML5 document by adding "<!DOCTYPE html>" at the very top of your file. This isn’t a regular tag with a closing pair—it’s a special declaration that tells the browser to interpret your code using the latest HTML standards. Without it, the browser might guess the version, leading to display issues. After this declaration, you then start your "<html>" tag to begin the actual content.\"", 
                description: "\"<!DOCTYPE html><html>Hello</html>\"", 
                example: "<!DOCTYPE html><html>Hello</html>" 
            },
            { 
                title: "3. The HTML Root Tag", 
                instruction: "\"The "<html>" tag is the root of every webpage—it’s like the outermost box that holds everything else. You open it with "<html>" right after the "<!DOCTYPE html>" declaration and close it with "</html>" at the end of your file. Inside this tag, you’ll place all the content, structure, and instructions for your webpage. Think of it as the foundation that defines the entire HTML document, ensuring the browser knows where the webpage starts and stops.\"", 
                description: "\"<html>My first page</html>\"", 
                example: "<html>My first page</html>" 
            },
            { 
                title: "4. The Head Section", 
                instruction: "\"Within the "<html>" tag, you create a "<head>" section to store information about your webpage that doesn’t appear directly on the screen. This section, opened with "<head>" and closed with "</head>", is where you put things like the page title, character encoding, and links to stylesheets or scripts. It’s like the backstage area of your webpage, setting up everything the browser needs to know before displaying the visible content.\"", 
                description: "\"<html><head></head>My page</html>\"", 
                example: "<html><head></head>My page</html>" 
            },
            { 
                title: "5. The Body Section", 
                instruction: "\"After the "<head>" section inside your "<html>" tag, you add the "<body>" section, which is where all the visible content of your webpage lives. Open it with "<body>" and close it with "</body>". This is where you’ll put text, images, headings, links—anything you want users to see when they visit your page. The "<body>" is the main stage, while "<head>" handles the behind-the-scenes setup.\"", 
                description: "\"<html><head></head><body>Hello</body></html>\"", 
                example: "<html><head></head><body>Hello</body></html>" 
            },
            { 
                title: "6. Setting a Title", 
                instruction: "\"Inside the "<head>" section, you use the "<title>" tag to give your webpage a name that appears in the browser’s tab or title bar. Open it with "<title>", add your text (like the name of your site), and close it with "</title>". This title doesn’t show up on the page itself but helps users and search engines identify your page. It’s a small but crucial detail for navigation and accessibility.\"", 
                description: "\"<html><head><title>My Site</title></head><body>Hi</body></html>\"", 
                example: "<html><head><title>My Site</title></head><body>Hi</body></html>" 
            },
            { 
                title: "7. Writing Paragraphs", 
                instruction: "\"To add readable blocks of text to your webpage, use the "<p>" tag inside the "<body>" section. Start with "<p>", write your text (like a sentence or paragraph), and end with "</p>". Each "<p>" tag creates a new paragraph with some space around it, making your content easier to read. This is perfect for articles, descriptions, or any time you need to present text in a structured way.\"", 
                description: "\"<html><body><p>This is my text.</p></body></html>\"", 
                example: "<html><body><p>This is my text.</p></body></html>" 
            },
            { 
                title: "8. Making Headings", 
                instruction: "\"For big, bold titles on your webpage, use the "<h1>" tag within the "<body>" section. Open it with "<h1>", add your title text, and close it with "</h1>". This creates the largest heading size, ideal for the main title of your page. It stands out visually and helps organize your content, signaling to readers and search engines what your page is about.\"", 
                description: "\"<html><body><h1>Welcome</h1></body></html>\"", 
                example: "<html><body><h1>Welcome</h1></body></html>" 
            },
            { 
                title: "9. Smaller Headings", 
                instruction: "\"If you need subheadings that are still prominent but smaller than your main title, use the "<h2>" tag inside "<body>". Start with "<h2>", write your subheading, and end with "</h2>". This is great for breaking up sections under your "<h1>" title, creating a hierarchy that makes your page easier to scan and understand.\"", 
                description: "\"<html><body><h1>Big</h1><h2>Small</h2></body></html>\"", 
                example: "<html><body><h1>Big</h1><h2>Small</h2></body></html>" 
            },
            { 
                title: "10. Even Smaller Headings", 
                instruction: "\"For even smaller subheadings, use "<h3>" in the "<body>" section, opening with "<h3>" and closing with "</h3>". HTML offers six heading levels, from "<h1>" (largest) to "<h6>" (smallest), so "<h3>" is perfect for third-level topics under "<h1>" and "<h2>". This layering helps you organize content deeply and clearly for readers.\"", 
                description: "\"<html><body><h1>One</h1><h2>Two</h2><h3>Three</h3></body></html>\"", 
                example: "<html><body><h1>One</h1><h2>Two</h2><h3>Three</h3></body></html>" 
            },
            { 
                title: "11. Adding Line Breaks", 
                instruction: "\"Sometimes you want to move text to a new line without starting a whole new paragraph—use "<br>" for that. Place "<br>" anywhere in your "<body>" content where you want a line break. It’s a single tag with no closing pair, and it’s handy for things like addresses or poems where you need tight control over line spacing.\"", 
                description: "\"<html><body>Hello<br>World</body></html>\"", 
                example: "<html><body>Hello<br>World</body></html>" 
            },
            { 
                title: "12. Horizontal Lines", 
                instruction: "\"To visually separate sections of your webpage, insert "<hr>" inside "<body>". This single tag, which doesn’t need a closing tag, draws a horizontal line across the page. It’s useful for breaking up content—like dividing a header from the main text or marking the end of a section—without changing the layout too much.\"", 
                description: "\"<html><body>Top<hr>Bottom</body></html>\"", 
                example: "<html><body>Top<hr>Bottom</body></html>" 
            },
            { 
                title: "13. Bold Text", 
                instruction: "\"To make text stand out with a bold appearance, wrap it in "<b>" and "</b>" tags within "<body>". Start with "<b>", add your text, and close with "</b>". This is great for emphasizing important words or phrases, like key terms or calls to action, making them pop visually without changing their meaning.\"", 
                description: "\"<html><body><b>Bold</b> text</body></html>\"", 
                example: "<html><body><b>Bold</b> text</body></html>" 
            },
            { 
                title: "14. Italic Text", 
                instruction: "\"For a slanted, italicized look to emphasize text, use "<i>" and "</i>" inside "<body>". Open with "<i>", write your text, and close with "</i>". This is often used for quotes, book titles, or to subtly highlight something without making it as loud as bold text—perfect for adding nuance to your content.\"", 
                description: "\"<html><body><i>Italic</i> text</body></html>\"", 
                example: "<html><body><i>Italic</i> text</body></html>" 
            },
            { 
                title: "15. Underlined Text", 
                instruction: "\"To draw a line under your text for emphasis, wrap it with "<u>" and "</u>" in "<body>". Begin with "<u>", add your text, and end with "</u>". This can highlight key points or mimic handwritten underlines, though it’s less common today since underlined text often looks like a link—use it thoughtfully!\"", 
                description: "\"<html><body><u>Under</u> text</body></html>\"", 
                example: "<html><body><u>Under</u> text</body></html>" 
            },
            { 
                title: "16. Linking to Other Pages", 
                instruction: "\"To connect your webpage to another page or website, use the "<a>" tag with an href attribute inside "<body>". Write "<a href=\\\"URL\\">" (replacing URL with the web address), add the clickable text, and close with "</a>". This creates a hyperlink—when users click it, they’re taken to the linked location, like another page or an external site.\"", 
                description: "\"<html><body><a href=\\\"https://example.com\\">Click me</a></body></html>\"", 
                example: "<html><body><a href=\"https://example.com\">Click me</a></body></html>" 
            },
            { 
                title: "17. Adding Images", 
                instruction: "\"To display an image on your webpage, use the "<img>" tag in "<body>" with a src attribute. Write "<img src=\\\"image-url\\">" where the src value is the path to your image file (like a web URL or local file). Add an alt attribute, like "alt=\\\"description\\\"", for accessibility—it describes the image if it fails to load or for screen readers.\"", 
                description: "\"<html><body><img src=\\\"https://via.placeholder.com/100\\\" alt=\\\"Square\\"></body></html>\"", 
                example: "<html><body><img src=\"https://via.placeholder.com/100\" alt=\"Square\"></body></html>" 
            },
            { 
                title: "18. Image Sizes", 
                instruction: "\"You can resize an image by adding width and height attributes to the "<img>" tag in "<body>". After "<img src=\\\"image-url\\">", include "width=\\\"number\\\"" and "height=\\\"number\\\"" (in pixels, like "50"), followed by the alt attribute. This controls how big the image appears on the page, overriding its natural size for better layout control.\"", 
                description: "\"<html><body><img src=\\\"https://via.placeholder.com/100\\\" width=\\\"50\\\" height=\\\"50\\\" alt=\\\"Small\\"></body></html>\"", 
                example: "<html><body><img src=\"https://via.placeholder.com/100\" width=\"50\" height=\"50\" alt=\"Small\"></body></html>" 
            },
            { 
                title: "19. Comments", 
                instruction: "\"To leave notes in your HTML code that won’t show on the webpage, use comments with "<!--" and "-->". Inside "<body>" or anywhere in your file, write "<!--" followed by your note (like a reminder or explanation), then close with "-->". These are invisible to users but help you and other developers understand the code later.\"", 
                description: "\"<html><body>Hello <!-- Secret note --> World</body></html>\"", 
                example: "<html><body>Hello <!-- Secret note --> World</body></html>" 
            },
            { 
                title: "20. Unordered Lists", 
                instruction: "\"For a list with bullet points, use "<ul>" (unordered list) inside "<body>". Open with "<ul>", then add each item with "<li>" (list item) and close it with "</li>", and finish the list with "</ul>". Each "<li>" gets a bullet, making this ideal for things like shopping lists or features where order doesn’t matter.\"", 
                description: "\"<html><body><ul><li>Apple</li><li>Banana</li></ul></body></html>\"", 
                example: "<html><body><ul><li>Apple</li><li>Banana</li></ul></body></html>" 
            },
            { 
                title: "21. Ordered Lists", 
                instruction: "\"To create a numbered list, use "<ol>" (ordered list) within "<body>". Start with "<ol>", add each item with "<li>" and "</li>" for the text, and close the list with "</ol>". The browser automatically numbers each "<li>" in sequence, perfect for steps, rankings, or anything where order is important.\"", 
                description: "\"<html><body><ol><li>First</li><li>Second</li></ol></body></html>\"", 
                example: "<html><body><ol><li>First</li><li>Second</li></ol></body></html>" 
            },
            { 
                title: "22. List Items", 
                instruction: "\"Every item in a list—whether "<ul>" or "<ol>"—is defined with the "<li>" tag inside "<body>". Open each item with "<li>", write the content (like a word or sentence), and close with "</li>". These items are the building blocks of your list, and the parent tag ("<ul>" or "<ol>") decides if they get bullets or numbers.\"", 
                description: "\"<html><body><ul><li>One</li><li>Two</li></ul></body></html>\"", 
                example: "<html><body><ul><li>One</li><li>Two</li></ul></body></html>" 
            },
            { 
                title: "23. Nesting Lists", 
                instruction: "\"To create sublists within a list, nest a "<ul>" or "<ol>" inside an "<li>" within "<body>". Start with your main list (like "<ul>"), add an "<li>", then inside that "<li>" open a new "<ul>" or "<ol>" with its own "<li>" items, and close everything properly. This creates a hierarchy, like categories with sub-items, for more complex organization.\"", 
                description: "\"<html><body><ul><li>Fruit<ul><li>Apple</li></ul></li></ul></body></html>\"", 
                example: "<html><body><ul><li>Fruit<ul><li>Apple</li></ul></li></ul></body></html>" 
            },
            { 
                title: "24. Grouping with Divs", 
                instruction: "\"To group multiple elements together in "<body>", use the "<div>" tag. Open with "<div>", add your content (like headings, paragraphs, or images), and close with "</div>". This creates a block-level container that’s great for organizing sections of your page or applying styles to a group of items all at once.\"", 
                description: "\"<html><body><div><h1>Title</h1><p>Text</p></div></body></html>\"", 
                example: "<html><body><div><h1>Title</h1><p>Text</p></div></body></html>" 
            },
            { 
                title: "25. Inline Spans", 
                instruction: "\"For small tweaks to specific parts of text within "<body>", use "<span>". Open with "<span>", add the text you want to modify, and close with "</span>". Unlike "<div>", which is block-level, "<span>" is inline, meaning it doesn’t break the flow of text—ideal for styling a single word or phrase.\"", 
                description: "\"<html><body>Hello <span>World</span></body></html>\"", 
                example: "<html><body>Hello <span>World</span></body></html>" 
            },
            { 
                title: "26. Block Quotes", 
                instruction: "\"To highlight a long quotation in "<body>", use "<blockquote>". Start with "<blockquote>", add the quote text, and close with "</blockquote>". This tag indents the text, setting it apart from regular paragraphs, making it clear it’s a borrowed or significant statement—great for testimonials or excerpts.\"", 
                description: "\"<html><body><blockquote>Words of wisdom</blockquote></body></html>\"", 
                example: "<html><body><blockquote>Words of wisdom</blockquote></body></html>" 
            },
            { 
                title: "27. Preformatted Text", 
                instruction: "\"If you want text to appear exactly as typed—including spaces and line breaks—use "<pre>" in "<body>". Open with "<pre>", write your text (like code or poetry), and close with "</pre>". This preserves formatting without extra styling, making it perfect for showing code snippets or structured text as-is.\"", 
                description: "\"<html><body><pre>Hello   World</pre></body></html>\"", 
                example: "<html><body><pre>Hello   World</pre></body></html>" 
            },
            { 
                title: "28. Showing Code", 
                instruction: "\"To display programming code or commands within "<body>", wrap them in "<code>" and "</code>". Start with "<code>", add the code (like a function or script line), and close with "</code>". This tag styles the text in a monospace font, signaling it’s code rather than regular content—often paired with "<pre>" for multi-line examples.\"", 
                description: "\"<html><body><code>print(\\\"Hello\\\")</code></body></html>\"", 
                example: "<html><body><code>print(\\\"Hello\\\")</code></body></html>" 
            },
            { 
                title: "29. Basic Tables", 
                instruction: "\"To organize data in a grid, use "<table>" in "<body>". Open with "<table>", then add rows with "<tr>" (table row) and cells within each row using "<td>" (table data), closing each with "</tr>" and "</table>". This creates a simple table structure for things like schedules or comparisons, with each "<td>" holding a piece of data.\"", 
                description: "\"<html><body><table><tr><td>Cell</td></tr></table></body></html>\"", 
                example: "<html><body><table><tr><td>Cell</td></tr></table></body></html>" 
            },
            { 
                title: "30. Table Rows", 
                instruction: "\"Inside a "<table>" in "<body>", define each row with "<tr>" and "</tr>". Open "<tr>", add cells with "<td>" for each piece of data (like text or numbers), close each with "</td>", and end the row with "</tr>". Repeat for multiple rows—each "<tr>" stacks vertically, building the table’s structure row by row.\"", 
                description: "\"<html><body><table><tr><td>Row1</td></tr><tr><td>Row2</td></tr></table></body></html>\"", 
                example: "<html><body><table><tr><td>Row1</td></tr><tr><td>Row2</td></tr></table></body></html>" 
            },
            { 
                title: "31. Table Cells", 
                instruction: "\"Within each "<tr>" inside a "<table>" in "<body>", use "<td>" to create individual cells. Start with "<td>", add your content (like a name or number), and close with "</td>". Multiple "<td>" tags in a single "<tr>" line up horizontally as columns, letting you fill your table with data across rows and columns.\"", 
                description: "\"<html><body><table><tr><td>One</td><td>Two</td></tr></table></body></html>\"", 
                example: "<html><body><table><tr><td>One</td><td>Two</td></tr></table></body></html>" 
            },
            { 
                title: "32. Table Headers", 
                instruction: "\"To label columns or rows in a "<table>" within "<body>", use "<th>" instead of "<td>". Open with "<th>", add the header text (like a column title), and close with "</th>". These cells are bold and centered by default, making them stand out as titles for the data below or beside them in the table.\"", 
                description: "\"<html><body><table><tr><th>Name</th></tr><tr><td>John</td></tr></table></body></html>\"",

            },
            { 
                title: "33. Starting a Form", 
                instruction: "\"To collect user input—like names or messages—start with "<form>" in "<body>". Open with "<form>" and close with "</ව Sinhala and Tamil translations of the instructions are provided below in the respective sections of the lesson cards below—they’ll be hidden on the site itself but visible here for your convenience. Open with "<form>" and close with "</form>", creating a container for input fields, buttons, and more. This tag sets up an interactive area where users can type or select options, which you can later connect to a server for processing.\"", 
                description: "\"<html><body><form></form></body></html>\"", 
                example: "<html><body><form></form></body></html>" 
            },
            { 
                title: "34. Text Input", 
                instruction: "\"Inside "<form>" in "<body>", add "<input type=\\\"text\\">" to create a single-line text box. This single tag (no closing tag needed) lets users type things like their name or email. You can customize it with attributes like "id" or "name" to identify it later when the form is submitted to a server.\"", 
                description: "\"<html><body><form><input type=\\\"text\\"></form></body></html>\"", 
                example: "<html><body><form><input type=\"text\"></form></body></html>"

            { 
                title: "35. Adding Buttons", 
                instruction: "\"To make your "<form>" interactive, add a "<button>" inside "<body>". Open with "<button>", write the button text (like "Submit" or "Click"), and close with "</button>". This creates a clickable element users can press to submit the form or trigger an action, depending on how you set it up.\"", 
                description: "\"<html><body><form><button>Click</button></form></body></html>\"",

            { 
                title: "36. Labeling Inputs", 
                instruction: "\"To explain what an input is for, use "<label>" with a for attribute in "<form>" within "<body>". Write "<label for=\\\"input-id\\">" (matching the input’s id), add the label text (like "Name:"), and close with "</label>". Pair it with an "<input>" tag—clicking the label will focus the input, improving usability.\"", 
                description: "\"<html><body><form><label for=\\\"name\\">Name:</label><input type=\\\"text\\\" id=\\\"name\\"></form></body></html>\"",

            { 
                title: "37. Dropdown Menus", 
                instruction: "\"For a list of choices in "<form>" inside "<body>", use "<select>" and "<option>". Open with "<select>", add each choice with "<option>" and "</option>" (like "Yes" or "No"), and close with "</select>". Users can click to pick one option from the dropdown, making it great for forms with predefined answers.\"", 
                description: "\"<html><body><form><select><option>Yes</option><option>No</option></select></form></body></html>\"",

            { 
                title: "38. Text Areas", 
                instruction: "\"If you need a bigger space for text in "<form>" within "<body>", use "<textarea>". Open with "<textarea>", leave it empty or add default text, and close with "</textarea>". This creates a multi-line box where users can write longer responses, like comments or messages, unlike the single-line "<input>".\"",

            { 
                title: "39. Checkboxes", 
                instruction: "\"To let users select multiple options in "<form>" inside "<body>", use "<input type=\\\"checkbox\\">". This single tag creates a small box they can check or uncheck, paired with text (like " Agree") to describe it. Add as many as needed—each checkbox is independent, perfect for things like interest lists.\"",

            { 
                title: "40. Radio Buttons", 
                instruction: "\"For single-choice options in "<form>" within "<body>", use "<input type=\\\"radio\\">" with a shared name attribute. Write multiple "<input type=\\\"radio\\\" name=\\\"group-name\\">" tags (same "name" value), each with different text (like "Yes" or "No"). Only one can be selected at a time in the group, ideal for exclusive choices.\"",

            { 
                title: "42. Form Actions", 
                instruction: "\"To tell "<form>" in "<body>" where to send its data, add an action attribute. Write "<form action=\\\"URL\\">" (replace URL with a file or server address), add your inputs, and close with "</form>". When submitted, the form sends user data to that location—crucial for processing responses like sign-ups or searches.\"",

 spectrum: "\"<html><body><form><input type=\\\"text\\\" placeholder=\\\"Your name\\"></form></body></html>\"",

            {

                instruction: "\"In "<head>" within "<html>", use "<meta>" tags to add hidden info about your page. Write "<meta charset=\\\"UTF-8\\">" (no closing tag) to set the character encoding, ensuring special characters display correctly. These tags don’t show on the page but help browsers and search engines understand your content.\"",

        let currentLesson = 0;
        let currentQuestion = 0;
        let answers = new Array(50).fill(null);
        let lessonProgress = new Array(50).fill(false);
        let testProgress = new Array(50).fill(false);

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const shuffledQuestions = shuffle([...questions]);

        function toggleLessonBox() {
            const lessonBox = document.getElementById('lessonBox');
            const testBox = document.getElementById('testBox');
            if (testBox.classList.contains('active')) {
                testBox.classList.remove('active');
            }
            lessonBox.classList.toggle('active');
            if (lessonBox.classList.contains('active')) {
                updateLesson();
                updateLessonSquares();
            }
        }

        function toggleTestBox() {
            const lessonBox = document.getElementById('lessonBox');
            const testBox = document.getElementById('testBox');
            if (lessonBox.classList.contains('active')) {
                lessonBox.classList.remove('active');
            }
            testBox.classList.toggle('active');
            if (testBox.classList.contains('active')) {
                updateQuestion();
                updateTestSquares();
            }
        }

        function updateLesson() {
            const lesson = lessons[currentLesson];
            document.getElementById('lessonContent').innerHTML = `
                <h2>${lesson.title}</h2>
                <div class="instruction">${lesson.instruction}</div>
                <div class="description">${lesson.description}</div>
                <div class="example">${lesson.example}</div>
            `;
            document.getElementById('prevLessonBtn').disabled = currentLesson === 0;
            document.getElementById('nextLessonBtn').disabled = currentLesson === lessons.length - 1;
            lessonProgress[currentLesson] = true;
            updateLessonSquares();
        }

        function updateQuestion() {
            const q = shuffledQuestions[currentQuestion];
            document.getElementById('testQuestion').innerHTML = `
                <h2>Question ${currentQuestion + 1}</h2>
                <p>${q.q}</p>
                ${q.a.map((opt, i) => `<label><input type="radio" name="q${currentQuestion}" value="${i}" ${answers[currentQuestion] === i ? 'checked' : ''}> ${opt}</label><br>`).join('')}
            `;
            document.getElementById('prevQuestionBtn').disabled = currentQuestion === 0;
            document.getElementById('nextQuestionBtn').disabled = currentQuestion === shuffledQuestions.length - 1;
            document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(radio => {
                radio.addEventListener('change', (e) => {
                    answers[currentQuestion] = parseInt(e.target.value);
                    testProgress[currentQuestion] = true;
                    updateTestSquares();
                });
            });
        }

        function updateLessonSquares() {
            const squares = document.getElementById('lessonSquares');
            squares.innerHTML = '';
            lessonProgress.forEach((completed, i) => {
                const square = document.createElement('div');
                square.className = `lesson-square ${completed ? 'completed' : ''}`;
                square.textContent = i + 1;
                square.onclick = () => {
                    currentLesson = i;
                    updateLesson();
                };
                squares.appendChild(square);
            });
        }

        function updateTestSquares() {
            const squares = document.getElementById('testSquares');
            squares.innerHTML = '';
            testProgress.forEach((completed, i) => {
                const square = document.createElement('div');
                square.className = `test-square ${completed ? 'completed' : ''}`;
                square.textContent = i + 1;
                square.onclick = () => {
                    currentQuestion = i;
                    updateQuestion();
                };
                squares.appendChild(square);
            });
        }

        function prevLesson() {
            if (currentLesson > 0) currentLesson--;
            updateLesson();
        }

        function nextLesson() {
            if (currentLesson < lessons.length - 1) currentLesson++;
            updateLesson();
        }

        function prevQuestion() {
            if (currentQuestion > 0) currentQuestion--;
            updateQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < shuffledQuestions.length - 1) {
                currentQuestion++;
                updateQuestion();
            } else {
                gradeTest();
            }
        }

        function gradeTest() {
            let correct = 0;
            answers.forEach((ans, i) => {
                if (ans === shuffledQuestions[i].correct) correct++;
            });
            const score = (correct / 50) * 100;
            document.getElementById('testQuestion').style.display = 'none';
            document.getElementById('prevQuestionBtn').style.display = 'none';
            document.getElementById('nextQuestionBtn').style.display = 'none';
            if (score >= 80) {
                document.getElementById('certificateForm').classList.add('active');
            } else {
                document.getElementById('retryMessage').classList.add('active');
            }
        }

        function generateCertificate() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) {
                alert('Please enter your name.');
                return;
            }
            const certWindow = window.open('', '_blank');
            certWindow.document.write(`
                <html>
                <body style="text-align: center; font-family: Arial; background: #1a1a1a; color: #00ff00;">
                    <h1 style="color: #00b7eb;">CODEXEDOC Certificate</h1>
                    <p style="font-size: 1.5rem; margin: 20px;">Awarded to: ${name}</p>
                    <p>For successfully completing the CODEXEDOC HTML Course with a score of 80% or higher.</p>
                    <p>Date: March 29, 2025</p>
                </body>
                </html>
            `);
            certWindow.document.close();
        }
