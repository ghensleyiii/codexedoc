                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];

                        </div>
                        <div class="navigation">
                            <button class="nav-btn" onclick="navigateLesson(${num - 1})">Previous</button>
                            <button class="nav-btn" onclick="navigateLesson(${num + 1})">Next</button>
                        </div>
                    `;
                    contents.appendChild(content);
                });

                currentLesson = 1;
                completedLessons.add(1);
                toggleLesson(1);
            }

            function toggleLesson(num) {
                if (num < 1 || num > 30) return;
                document.querySelectorAll(".lesson-content").forEach(c => c.classList.remove("active"));
                const lesson = document.getElementById(`html-lesson-${num}`);
                if (lesson) {
                    lesson.classList.add("active");
                    const prev = lesson.querySelector(".nav-btn:first-child");
                    const next = lesson.querySelector(".nav-btn:last-child");
                    prev.disabled = num === 1;
                    next.disabled = num === 30;
                }
                const box = document.querySelector(`#html-lessons .lesson-box:nth-child(${num})`);
                if (box) box.classList.add("completed");
            }

            function navigateLesson(num) {
                if (num < 1 || num > 30) return;
                currentLesson = num;
                completedLessons.add(num);
                toggleLesson(num);
            }

            function startTest(lang) {
                console.log("startTest:", lang);
                const modal = document.getElementById("testModal");
                const contents = document.getElementById("testContents");
                const grid = document.getElementById("testGrid");
                if (!modal || !contents || !grid) {
                    console.error("Test elements not found");
                    return;
                }
                contents.innerHTML = "";
                grid.innerHTML = "";
                grid.style.display = "grid";
                userAnswers.fill(null);

                // Shuffle questions
                shuffledTestData = shuffleArray(baseTestData.html);

                // Shuffle options for each question
                shuffledTestData = shuffledTestData.map(test => {
                    const options = shuffleArray([...test.options]);
                    const correctOption = test.options[test.correct];
                    const correctIndex = options.indexOf(correctOption);
                    return { ...test, options, correct: correctIndex };
                });

                shuffledTestData.forEach((test, i) => {
                    const num = i + 1;
                    const box = document.createElement("div");
                    box.classList.add("test-box");
                    box.textContent = num;
                    box.onclick = () => {
                        currentTest = num;
                        toggleTest(num);
                    };
                    grid.appendChild(box);

                    const content = document.createElement("div");
                    content.classList.add("test-content");
                    content.id = `html-test-${num}`;
                    content.innerHTML = `
                        <div class="test-question">${test.question}</div>
                        <div class="test-options">${test.options.map((opt, idx) => `<div class="test-option" onclick="selectOption(${num}, ${idx})">${opt}</div>`).join("")}</div>
                        <div class="navigation">
                            <button class="nav-btn" onclick="navigateTest(${num - 1})">Previous</button>
                            ${num === 30 ? `<button class="submit-btn" id="submit-btn" style="display:none" onclick="submitTest()">Submit</button>` : `<button class="nav-btn" onclick="navigateTest(${num + 1})">Next</button>`}
                        </div>
                    `;
                    contents.appendChild(content);
                });

                currentTest = 1;
                toggleTest(1);
            }

            function toggleTest(num) {
                if (num < 1 || num > 30) return;
                document.querySelectorAll(".test-content").forEach(c => c.classList.remove("active"));
                const test = document.getElementById(`html-test-${num}`);
                if (test) {
                    test.classList.add("active");
                    const prev = test.querySelector(".nav-btn:first-child");
                    const next = test.querySelector(".nav-btn:last-child") || test.querySelector(".submit-btn");
                    prev.disabled = num === 1;
                    if (next.classList.contains("nav-btn")) next.disabled = num === 30;
                    if (num === 30 && next.classList.contains("submit-btn")) {
                        next.style.display = userAnswers.every(a => a !== null) ? "block" : "none";
                    }
                    const selectedIdx = userAnswers[num - 1];
                    if (selectedIdx !== null) {
                        const options = test.querySelectorAll(".test-option");
                        options[selectedIdx].classList.add("selected");
                    }
                }
            }

            function navigateTest(num) {
                if (num < 1 || num > 30) return;
                currentTest = num;
                toggleTest(num);
            }

            function selectOption(num, idx) {
                const options = document.querySelectorAll(`#html-test-${num} .test-option`);
                options.forEach(opt => opt.classList.remove("selected"));
                options[idx].classList.add("selected");
                userAnswers[num - 1] = idx;
                if (num === 30) {
                    const submitBtn = document.getElementById("submit-btn");
                    submitBtn.style.display = userAnswers.every(a => a !== null) ? "block" : "none";
                }
            }

            function submitTest() {
                let score = 0;
                userAnswers.forEach((answer, i) => {
                    if (answer === shuffledTestData[i].correct) score++;
                });
                alert(`You scored ${score} out of 30!`);
                if (score >= 25) {
                    window.location.href = "correct.html";
                } else {
                    closeTest();
                }
            }

            function closeTest() {
                document.getElementById("testModal").classList.remove("active");
            }

            console.log("Script loaded successfully");
        } catch (e) {
            console.error("Script error:", e);
            alert("Script error: " + e.message);
        }
    </script>
</body>
</html>
