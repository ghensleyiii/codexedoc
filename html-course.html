<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Course & Test - Codexedoc</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00b7eb;
            display: inline-block;
        }

        .logo a {
            color: #00b7eb;
            text-decoration: none;
            transition: color 0.3s;
        }

        .logo a:hover {
            color: #00ff00;
        }

        .logo span {
            color: #00ff00;
            font-size: 5rem;
            position: relative;
            top: 8px;
        }

        .main-section {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            background-color: #000000;
            border-radius: 5px;
        }

        .buttons {
            text-align: center;
            margin: 20px 0;
        }

        .btn-lesson {
            padding: 15px 30px;
            margin: 10px;
            background-color: #00b7eb;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .btn-test {
            padding: 15px 30px;
            margin: 10px;
            background-color: #00ff00;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .lesson-box {
            display: none;
            background-color: #00b7eb;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            color: #1a1a1a;
        }

        .test-box {
            display: none;
            background-color: #00ff00;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            color: #1a1a1a;
        }

        .lesson-box.active, .test-box.active {
            display: block;
        }

        .lesson-content {
            background-color: #000000;
            color: #ffffff;
            padding: 20px;
            border-radius: 5px;
            margin: 10px 0;
        }

        .lesson-content h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #ffffff; /* White titles */
        }

        .lesson-content .instruction, 
        .lesson-content .description, 
        .lesson-content .example {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 5px;
        }

        .lesson-content .instruction {
            background-color: #1a1a1a;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .lesson-content .description {
            background-color: #1a1a1a;
            font-size: 1rem;
            color: #ccc;
            font-weight: bold; /* Bold description */
        }

        .lesson-content .example {
            background-color: #333;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            border-left: 4px solid #00ff00;
            white-space: pre-wrap;
        }

        .test-question {
            background-color: #000000;
            color: #ffffff;
            padding: 20px;
            border-radius: 5px;
            margin: 10px 0;
        }

        pre {
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            white-space: pre-wrap;
            border: 1px solid #333;
        }

        .nav-buttons {
            margin: 20px 0;
            text-align: center;
        }

        .nav-btn-lesson {
            padding: 10px 20px;
            background-color: #000000;
            color: #00b7eb;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
        }

        .nav-btn-test {
            padding: 10px 20px;
            background-color: #000000;
            color: #00ff00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
        }

        .nav-btn-lesson:disabled, .nav-btn-test:disabled {
            background-color: #666;
            color: #999;
            cursor: not-allowed;
        }

        .progress-squares {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 20px 0;
            justify-content: center;
        }

        .lesson-square {
            width: 25px;
            height: 25px;
            background-color: #00b7eb;
            border-radius: 3px;
            text-align: center;
            color: #000000;
            font-size: 0.9rem;
            line-height: 25px;
            cursor: pointer;
        }

        .lesson-square.completed {
            background-color: #00ff00;
        }

        .test-square {
            width: 25px;
            height: 25px;
            background-color: #00ff00;
            border-radius: 3px;
            text-align: center;
            color: #000000;
            font-size: 0.9rem;
            line-height: 25px;
            cursor: pointer;
        }

        .test-square.completed {
            background-color: #00b7eb;
        }

        .certificate-form, .retry-message {
            display: none;
            text-align: center;
            padding: 20px;
            background-color: #000000;
            color: #ffffff;
            border-radius: 5px;
        }

        .certificate-form.active, .retry-message.active {
            display: block;
        }

        input[type="text"] {
            padding: 10px;
            margin: 10px 0;
            width: 200px;
        }

        footer {
            background-color: #1a1a1a;
            color: #00ff00;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .logo { font-size: 2rem; }
            .logo span { font-size: 4rem; top: 6px; }
            .main-section { padding: 15px; }
            .btn-lesson, .btn-test { font-size: 1rem; padding: 10px 20px; }
            .lesson-square, .test-square { width: 20px; height: 20px; font-size: 0.8rem; line-height: 20px; }
            .lesson-content h2 { font-size: 1.5rem; }
            .lesson-content .instruction { font-size: 1rem; }
            .lesson-content .description { font-size: 0.9rem; }
            .lesson-content .example { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="code.html">CODE</a><a href="index.html"><span>X</span></a><a href="edoc.html">EDOC</a>
        </div>
    </header>

    <section class="main-section">
        <div class="buttons">
            <button class="btn-lesson" onclick="toggleLessonBox()">Open Lesson</button>
            <button class="btn-test" onclick="toggleTestBox()">Launch Test</button>
        </div>

        <div class="lesson-box" id="lessonBox">
            <div class="lesson-content" id="lessonContent"></div>
            <div class="nav-buttons">
                <button class="nav-btn-lesson" onclick="prevLesson()" id="prevLessonBtn">Last</button>
                <button class="nav-btn-lesson" onclick="nextLesson()" id="nextLessonBtn">Next</button>
            </div>
            <div class="progress-squares" id="lessonSquares"></div>
        </div>

        <div class="test-box" id="testBox">
            <div class="test-question" id="testQuestion"></div>
            <div class="nav-buttons">
                <button class="nav-btn-test" onclick="prevQuestion()" id="prevQuestionBtn">Last</button>
                <button class="nav-btn-test" onclick="nextQuestion()" id="nextQuestionBtn">Next</button>
            </div>
            <div class="progress-squares" id="testSquares"></div>
            <div class="certificate-form" id="certificateForm">
                <h2>Congratulations!</h2>
                <p>Enter your name for your certificate (80%+ score):</p>
                <input type="text" id="nameInput" placeholder="Your Name" required>
                <button class="nav-btn-test" onclick="generateCertificate()">Generate Certificate</button>
            </div>
            <div class="retry-message" id="retryMessage">
                <h2>Try Again</h2>
                <p>Your score was below 80%. Please review the lessons and try again.</p>
            </div>
        </div>
    </section>

    <footer>
        <p><span class="footer-logo">CODE<span>X</span>EDOC</span></p>
        <p>Copyright © 2025 CODEXEDOC. All Rights Reserved.</p>
        <p><a href="mailto:contact@codexedoc.com">contact@codexedoc.com</a></p>
    </footer>

    <script>
        const lessons = [
            { 
                title: "1. What is HTML?", 
                instruction: "HTML stands for HyperText Markup Language. It’s the standard language for creating web pages, using tags like &lt;html&gt; to structure content.", 
                description: "<b>&lt;html&gt;Hello&lt;/html&gt;</b>", 
                example: "<html>Hello</html>" 
            },
            { 
                title: "2. Document Structure", 
                instruction: "Every HTML page starts with a &lt;!DOCTYPE html&gt; declaration, followed by an <html> tag containing <head> and <body> sections.", 
                description: "<b>&lt;!DOCTYPE html&gt;&lt;html&gt;&lt;head&gt;&lt;/head&gt;&lt;body&gt;&lt;/body&gt;&lt;/html&gt;</b>", 
                example: "<!DOCTYPE html><html><head></head><body></body></html>" 
            },
            { 
                title: "3. The Head Section", 
                instruction: "The &lt;head&gt; section contains metadata about the page, like the title, using the &lt;title&gt; tag.", 
                description: "<b>&lt;head&gt;&lt;title&gt;My Page&lt;/title&gt;&lt;/head&gt;</b>", 
                example: "<head><title>My Page</title></head>" 
            },
            { 
                title: "4. The Body Section", 
                instruction: "The &lt;body&gt; section holds the visible content of the webpage, like text or images.", 
                description: "<b>&lt;body&gt;Welcome&lt;/body&gt;</b>", 
                example: "<body>Welcome</body>" 
            },
            { 
                title: "5. Headings", 
                instruction: "Headings organize content with &lt;h1&gt; to &lt;h6&gt; tags, where &lt;h1&gt; is the largest and most important.", 
                description: "<b>&lt;h1&gt;Main Title&lt;/h1&gt;</b>", 
                example: "<h1>Main Title</h1>" 
            },
            { 
                title: "6. Smaller Headings", 
                instruction: "Use &lt;h2&gt; to &lt;h6&gt; for subheadings, decreasing in size as the number increases.", 
                description: "<b>&lt;h2&gt;Subtitle&lt;/h2&gt;</b>", 
                example: "<h2>Subtitle</h2>" 
            },
            { 
                title: "7. Paragraphs", 
                instruction: "The &lt;p&gt; tag creates paragraphs for blocks of text.", 
                description: "<b>&lt;p&gt;This is a paragraph.&lt;/p&gt;</b>", 
                example: "<p>This is a paragraph.</p>" 
            },
            { 
                title: "8. Line Breaks", 
                instruction: "The &lt;br&gt; tag inserts a line break within text, without starting a new paragraph.", 
                description: "<b>Line1&lt;br&gt;Line2</b>", 
                example: "Line1<br>Line2" 
            },
            { 
                title: "9. Horizontal Rules", 
                instruction: "The &lt;hr&gt; tag adds a horizontal line to separate content sections.", 
                description: "<b>&lt;hr&gt;</b>", 
                example: "<hr>" 
            },
            { 
                title: "10. Bold Text", 
                instruction: "The &lt;b&gt; tag makes text bold for emphasis.", 
                description: "<b>&lt;b&gt;Bold&lt;/b&gt;</b>", 
                example: "<b>Bold</b>" 
            },
            { 
                title: "11. Italic Text", 
                instruction: "The &lt;i&gt; tag italicizes text for emphasis or style.", 
                description: "<b>&lt;i&gt;Italic&lt;/i&gt;</b>", 
                example: "<i>Italic</i>" 
            },
            { 
                title: "12. Underlined Text", 
                instruction: "The &lt;u&gt; tag underlines text to highlight or mark it.", 
                description: "<b>&lt;u&gt;Under&lt;/u&gt;</b>", 
                example: "<u>Under</u>" 
            },
            { 
                title: "13. Strong Emphasis", 
                instruction: "The &lt;strong&gt; tag indicates important text, typically rendered as bold.", 
                description: "<b>&lt;strong&gt;Important&lt;/strong&gt;</b>", 
                example: "<strong>Important</strong>" 
            },
            { 
                title: "14. Emphasized Text", 
                instruction: "The &lt;em&gt; tag marks text for emphasis, usually italicized.", 
                description: "<b>&lt;em&gt;Emphasis&lt;/em&gt;</b>", 
                example: "<em>Emphasis</em>" 
            },
            { 
                title: "15. Links", 
                instruction: "The &lt;a&gt; tag creates hyperlinks with the 'href' attribute specifying the URL.", 
                description: "<b>&lt;a href='https://example.com'&gt;Click&lt;/a&gt;</b>", 
                example: "<a href='https://example.com'>Click</a>" 
            },
            { 
                title: "16. Images", 
                instruction: "The &lt;img&gt; tag embeds images using 'src' for the file path and 'alt' for accessibility text.", 
                description: "<b>&lt;img src='pic.jpg' alt='A picture'&gt;</b>", 
                example: "<img src='pic.jpg' alt='A picture'>" 
            },
            { 
                title: "17. Image Attributes", 
                instruction: "Add 'width' and 'height' attributes to &lt;img&gt; to control image size in pixels.", 
                description: "<b>&lt;img src='pic.jpg' alt='Pic' width='100' height='100'&gt;</b>", 
                example: "<img src='pic.jpg' alt='Pic' width='100' height='100'>" 
            },
            { 
                title: "18. Comments", 
                instruction: "Comments are added with &lt;!-- and --&gt; to include notes that don’t display.", 
                description: "<b>&lt;!-- This is hidden --&gt;</b>", 
                example: "<!-- This is hidden -->" 
            },
            { 
                title: "19. Unordered Lists", 
                instruction: "The &lt;ul&gt; tag creates a bulleted list, with &lt;li&gt; tags for each item.", 
                description: "<b>&lt;ul&gt;&lt;li&gt;Item 1&lt;/li&gt;&lt;/ul&gt;</b>", 
                example: "<ul><li>Item 1</li></ul>" 
            },
            { 
                title: "20. Ordered Lists", 
                instruction: "The &lt;ol&gt; tag creates a numbered list, with &lt;li&gt; tags for each item.", 
                description: "<b>&lt;ol&gt;&lt;li&gt;Step 1&lt;/li&gt;&lt;/ol&gt;</b>", 
                example: "<ol><li>Step 1</li></ol>" 
            },
            { 
                title: "21. Nested Lists", 
                instruction: "Place a &lt;ul&gt; or &lt;ol&gt; inside an &lt;li&gt; to create a nested list.", 
                description: "<b>&lt;ul&gt;&lt;li&gt;Item&lt;ul&gt;&lt;li&gt;Subitem&lt;/li&gt;&lt;/ul&gt;&lt;/li&gt;&lt;/ul&gt;</b>", 
                example: "<ul><li>Item<ul><li>Subitem</li></ul></li></ul>" 
            },
            { 
                title: "22. Definition Lists", 
                instruction: "The &lt;dl&gt; tag creates a definition list, with &lt;dt&gt; for terms and &lt;dd&gt; for descriptions.", 
                description: "<b>&lt;dl&gt;&lt;dt&gt;Term&lt;/dt&gt;&lt;dd&gt;Definition&lt;/dd&gt;&lt;/dl&gt;</b>", 
                example: "<dl><dt>Term</dt><dd>Definition</dd></dl>" 
            },
            { 
                title: "23. Divisions", 
                instruction: "The &lt;div&gt; tag groups content into a block for organization.", 
                description: "<b>&lt;div&gt;Content here&lt;/div&gt;</b>", 
                example: "<div>Content here</div>" 
            },
            { 
                title: "24. Spans", 
                instruction: "The &lt;span&gt; tag marks inline content, like a word, within a line.", 
                description: "<b>&lt;span&gt;Inline&lt;/span&gt; text</b>", 
                example: "<span>Inline</span> text" 
            },
            { 
                title: "25. Blockquotes", 
                instruction: "The &lt;blockquote&gt; tag indents a quotation to set it apart.", 
                description: "<b>&lt;blockquote&gt;Quote here&lt;/blockquote&gt;</b>", 
                example: "<blockquote>Quote here</blockquote>" 
            },
            { 
                title: "26. Preformatted Text", 
                instruction: "The &lt;pre&gt; tag preserves whitespace and formatting in text.", 
                description: "<b>&lt;pre&gt;Line 1 Line 2&lt;/pre&gt;</b>", 
                example: "<pre>Line 1 Line 2</pre>" 
            },
            { 
                title: "27. Code Snippets", 
                instruction: "The &lt;code&gt; tag marks inline code, often used for programming snippets.", 
                description: "<b>&lt;code&gt;x = 5&lt;/code&gt;</b>", 
                example: "<code>x = 5</code>" 
            },
            { 
                title: "28. Tables", 
                instruction: "The &lt;table&gt; tag creates a table, with <tr> for rows and &lt;td&gt; for cells.", 
                description: "<b>&lt;table&gt;&lt;tr&gt;&lt;td&gt;Cell&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;</b>", 
                example: "<table><tr><td>Cell</td></tr></table>" 
            },
            { 
                title: "29. Table Headers", 
                instruction: "The &lt;th&gt; tag defines bold, centered table headers within a &lt;tr&gt;.", 
                description: "<b>&lt;table&gt;&lt;tr&gt;&lt;th&gt;Header&lt;/th&gt;&lt;/tr&gt;&lt;/table&gt;</b>", 
                example: "<table><tr><th>Header</th></tr></table>" 
            },
            { 
                title: "30. Table Rows", 
                instruction: "Multiple &lt;tr&gt; tags in a &lt;table&gt; create additional rows.", 
                description: "<b>&lt;table&gt;&lt;tr&gt;&lt;td&gt;Row 1&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Row 2&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;</b>", 
                example: "<table><tr><td>Row 1</td></tr><tr><td>Row 2</td></tr></table>" 
            },
            { 
                title: "31. Table Columns", 
                instruction: "Add multiple &lt;td&gt; or &lt;th&gt; tags in a &lt;tr&gt; to create columns.", 
                description: "<b>&lt;table&gt;&lt;tr&gt;&lt;td&gt;Col 1&lt;/td&gt;&lt;td&gt;Col 2&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;</b>", 
                example: "<table><tr><td>Col 1</td><td>Col 2</td></tr></table>" 
            },
            { 
                title: "32. Table Captions", 
                instruction: "The &lt;caption&gt; tag adds a title above a &lt;table&gt;.", 
                description: "<b>&lt;table&gt;&lt;caption&gt;My Table&lt;/caption&gt;&lt;tr&gt;&lt;td&gt;Data&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;</b>", 
                example: "<table><caption>My Table</caption><tr><td>Data</td></tr></table>" 
            },
            { 
                title: "33. Forms", 
                instruction: "The &lt;form&gt; tag creates a container for user input elements.", 
                description: "<b>&lt;form&gt;&lt;/form&gt;</b>", 
                example: "<form></form>" 
            },
            { 
                title: "34. Text Inputs", 
                instruction: "The &lt;input&gt; tag with type='text' creates a single-line text field.", 
                description: "<b>&lt;form&gt;&lt;input type='text'&gt;&lt;/form&gt;</b>", 
                example: "<form><input type='text'></form>" 
            },
            { 
                title: "35. Buttons", 
                instruction: "The &lt;button&gt; tag creates a clickable button within a &lt;form&gt;.", 
                description: "<b>&lt;form&gt;&lt;button&gt;Submit&lt;/button&gt;&lt;/form&gt;</b>", 
                example: "<form><button>Submit</button></form>" 
            },
            { 
                title: "36. Labels", 
                instruction: "The &lt;label&gt; tag describes an input, linked with the 'for' attribute.", 
                description: "<b>&lt;form&gt;&lt;label for='name'&gt;Name:&lt;/label&gt;&lt;input type='text' id='name'&gt;&lt;/form&gt;</b>", 
                example: "<form><label for='name'>Name:</label><input type='text' id='name'></form>" 
            },
            { 
                title: "37. Dropdowns", 
                instruction: "The &lt;select&gt; tag with &lt;option&gt; tags creates a dropdown menu.", 
                description: "<b>&lt;form&gt;&lt;select&gt;&lt;option&gt;Option 1&lt;/option&gt;&lt;/select&gt;&lt;/form&gt;</b>", 
                example: "<form><select><option>Option 1</option></select></form>" 
            },
            { 
                title: "38. Textareas", 
                instruction: "The &lt;textarea&gt; tag creates a multi-line text input area.", 
                description: "<b>&lt;form&gt;&lt;textarea&gt;&lt;/textarea&gt;&lt;/form&gt;</b>", 
                example: "<form><textarea></textarea></form>" 
            },
            { 
                title: "39. Checkboxes", 
                instruction: "The &lt;input&gt; tag with type='checkbox' allows multiple selections.", 
                description: "<b>&lt;form&gt;&lt;input type='checkbox'&gt; Yes&lt;/form&gt;</b>", 
                example: "<form><input type='checkbox'> Yes</form>" 
            },
            { 
                title: "40. Radio Buttons", 
                instruction: "The &lt;input&gt; tag with type='radio' allows one selection from a group.", 
                description: "<b>&lt;form&gt;&lt;input type='radio' name='choice'&gt; Yes&lt;/form&gt;</b>", 
                example: "<form><input type='radio' name='choice'> Yes</form>" 
            },
            { 
                title: "41. Fieldsets", 
                instruction: "The &lt;fieldset&gt; tag groups form elements, with &lt;legend&gt; for a title.", 
                description: "<b>&lt;form&gt;&lt;fieldset&gt;&lt;legend&gt;Group&lt;/legend&gt;&lt;input type='text'&gt;&lt;/fieldset&gt;&lt;/form&gt;</b>", 
                example: "<form><fieldset><legend>Group</legend><input type='text'></fieldset></form>" 
            },
            { 
                title: "42. Form Action", 
                instruction: "The 'action' attribute in &lt;form&gt; specifies where data is sent.", 
                description: "<b>&lt;form action='submit.html'&gt;&lt;input type='text'&gt;&lt;/form&gt;</b>", 
                example: "<form action='submit.html'><input type='text'></form>" 
            },
            { 
                title: "43. Form Method", 
                instruction: "The 'method' attribute in &lt;form&gt; sets how data is sent (e.g., 'get' or 'post').", 
                description: "<b>&lt;form action='submit.html' method='post'&gt;&lt;input type='text'&gt;&lt;/form&gt;</b>", 
                example: "<form action='submit.html' method='post'><input type='text'></form>" 
            },
            { 
                title: "44. Input Placeholders", 
                instruction: "The 'placeholder' attribute in &lt;input&gt; shows hint text.", 
                description: "<b>&lt;input type='text' placeholder='Enter name'&gt;</b>", 
                example: "<input type='text' placeholder='Enter name'>" 
            },
            { 
                title: "45. Required Fields", 
                instruction: "The 'required' attribute in &lt;input&gt; makes a field mandatory.", 
                description: "<b>&lt;form&gt;&lt;input type='text' required&gt;&lt;/form&gt;</b>", 
                example: "<form><input type='text' required></form>" 
            },
            { 
                title: "46. Meta Tags", 
                instruction: "The &lt;meta&gt; tag in &lt;head&gt; adds metadata like character encoding.", 
                description: "<b>&lt;head&gt;&lt;meta charset='UTF-8'&gt;&lt;/head&gt;</b>", 
                example: "<head><meta charset='UTF-8'></head>" 
            },
            { 
                title: "47. Meta Descriptions", 
                instruction: "The &lt;meta&gt; tag with 'name' and 'content' adds a page description.", 
                description: "<b>&lt;head&gt;&lt;meta name='description' content='My site'&gt;&lt;/head&gt;</b>", 
                example: "<head><meta name='description' content='My site'></head>" 
            },
            { 
                title: "48. Semantic Headers", 
                instruction: "The &lt;header&gt; tag defines a page or section header.", 
                description: "<b>&lt;header&gt;&lt;h1&gt;Welcome&lt;/h1&gt;&lt;/header&gt;</b>", 
                example: "<header><h1>Welcome</h1></header>" 
            },
            { 
                title: "49. Semantic Footers", 
                instruction: "The &lt;footer&gt; tag defines a page or section footer.", 
                description: "<b>&lt;footer&gt;&lt;p&gt;Contact us&lt;/p&gt;&lt;/footer&gt;</b>", 
                example: "<footer><p>Contact us</p></footer>" 
            },
            { 
                title: "50. Semantic Articles", 
                instruction: "The &lt;article&gt; tag defines independent content, like a blog post.", 
                description: "<b>&lt;article&gt;&lt;h1&gt;Post&lt;/h1&gt;&lt;p&gt;Text&lt;/p&gt;&lt;/article&gt;</b>", 
                example: "<article><h1>Post</h1><p>Text</p></article>" 
            }
        ];

            { q: "What attribute sets data send method?", a: ["method", "action", "type"], correct: 0 },
            { q: "What attribute shows input hints?", a: ["placeholder", "value", "text"], correct: 0 },
            { q: "What attribute makes a field required?", a: ["required", "mandatory", "must"], correct: 0 },
            { q: "What tag sets character encoding?", a: ["&lt;meta charset='UTF-8'&gt;", "&lt;meta encoding='UTF-8'&gt;", "&lt;meta type='UTF-8'&gt;"], correct: 0 },
            { q: "What tag adds a page description?", a: ["&lt;meta name='description'&gt;", "&lt;title&gt;", "&lt;head&gt;"], correct: 0 },
            { q: "What tag defines a header?", a: ["&lt;header&gt;", "&lt;head&gt;", "&lt;h1&gt;"], correct: 0 },
            { q: "What tag defines a footer?", a: ["&lt;footer&gt;", "&lt;body&gt;", "&lt;div&gt;"], correct: 0 },
            { q: "What tag defines an article?", a: ["&lt;article&gt;", "&lt;div&gt;", "&lt;section&gt;"], correct: 0 }
        ];

        let currentLesson = 0;
        let currentQuestion = 0;
        let answers = new Array(50).fill(null);
        let lessonProgress = new Array(50).fill(false);
        let testProgress = new Array(50).fill(false);

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const shuffledQuestions = shuffle([...questions]);

        function toggleLessonBox() {
            const lessonBox = document.getElementById('lessonBox');
            const testBox = document.getElementById('testBox');
            if (testBox.classList.contains('active')) {
                testBox.classList.remove('active');
            }
            lessonBox.classList.toggle('active');
            if (lessonBox.classList.contains('active')) {
                updateLesson();
                updateLessonSquares();
            }
        }

        function toggleTestBox() {
            const lessonBox = document.getElementById('lessonBox');
            const testBox = document.getElementById('testBox');
            if (lessonBox.classList.contains('active')) {
                lessonBox.classList.remove('active');
            }
            testBox.classList.toggle('active');
            if (testBox.classList.contains('active')) {
                updateQuestion();
                updateTestSquares();
            }
        }

        function updateLesson() {
            const lesson = lessons[currentLesson];
            document.getElementById('lessonContent').innerHTML = `
                <h2>${lesson.title}</h2>
                <div class="instruction">${lesson.instruction}</div>
                <div class="description">${lesson.description}</div>
                <div class="example">${lesson.example}</div>
            `;
            document.getElementById('prevLessonBtn').disabled = currentLesson === 0;
            document.getElementById('nextLessonBtn').disabled = currentLesson === lessons.length - 1;
            lessonProgress[currentLesson] = true;
            updateLessonSquares();
        }

        function updateQuestion() {
            const q = shuffledQuestions[currentQuestion];
            document.getElementById('testQuestion').innerHTML = `
                <h2>Question ${currentQuestion + 1}</h2>
                <p>${q.q}</p>
                ${q.a.map((opt, i) => `<label><input type="radio" name="q${currentQuestion}" value="${i}" ${answers[currentQuestion] === i ? 'checked' : ''}> ${opt}</label><br>`).join('')}
            `;
            document.getElementById('prevQuestionBtn').disabled = currentQuestion === 0;
            document.getElementById('nextQuestionBtn').disabled = currentQuestion === shuffledQuestions.length - 1;
            document.querySelectorAll(`input[name="q${currentQuestion}"]`).forEach(radio => {
                radio.addEventListener('change', (e) => {
                    answers[currentQuestion] = parseInt(e.target.value);
                    testProgress[currentQuestion] = true;
                    updateTestSquares();
                });
            });
        }

        function updateLessonSquares() {
            const squares = document.getElementById('lessonSquares');
            squares.innerHTML = '';
            lessonProgress.forEach((completed, i) => {
                const square = document.createElement('div');
                square.className = `lesson-square ${completed ? 'completed' : ''}`;
                square.textContent = i + 1;
                square.onclick = () => {
                    currentLesson = i;
                    updateLesson();
                };
                squares.appendChild(square);
            });
        }

        function updateTestSquares() {
            const squares = document.getElementById('testSquares');
            squares.innerHTML = '';
            testProgress.forEach((completed, i) => {
                const square = document.createElement('div');
                square.className = `test-square ${completed ? 'completed' : ''}`;
                square.textContent = i + 1;
                square.onclick = () => {
                    currentQuestion = i;
                    updateQuestion();
                };
                squares.appendChild(square);
            });
        }

        function prevLesson() {
            if (currentLesson > 0) currentLesson--;
            updateLesson();
        }

        function nextLesson() {
            if (currentLesson < lessons.length - 1) currentLesson++;
            updateLesson();
        }

        function prevQuestion() {
            if (currentQuestion > 0) currentQuestion--;
            updateQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < shuffledQuestions.length - 1) {
                currentQuestion++;
                updateQuestion();
            } else {
                gradeTest();
            }
        }

        function gradeTest() {
            let correct = 0;
            answers.forEach((ans, i) => {
                if (ans === shuffledQuestions[i].correct) correct++;
            });
            const score = (correct / 50) * 100;
            document.getElementById('testQuestion').style.display = 'none';
            document.getElementById('prevQuestionBtn').style.display = 'none';
            document.getElementById('nextQuestionBtn').style.display = 'none';
            if (score >= 80) {
                document.getElementById('certificateForm').classList.add('active');
            } else {
                document.getElementById('retryMessage').classList.add('active');
            }
        }

        function generateCertificate() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) {
                alert('Please enter your name.');
                return;
            }
            const certWindow = window.open('', '_blank');
            certWindow.document.write(`
                <html>
                <body style="text-align: center; font-family: Arial; background: #1a1a1a; color: #00ff00;">
                    <h1 style="color: #00b7eb;">CODEXEDOC Certificate</h1>
                    <p style="font-size: 1.5rem; margin: 20px;">Awarded to: ${name}</p>
                    <p>For successfully completing the CODEXEDOC HTML Course with a score of 80% or higher.</p>
                    <p>Date: March 29, 2025</p>
                </body>
                </html>
            `);
            certWindow.document.close();
        }
    </script>
