            { tag: "&lt;style&gt;", description: "Embeds CSS styles within the document." },
            { tag: "&lt;sub&gt;", description: "Creates subscript text, like in chemical formulas." },
            { tag: "&lt;summary&gt;", description: "Defines a toggle for details element content." },
            { tag: "&lt;sup&gt;", description: "Creates superscript text, like in exponents." },
            { tag: "&lt;table&gt;", description: "Creates a table for data in rows and columns." },
            { tag: "&lt;tbody&gt;", description: "Groups body content in a table." },
            { tag: "&lt;td&gt;", description: "Defines a table data cell." },
            { tag: "&lt;template&gt;", description: "Holds reusable HTML content, invisible until scripted." },
            { tag: "&lt;textarea&gt;", description: "Creates a multi-line text input for forms." },
            { tag: "&lt;tfoot&gt;", description: "Groups footer content in a table." },
            { tag: "&lt;th&gt;", description: "Defines a table header cell." },
            { tag: "&lt;thead&gt;", description: "Groups header content in a table." },
            { tag: "&lt;time&gt;", description: "Marks a specific date or time, with datetime attribute." },
            { tag: "&lt;title&gt;", description: "Sets the page title, shown in the browser tab." },
            { tag: "&lt;tr&gt;", description: "Defines a table row." },
            { tag: "&lt;track&gt;", description: "Adds subtitles or captions to video or audio." },
            { tag: "&lt;u&gt;", description: "Underlines text without semantic meaning (use CSS instead)." },
            { tag: "&lt;ul&gt;", description: "Creates an unordered (bulleted) list." },
            { tag: "&lt;var&gt;", description: "Marks a variable, often in math or programming contexts." },
            { tag: "&lt;video&gt;", description: "Embeds video content, with controls for playback." },
            { tag: "&lt;wbr&gt;", description: "Suggests a word break opportunity for long text." }
        ];

        let currentLesson = 0;
        let currentTestPage = 0;
        const questionsPerPage = 5;
        let userAnswers = new Array(testQuestions.length).fill(null);
        let testSubmitted = false;

        function displayLesson(index) {
            const lesson = lessons[index];
            document.getElementById('lesson-title').textContent = lesson.title;
            document.getElementById('lesson-content').innerHTML = lesson.content;
            document.getElementById('prev-lesson').disabled = index === 0;
            document.getElementById('next-lesson').disabled = index === lessons.length - 1;
            updateLessonLinks(index);
        }

        function updateLessonLinks(activeIndex) {
            const linksContainer = document.querySelector('.lesson-links');
            linksContainer.innerHTML = '';
            lessons.forEach((_, i) => {
                const btn = document.createElement('button');
                btn.textContent = i + 1;
                btn.className = i === activeIndex ? 'active' : '';
                btn.setAttribute('aria-label', `Go to lesson ${i + 1}`);
                btn.addEventListener('click', () => {
                    currentLesson = i;
                    displayLesson(i);
                });
                linksContainer.appendChild(btn);
            });
        }

        function displayTestPage(page) {
            const start = page * questionsPerPage;
            const end = Math.min(start + questionsPerPage, testQuestions.length);
            const content = document.getElementById('test-content');
            content.innerHTML = '';
            for (let i = start; i < end; i++) {
                const q = testQuestions[i];
                const questionDiv = document.createElement('div');
                questionDiv.innerHTML = `
                    <p>${i + 1}. ${q.question}</p>
                    <form id="q${i}">
                        ${q.options.map((opt, j) => `
                            <label>
                                <input type="radio" name="q${i}" value="${j}" ${userAnswers[i] == j ? 'checked' : ''} ${testSubmitted ? 'disabled' : ''}>
                                ${opt}
                            </label>
                        `).join('')}
                        <div id="feedback${i}" class="feedback"></div>
                    </form>
                `;
                content.appendChild(questionDiv);
                if (!testSubmitted) {
                    document.getElementById(`q${i}`).addEventListener('change', (e) => {
                        userAnswers[i] = parseInt(e.target.value);
                    });
                }
            }
            document.getElementById('test-progress').textContent = `Questions ${start + 1}-${end} of ${testQuestions.length}`;
            document.getElementById('prev-test').disabled = page === 0;
            document.getElementById('next-test').disabled = end === testQuestions.length;
            if (end === testQuestions.length && !testSubmitted) {
                const submitBtn = document.createElement('button');
                submitBtn.textContent = 'Submit Test';
                submitBtn.className = 'nav-btn';
                submitBtn.addEventListener('click', submitTest);
                content.appendChild(submitBtn);
            }
            if (testSubmitted) {
                showTestFeedback(start, end);
            }
        }

        function showTestFeedback(start, end) {
            for (let i = start; i < end; i++) {
                const feedbackDiv = document.getElementById(`feedback${i}`);
                if (userAnswers[i] == null) {
                    feedbackDiv.textContent = 'Not answered.';
                    feedbackDiv.className = 'feedback incorrect';
                } else if (userAnswers[i] === testQuestions[i].correct) {
                    feedbackDiv.textContent = 'Correct!';
                    feedbackDiv.className = 'feedback correct';
                } else {
                    feedbackDiv.textContent = `Incorrect. Correct answer: ${testQuestions[i].options[testQuestions[i].correct]}.`;
                    feedbackDiv.className = 'feedback incorrect';
                }
            }
        }

        function submitTest() {
            testSubmitted = true;
            let score = 0;
            userAnswers.forEach((answer, i) => {
                if (answer === testQuestions[i].correct) score++;
            });
            const summary = document.getElementById('test-summary');
            summary.innerHTML = `
                <h3>Test Results</h3>
                <p>You scored ${score} out of ${testQuestions.length} (${Math.round((score / testQuestions.length) * 100)}%).</p>
                ${score === testQuestions.length ? '<p>Perfect score! Great job!</p>' : '<p>Review incorrect answers below.</p>'}
            `;
            displayTestPage(currentTestPage);
        }

        function displayLibrary() {
            const content = document.getElementById('library-content');
            const search = document.getElementById('library-search').value.toLowerCase();
            content.innerHTML = library
                .filter(item => item.tag.toLowerCase().includes(search) || item.description.toLowerCase().includes(search))
                .map(item => `
                    <details>
                        <summary>${item.tag}</summary>
                        <p>${item.description}</p>
                    </details>
                `).join('');
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
                if (btn.dataset.tab === 'lessons') {
                    displayLesson(currentLesson);
                } else if (btn.dataset.tab === 'test') {
                    displayTestPage(currentTestPage);
                } else if (btn.dataset.tab === 'library') {
                    displayLibrary();
                }
            });
        });

        document.getElementById('prev-lesson').addEventListener('click', () => {
            if (currentLesson > 0) {
                currentLesson--;
                displayLesson(currentLesson);
            }
        });

        document.getElementById('next-lesson').addEventListener('click', () => {
            if (currentLesson < lessons.length - 1) {
                currentLesson++;
                displayLesson(currentLesson);
            }
        });

        document.getElementById('prev-test').addEventListener('click', () => {
            if (currentTestPage > 0) {
                currentTestPage--;
                displayTestPage(currentTestPage);
            }
        });

        document.getElementById('next-test').addEventListener('click', () => {
            if (currentTestPage < Math.ceil(testQuestions.length / questionsPerPage) - 1) {
                currentTestPage++;
                displayTestPage(currentTestPage);
            }
        });

        document.getElementById('library-search').addEventListener('input', displayLibrary);

        // Initialize
        displayLesson(currentLesson);
        displayLibrary();
    </script>
</body>
